/* ─── E-INVOICE MODAL ────────────────────────────────────── */
function EInvoiceModal({bill,state,billType,onClose,save}){
  const fs=state.firmSettings||{};
  const party=state.parties.find(p=>p.id===bill.partyId);
  const isPaddy=billType==='paddy';

  // e-invoice specific fields that can be set per-invoice
  const [einvNo,setEinvNo]=useState(()=>{
    if(bill.einvoiceNo) return bill.einvoiceNo;
    const prefix=fs.einvoicePrefix||'INV';
    const yr=new Date().getFullYear();
    const seq=String(fs.nextEInvoiceNo||1).padStart(4,'0');
    return `${prefix}/${yr}/${seq}`;
  });
  const [einvDate,setEinvDate]=useState(bill.einvoiceDate||tod());
  const [supplyType,setSupplyType]=useState(bill.einvSupplyType||'B2B');
  const [igst,setIgst]=useState(bill.einvIgst??false); // inter-state → IGST; intra → CGST+SGST
  const [gstRate,setGstRate]=useState(bill.einvGstRate??5);
  const [hsnCode,setHsnCode]=useState(bill.einvHsnCode||'1006'); // default HSN for rice
  const [irn,setIrn]=useState(bill.einvoiceIRN||'');
  const [ackNo,setAckNo]=useState(bill.einvAckNo||'');
  const [ackDate,setAckDate]=useState(bill.einvAckDate||'');
  const [saved,setSaved]=useState(!!bill.einvoiceNo);

  // Tax calculation
  const taxableAmt=+bill.totalAmount||0;
  const gstAmt=taxableAmt*(gstRate/100);
  const igstAmt=igst?gstAmt:0;
  const cgstAmt=igst?0:gstAmt/2;
  const sgstAmt=igst?0:gstAmt/2;
  const grandTotal=taxableAmt+gstAmt;

  const doSaveToRecord=()=>{
    if(!save)return;
    const einvData={
      einvoiceNo:einvNo,einvoiceDate:einvDate,einvSupplyType:supplyType,
      einvIgst:igst,einvGstRate:gstRate,einvHsnCode:hsnCode,
      einvoiceIRN:irn,einvAckNo:ackNo,einvAckDate:ackDate,
    };
    save(s=>{
      const nextNo=(+(fs.nextEInvoiceNo||1))+1;
      let ns={...s,firmSettings:{...s.firmSettings,nextEInvoiceNo:bill.einvoiceNo?s.firmSettings.nextEInvoiceNo:nextNo}};
      if(isPaddy) ns={...ns,paddyBills:ns.paddyBills.map(b=>b.id===bill.id?{...b,...einvData}:b)};
      else ns={...ns,riceSaleBills:ns.riceSaleBills.map(b=>b.id===bill.id?{...b,...einvData}:b)};
      return ns;
    });
    setSaved(true);
  };

  const doPrintEInvoice=()=>{
    const html=buildEInvoiceHTML({bill,state,billType,einvNo,einvDate,supplyType,igst,gstRate,hsnCode,irn,ackNo,ackDate,taxableAmt,gstAmt,igstAmt,cgstAmt,sgstAmt,grandTotal});
    printBillHTML(html);
  };

  return(
    <div className="overlay" style={{zIndex:200}}>
      <div className="modal modal-xl" style={{maxWidth:860}}>
        <div className="mhead">
          <h3>🧾 E-Invoice — {bill.billNo}</h3>
          <button className="xbtn" onClick={onClose}>✕</button>
        </div>
        <div className="mbody">
          {/* Firm missing info warning */}
          {(!fs.gstin||!fs.name)&&<div className="alert alert-err mb12">⚠️ Firm GSTIN/Name not set. Go to ⚙️ Firm Settings to fill your details before generating e-invoices.</div>}
          {saved&&<div className="alert alert-ok mb12">✅ E-invoice details saved to bill record.</div>}

          <div className="g2" style={{gap:16,marginBottom:16}}>
            {/* Left: Invoice fields */}
            <div>
              <div className="sec-ttl mb12">📋 Invoice Details</div>
              <div className="frow">
                <div className="fg"><label className="flbl">E-Invoice Number</label><input className="finput mono" value={einvNo} onChange={e=>setEinvNo(e.target.value)}/></div>
                <div className="fg"><label className="flbl">Invoice Date</label><input type="date" className="finput" value={einvDate} onChange={e=>setEinvDate(e.target.value)}/></div>
              </div>
              <div className="frow">
                <div className="fg"><label className="flbl">Supply Type</label>
                  <select className="fselect" value={supplyType} onChange={e=>setSupplyType(e.target.value)}>
                    <option value="B2B">B2B (Business to Business)</option>
                    <option value="B2C">B2C (Business to Consumer)</option>
                    <option value="EXPWP">Export with Payment</option>
                    <option value="EXPWOP">Export without Payment</option>
                  </select>
                </div>
                <div className="fg"><label className="flbl">HSN Code</label>
                  <select className="fselect" value={hsnCode} onChange={e=>setHsnCode(e.target.value)}>
                    <option value="1006">1006 — Rice</option>
                    <option value="10061010">10061010 — Paddy (in husk)</option>
                    <option value="10062000">10062000 — Husked (Brown) Rice</option>
                    <option value="10063020">10063020 — Milled / Semi-milled Rice</option>
                    <option value="10064000">10064000 — Broken Rice</option>
                    <option value="1102">1102 — Rice flour / Bran</option>
                  </select>
                </div>
              </div>
              <div className="frow">
                <div className="fg"><label className="flbl">GST Type</label>
                  <div style={{display:'flex',gap:8}}>
                    {[[false,'Intra-State (CGST+SGST)'],[true,'Inter-State (IGST)']].map(([v,l])=>(
                      <div key={String(v)} onClick={()=>setIgst(v)}
                        style={{flex:1,padding:'8px 10px',borderRadius:8,border:`2px solid ${igst===v?'var(--primary)':'var(--border)'}`,background:igst===v?'var(--primary-dim)':'var(--surface2)',cursor:'pointer',fontSize:12,fontWeight:600,color:igst===v?'var(--primary)':'var(--text2)',textAlign:'center'}}>
                        {l}
                      </div>
                    ))}
                  </div>
                </div>
                <div className="fg"><label className="flbl">GST Rate %</label>
                  <select className="fselect" value={gstRate} onChange={e=>setGstRate(+e.target.value)}>
                    <option value={0}>0% (Nil Rated)</option>
                    <option value={5}>5%</option>
                    <option value={12}>12%</option>
                    <option value={18}>18%</option>
                    <option value={28}>28%</option>
                  </select>
                </div>
              </div>
              <div className="divider"/>
              <div className="sec-ttl mb12">🔐 IRN / Acknowledgement (after portal submission)</div>
              <div className="fg"><label className="flbl">IRN (Invoice Reference Number)</label><input className="finput mono" value={irn} onChange={e=>setIrn(e.target.value)} placeholder="64-char IRN from IRP portal"/></div>
              <div className="frow">
                <div className="fg"><label className="flbl">Ack Number</label><input className="finput mono" value={ackNo} onChange={e=>setAckNo(e.target.value)} placeholder="Acknowledgement No"/></div>
                <div className="fg"><label className="flbl">Ack Date</label><input type="date" className="finput" value={ackDate} onChange={e=>setAckDate(e.target.value)}/></div>
              </div>
            </div>

            {/* Right: Tax Summary */}
            <div>
              <div className="sec-ttl mb12">💰 Tax Computation</div>
              <div style={{background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:10,padding:16}}>
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:8,paddingBottom:8,borderBottom:'1px solid var(--border)'}}>
                  <div>
                    <div style={{fontSize:11,color:'var(--text3)',fontWeight:700,textTransform:'uppercase'}}>Seller</div>
                    <div style={{fontWeight:700,fontSize:14}}>{fs.name||'Your Firm'}</div>
                    <div style={{fontSize:12,color:'var(--text3)',fontFamily:'monospace'}}>{fs.gstin||'GSTIN not set'}</div>
                    <div style={{fontSize:11,color:'var(--text3)'}}>{fs.city}, {fs.state} — {fs.stateCode}</div>
                  </div>
                  <div style={{textAlign:'right'}}>
                    <div style={{fontSize:11,color:'var(--text3)',fontWeight:700,textTransform:'uppercase'}}>{isPaddy?'Buyer':'Buyer'}</div>
                    <div style={{fontWeight:700,fontSize:14}}>{party?.name||'—'}</div>
                    <div style={{fontSize:12,color:'var(--text3)',fontFamily:'monospace'}}>{party?.gst||'No GSTIN'}</div>
                    <div style={{fontSize:11,color:'var(--text3)'}}>{party?.address||'—'}</div>
                  </div>
                </div>
                <div className="sum-row"><span className="c-muted">Taxable Value</span><span className="bold">{fmt(taxableAmt,2)}</span></div>
                <div className="sum-row"><span className="c-muted">HSN Code</span><span className="bold mono">{hsnCode}</span></div>
                <div className="sum-row"><span className="c-muted">GST Rate</span><span className="bold">{gstRate}%</span></div>
                {igst
                  ?<div className="sum-row c-blue"><span>IGST @ {gstRate}%</span><span className="bold">{fmt(igstAmt,2)}</span></div>
                  :<>
                    <div className="sum-row" style={{color:'var(--teal)'}}><span>CGST @ {gstRate/2}%</span><span className="bold">{fmt(cgstAmt,2)}</span></div>
                    <div className="sum-row" style={{color:'var(--teal)'}}><span>SGST @ {gstRate/2}%</span><span className="bold">{fmt(sgstAmt,2)}</span></div>
                  </>
                }
                <div className="sum-row sum-total"><span>Grand Total</span><span className="c-green">{fmt(grandTotal,2)}</span></div>
                {gstRate===0&&<div style={{fontSize:11,color:'var(--text3)',marginTop:8,background:'var(--surface3)',borderRadius:6,padding:'6px 10px'}}>ℹ️ Paddy and rice are exempt / nil-rated under GST. Select 0% unless specifically applicable.</div>}
              </div>

              {/* Items */}
              <div style={{marginTop:14}}>
                <div style={{fontSize:11,fontWeight:700,color:'var(--text3)',textTransform:'uppercase',marginBottom:8}}>Line Items</div>
                {bill.items.map((item,i)=>{
                  const q=state.qualities.find(qq=>qq.id===item.qualityId);
                  const wt=(item.totalWeightKg||item.totalWeight||0)/100;
                  const amt=item.totalAmt||item.amount||0;
                  return(
                    <div key={i} style={{display:'flex',justifyContent:'space-between',padding:'6px 10px',background:'var(--surface)',border:'1px solid var(--border)',borderRadius:6,marginBottom:4,fontSize:12}}>
                      <div>
                        <span className={`pill ${isPaddy?'p-orange':'p-teal'}`} style={{fontSize:10}}>{q?.name||item.itemName||'Item'}</span>
                        <span className="c-muted" style={{marginLeft:8}}>{wt.toFixed(2)} Q · {item.bags||''} bags</span>
                      </div>
                      <span className="bold">{fmt(amt)}</span>
                    </div>
                  );
                })}
              </div>
            </div>
          </div>

          {/* IRN Notice */}
          <div className="alert" style={{background:'var(--amber-dim)',border:'1px solid rgba(212,132,10,.2)',color:'var(--amber)',fontSize:12}}>
            ℹ️ <b>How to generate IRN:</b> After filling details above, save to bill record, then submit the JSON data to the GST IRP portal (invoice.gst.gov.in). Paste the IRN and Ack No back here and re-print with the QR code.
          </div>
        </div>
        <div className="mfoot">
          <button className="btn btn-ghost" onClick={onClose}>Close</button>
          {save&&<button className="btn btn-success" onClick={doSaveToRecord}>💾 Save to Bill</button>}
          <button className="btn btn-blue" onClick={doPrintEInvoice}>🖨️ Print E-Invoice</button>
        </div>
      </div>
    </div>
  );
}

/* ─── BUILD E-INVOICE HTML (print) ──────────────────────── */
function buildEInvoiceHTML({bill,state,billType,einvNo,einvDate,supplyType,igst,gstRate,hsnCode,irn,ackNo,ackDate,taxableAmt,gstAmt,igstAmt,cgstAmt,sgstAmt,grandTotal}){
  const fs=state.firmSettings||{};
  const party=state.parties.find(p=>p.id===bill.partyId);
  const isPaddy=billType==='paddy';
  const totalWt=bill.items.reduce((s,i)=>s+(i.totalWeightKg||i.totalWeight||0),0);
  const totalBags=bill.items.reduce((s,i)=>s+(+i.bags||0),0);

  const numToWords=(n)=>{
    const a=['','One','Two','Three','Four','Five','Six','Seven','Eight','Nine','Ten','Eleven','Twelve','Thirteen','Fourteen','Fifteen','Sixteen','Seventeen','Eighteen','Nineteen'];
    const b=['','','Twenty','Thirty','Forty','Fifty','Sixty','Seventy','Eighty','Ninety'];
    const inr=Math.floor(n);
    const fn=(num)=>{
      if(num<20) return a[num];
      if(num<100) return b[Math.floor(num/10)]+(num%10?' '+a[num%10]:'');
      if(num<1000) return a[Math.floor(num/100)]+' Hundred'+(num%100?' '+fn(num%100):'');
      if(num<100000) return fn(Math.floor(num/1000))+' Thousand'+(num%1000?' '+fn(num%1000):'');
      if(num<10000000) return fn(Math.floor(num/100000))+' Lakh'+(num%100000?' '+fn(num%100000):'');
      return fn(Math.floor(num/10000000))+' Crore'+(num%10000000?' '+fn(num%10000000):'');
    };
    return (fn(inr)||'Zero')+' Rupees Only';
  };

  const itemRows=bill.items.map((item,i)=>{
    const q=state.qualities.find(qq=>qq.id===item.qualityId);
    const wt=(item.totalWeightKg||item.totalWeight||0)/100;
    const amt=item.totalAmt||item.amount||0;
    const itemGst=amt*(gstRate/100);
    return `<tr>
      <td style="text-align:center">${i+1}</td>
      <td>${q?.name||item.itemName||'Item'}</td>
      <td style="text-align:center">${hsnCode}</td>
      <td style="text-align:center">${item.bags||'—'}</td>
      <td style="text-align:right">${(item.totalWeightKg||item.totalWeight||0).toLocaleString('en-IN')} KG</td>
      <td style="text-align:right">${wt.toFixed(2)}</td>
      <td style="text-align:right">₹${(item.rate||0).toLocaleString('en-IN')}</td>
      <td style="text-align:right">₹${amt.toLocaleString('en-IN',{minimumFractionDigits:2,maximumFractionDigits:2})}</td>
      <td style="text-align:right">${gstRate}%</td>
      <td style="text-align:right">₹${itemGst.toLocaleString('en-IN',{minimumFractionDigits:2,maximumFractionDigits:2})}</td>
      <td style="text-align:right;font-weight:700">₹${(amt+itemGst).toLocaleString('en-IN',{minimumFractionDigits:2,maximumFractionDigits:2})}</td>
    </tr>`;
  }).join('');

  const qrData=`IRN:${irn||'PENDING'}|InvNo:${einvNo}|Date:${einvDate}|GSTIN:${fs.gstin||''}|Amt:${grandTotal.toFixed(2)}`;

  return `<style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:Arial,sans-serif;font-size:11px;color:#111;background:#fff}
    .page{width:100%;padding:16px}
    .header{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:2px solid #2d6a4f;padding-bottom:10px;margin-bottom:10px}
    .brand{font-size:20px;font-weight:900;color:#2d6a4f}
    .firm-info{font-size:10px;color:#444;line-height:1.6;margin-top:3px}
    .inv-box{text-align:right}
    .inv-title{font-size:14px;font-weight:900;color:#1a6ea8;text-transform:uppercase;letter-spacing:1px}
    .inv-no{font-size:18px;font-weight:900;color:#2d6a4f;margin:2px 0}
    .parties{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:10px}
    .party-box{border:1px solid #ddd;border-radius:6px;padding:8px 10px}
    .party-lbl{font-size:9px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px}
    .party-name{font-size:13px;font-weight:700;color:#111}
    .party-gstin{font-size:10px;font-family:monospace;color:#444}
    table{width:100%;border-collapse:collapse;margin-bottom:8px}
    th{background:#2d6a4f;color:#fff;padding:5px 7px;font-size:9px;text-transform:uppercase;letter-spacing:.6px;border:1px solid #1a5c3e}
    td{padding:5px 7px;border:1px solid #e0e0e0;font-size:10px}
    tr:nth-child(even) td{background:#f9fdf9}
    tfoot td{background:#e8f5e9;font-weight:700;border-top:2px solid #2d6a4f}
    .tax-box{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:10px}
    .tax-summary{border:1px solid #ddd;border-radius:6px;padding:10px;font-size:11px}
    .tax-row{display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid #f0f0f0}
    .tax-total{display:flex;justify-content:space-between;padding:6px 0;font-size:14px;font-weight:900;border-top:2px solid #2d6a4f;color:#2d6a4f;margin-top:4px}
    .bank-box{border:1px solid #ddd;border-radius:6px;padding:10px;font-size:10px;line-height:1.8}
    .irn-box{border:2px solid #2d6a4f;border-radius:6px;padding:10px;margin-bottom:10px;background:#f9fdf9}
    .irn-lbl{font-size:9px;font-weight:700;color:#2d6a4f;text-transform:uppercase;letter-spacing:.8px}
    .irn-val{font-family:monospace;font-size:10px;word-break:break-all;color:#111;margin-top:2px}
    .qr-area{text-align:center;border:1px solid #ddd;border-radius:6px;padding:10px}
    .qr-code{width:90px;height:90px;background:repeating-conic-gradient(#2d6a4f 0% 25%,#fff 0% 50%) 0 0/8px 8px;border:2px solid #2d6a4f;margin:0 auto}
    .footer-sigs{display:flex;justify-content:space-between;margin-top:20px;padding-top:10px;border-top:1px solid #ddd}
    .sig-box{text-align:center;width:160px}
    .sig-line{border-top:1px solid #999;margin-top:35px;padding-top:5px;font-size:10px;color:#555}
    .words{font-style:italic;font-size:10px;color:#555;margin:6px 0 10px}
    .status-badge{display:inline-block;padding:2px 10px;border-radius:20px;font-size:10px;font-weight:700;background:${irn?'#e8f5e9':'#fff3cd'};color:${irn?'#2d6a4f':'#b45309'};border:1px solid ${irn?'#2d6a4f':'#d4840a'}}
  </style>
  <div class="page">
    <div class="header">
      <div>
        <div class="brand">${fs.logoText||'🌾 '+fs.name||'Shubham Industries'}</div>
        <div class="firm-info">
          ${fs.address?fs.address+'<br>':''}${fs.city||''}${fs.state?', '+fs.state:''} — ${fs.pincode||''}<br>
          <b>GSTIN:</b> ${fs.gstin||'—'} &nbsp;|&nbsp; <b>PAN:</b> ${fs.pan||'—'}<br>
          📞 ${fs.phone||'—'} &nbsp;|&nbsp; ✉️ ${fs.email||'—'}
        </div>
      </div>
      <div class="inv-box">
        <div class="inv-title">GST Tax Invoice</div>
        <div class="inv-no">${einvNo}</div>
        <div style="font-size:10px;color:#555">Date: <b>${einvDate}</b></div>
        <div style="margin-top:4px"><span class="status-badge">${irn?'✅ IRN Generated':'⏳ IRN Pending'}</span></div>
        <div style="font-size:9px;color:#888;margin-top:2px">Supply Type: ${supplyType}</div>
      </div>
    </div>

    ${irn?`<div class="irn-box">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div style="flex:1">
          <div class="irn-lbl">IRN (Invoice Reference Number)</div>
          <div class="irn-val">${irn}</div>
          <div style="margin-top:6px;display:flex;gap:16px">
            <div><span class="irn-lbl">Ack No:</span> <span class="irn-val">${ackNo||'—'}</span></div>
            <div><span class="irn-lbl">Ack Date:</span> <span class="irn-val">${ackDate||'—'}</span></div>
          </div>
        </div>
        <div class="qr-area" style="margin-left:12px;min-width:110px">
          <div class="qr-code"></div>
          <div style="font-size:8px;color:#888;margin-top:4px">Scan to verify</div>
        </div>
      </div>
    </div>`:'<div style="background:#fff3cd;border:1px solid #d4840a;border-radius:6px;padding:8px 12px;margin-bottom:10px;font-size:10px;color:#b45309">⏳ IRN not yet generated. Submit to IRP portal and update the IRN in the app to enable QR code.</div>'}

    <div class="parties">
      <div class="party-box">
        <div class="party-lbl">${isPaddy?'Buyer (Bill To)':'Seller (Bill From)'}</div>
        <div class="party-name">${fs.name||'—'}</div>
        <div class="party-gstin">GSTIN: ${fs.gstin||'Not Set'}</div>
        <div style="font-size:10px;color:#555">${fs.address||''} ${fs.city||''}, ${fs.state||''} — ${fs.pincode||''}</div>
      </div>
      <div class="party-box">
        <div class="party-lbl">${isPaddy?'Supplier (Bill From)':'Buyer (Bill To)'}</div>
        <div class="party-name">${party?.name||'—'}</div>
        <div class="party-gstin">GSTIN: ${party?.gst||'Unregistered'}</div>
        <div style="font-size:10px;color:#555">${party?.address||'—'}</div>
        <div style="font-size:10px;color:#555">📞 ${party?.phone||'—'}</div>
      </div>
    </div>

    <table>
      <thead><tr>
        <th style="width:28px">#</th>
        <th>Description of Goods</th>
        <th>HSN</th>
        <th>Bags</th>
        <th style="text-align:right">Total KG</th>
        <th style="text-align:right">Quintals</th>
        <th style="text-align:right">Rate/Q</th>
        <th style="text-align:right">Taxable Amt</th>
        <th style="text-align:right">GST%</th>
        <th style="text-align:right">GST Amt</th>
        <th style="text-align:right">Total Amt</th>
      </tr></thead>
      <tbody>${itemRows}</tbody>
      <tfoot><tr>
        <td></td>
        <td><b>TOTAL</b></td>
        <td style="text-align:center">${hsnCode}</td>
        <td style="text-align:center">${totalBags}</td>
        <td style="text-align:right">${totalWt.toLocaleString('en-IN')} KG</td>
        <td style="text-align:right">${(totalWt/100).toFixed(2)} Q</td>
        <td></td>
        <td style="text-align:right">₹${taxableAmt.toLocaleString('en-IN',{minimumFractionDigits:2})}</td>
        <td></td>
        <td style="text-align:right">₹${gstAmt.toLocaleString('en-IN',{minimumFractionDigits:2})}</td>
        <td style="text-align:right">₹${grandTotal.toLocaleString('en-IN',{minimumFractionDigits:2})}</td>
      </tr></tfoot>
    </table>

    <div class="tax-box">
      <div class="tax-summary">
        <div style="font-weight:700;font-size:11px;margin-bottom:6px;color:#2d6a4f">TAX BREAKDOWN</div>
        <div class="tax-row"><span>Taxable Value</span><span><b>₹${taxableAmt.toLocaleString('en-IN',{minimumFractionDigits:2})}</b></span></div>
        ${igst
          ?`<div class="tax-row"><span>IGST @ ${gstRate}%</span><span>₹${igstAmt.toLocaleString('en-IN',{minimumFractionDigits:2})}</span></div>`
          :`<div class="tax-row"><span>CGST @ ${gstRate/2}%</span><span>₹${cgstAmt.toLocaleString('en-IN',{minimumFractionDigits:2})}</span></div>
           <div class="tax-row"><span>SGST @ ${gstRate/2}%</span><span>₹${sgstAmt.toLocaleString('en-IN',{minimumFractionDigits:2})}</span></div>`
        }
        <div class="tax-total"><span>GRAND TOTAL</span><span>₹${grandTotal.toLocaleString('en-IN',{minimumFractionDigits:2})}</span></div>
        <div class="words">Amount in words: <i>${numToWords(Math.round(grandTotal))}</i></div>
        ${gstRate===0?'<div style="font-size:9px;color:#888;padding:4px;background:#f5f5f5;border-radius:4px">Note: Goods exempt / nil-rated under GST. No tax applicable.</div>':''}
      </div>
      <div class="bank-box">
        <div style="font-weight:700;font-size:11px;margin-bottom:4px;color:#2d6a4f">PAYMENT DETAILS</div>
        <div><b>Bank:</b> ${fs.bankName||'—'}</div>
        <div><b>A/C No:</b> ${fs.accountNo||'—'}</div>
        <div><b>IFSC:</b> ${fs.ifsc||'—'}</div>
        <div><b>Branch:</b> ${fs.branch||'—'}</div>
        <div style="margin-top:6px;padding-top:6px;border-top:1px solid #eee">
          <b>Ref Bill:</b> ${bill.billNo} &nbsp;|&nbsp; <b>Dated:</b> ${bill.date}
        </div>
      </div>
    </div>

    <div style="font-size:9px;color:#888;margin-bottom:8px;padding:6px;background:#f9fdf9;border-radius:4px">
      This is a computer generated invoice. | Subject to ${fs.city||'local'} jurisdiction.
      ${supplyType==='B2B'?'| E-Invoice generated as per GST Rule 48(4) — valid only with IRN.':''}
    </div>

    <div class="footer-sigs">
      <div class="sig-box"><div class="sig-line">Receiver's Signature</div></div>
      <div style="text-align:center;font-size:9px;color:#888">Generated: ${new Date().toLocaleDateString('en-IN')}</div>
      <div class="sig-box"><div class="sig-line">For ${fs.name||'Shubham Industries'}<br>Authorised Signatory</div></div>
    </div>
  </div>`;
}

/* ─── E-INVOICES LIST PAGE ───────────────────────────────── */
function EInvoices({state,save}){
  const [viewBill,setViewBill]=useState(null);
  const [viewBillType,setViewBillType]=useState('paddy');

  const allBills=[
    ...(state.paddyBills||[]).map(b=>({...b,_type:'paddy'})),
    ...(state.riceSaleBills||[]).map(b=>({...b,_type:'rice'})),
  ].sort((a,b)=>b.date.localeCompare(a.date));

  const withEInv=allBills.filter(b=>b.einvoiceNo);
  const withoutEInv=allBills.filter(b=>!b.einvoiceNo);

  return(
    <>
      <div className="topbar">
        <h2>🧾 E-Invoices</h2>
        <div className="topbar-right">
          <span className="c-muted" style={{fontSize:12}}>{withEInv.length} generated · {withoutEInv.length} pending</span>
        </div>
      </div>
      <div className="content">
        <div className="g3 mb16">
          <div className="stat-card bl-green">
            <div className="stat-lbl">Generated</div>
            <div className="stat-val c-green">{withEInv.length}</div>
            <div className="stat-sub">{withEInv.filter(b=>b.einvoiceIRN).length} with IRN · {withEInv.filter(b=>!b.einvoiceIRN).length} pending IRN</div>
          </div>
          <div className="stat-card bl-accent">
            <div className="stat-lbl">Not Yet Generated</div>
            <div className="stat-val c-accent">{withoutEInv.length}</div>
            <div className="stat-sub">Bills without e-invoice</div>
          </div>
          <div className="stat-card bl-blue">
            <div className="stat-lbl">Firm GSTIN</div>
            <div className="stat-val" style={{fontSize:14,fontFamily:'monospace'}}>{state.firmSettings?.gstin||'Not Set'}</div>
            <div className="stat-sub">{state.firmSettings?.name||'Configure in Firm Settings'}</div>
          </div>
        </div>

        {!state.firmSettings?.gstin&&<div className="alert alert-err mb16">⚠️ Your firm GSTIN is not set. Go to ⚙️ Firm Settings before generating e-invoices.</div>}

        {/* Generated E-Invoices */}
        <div className="card mb16">
          <div className="sec-hdr mb12">
            <div className="sec-ttl">✅ Generated E-Invoices</div>
          </div>
          <div className="twrap">
            <table>
              <thead><tr>
                <th>E-Invoice No</th><th>Bill No</th><th>Date</th><th>Type</th>
                <th>Party</th><th style={{textAlign:'right'}}>Amount</th>
                <th>IRN Status</th><th>Actions</th>
              </tr></thead>
              <tbody>
                {withEInv.length===0&&<tr><td colSpan={8}><div className="empty"><div className="empty-ico">🧾</div><p>No e-invoices generated yet. Open any bill and click "🧾 E-Invoice".</p></div></td></tr>}
                {withEInv.map(b=>{
                  const party=(state.parties||[]).find(p=>p.id===b.partyId);
                  return(
                    <tr key={b.id}>
                      <td className="bold mono" style={{color:'var(--blue)',fontSize:12}}>{b.einvoiceNo}</td>
                      <td className="bold" style={{color:b._type==='paddy'?'var(--accent)':'var(--teal)'}}>{b.billNo}</td>
                      <td className="c-muted" style={{fontSize:12}}>{b.einvoiceDate||b.date}</td>
                      <td><span className={`pill ${b._type==='paddy'?'p-orange':'p-teal'}`}>{b._type==='paddy'?'Paddy Purchase':'Rice Sale'}</span></td>
                      <td>{party?.name||'—'}</td>
                      <td className="bold" style={{textAlign:'right'}}>{fmt(b.totalAmount)}</td>
                      <td>
                        {b.einvoiceIRN
                          ?<span className="pill p-green">✅ IRN Set</span>
                          :<span className="pill p-orange">⏳ Pending IRN</span>}
                      </td>
                      <td>
                        <div className="tda">
                          <button className="btn btn-blue btn-xs" onClick={()=>{setViewBill(b);setViewBillType(b._type);}}>🧾 View/Edit</button>
                        </div>
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </div>

        {/* Bills without e-invoice */}
        <div className="card">
          <div className="sec-hdr mb12">
            <div className="sec-ttl">📋 Bills Without E-Invoice</div>
            <span className="c-muted" style={{fontSize:12}}>Click "Generate" to create an e-invoice for any bill</span>
          </div>
          <div className="twrap">
            <table>
              <thead><tr>
                <th>Bill No</th><th>Date</th><th>Type</th><th>Party</th>
                <th style={{textAlign:'right'}}>Amount</th><th>Status</th><th>Action</th>
              </tr></thead>
              <tbody>
                {withoutEInv.length===0&&<tr><td colSpan={7}><div className="empty"><div className="empty-ico">🎉</div><p>All bills have e-invoices!</p></div></td></tr>}
                {withoutEInv.map(b=>{
                  const party=(state.parties||[]).find(p=>p.id===b.partyId);
                  return(
                    <tr key={b.id}>
                      <td className="bold" style={{color:b._type==='paddy'?'var(--accent)':'var(--teal)'}}>{b.billNo}</td>
                      <td className="c-muted" style={{fontSize:12}}>{b.date}</td>
                      <td><span className={`pill ${b._type==='paddy'?'p-orange':'p-teal'}`}>{b._type==='paddy'?'Paddy':'Rice Sale'}</span></td>
                      <td>{party?.name||'—'}</td>
                      <td style={{textAlign:'right'}}>{fmt(b.totalAmount)}</td>
                      <td><span className={`pill ${b.status==='paid'?'p-green':b.status==='partial'?'p-orange':'p-gray'}`}>{b.status}</span></td>
                      <td>
                        <button className="btn btn-primary btn-xs" onClick={()=>{setViewBill(b);setViewBillType(b._type);}}>🧾 Generate</button>
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </div>
      </div>

      {viewBill&&<EInvoiceModal
        bill={viewBill}
        state={state}
        billType={viewBillType}
        save={save}
        onClose={()=>setViewBill(null)}
      />}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
