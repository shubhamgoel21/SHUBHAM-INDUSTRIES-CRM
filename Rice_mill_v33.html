/* ─── STOCK MANAGER ────────────────────────────────────── */
function StockManager({state}){
  const [fParty,setFParty]=useState('');
  const [fQuality,setFQuality]=useState('');
  const rows=[];
  state.paddyBills.forEach(b=>{
    if(fParty&&b.partyId!==fParty)return;
    b.items.forEach(item=>{
      if(fQuality&&item.qualityId!==fQuality)return;
      const q=state.qualities.find(qq=>qq.id===item.qualityId);
      const party=state.parties.find(p=>p.id===b.partyId);
      rows.push({billNo:b.billNo,date:b.date,party:party?.name||'—',quality:q?.name||'—',bags:item.bags,weight:item.totalWeight/100,rate:item.rate,amount:item.amount});
    });
  });
  const totWt=rows.reduce((s,r)=>s+r.weight,0);
  const totAmt=rows.reduce((s,r)=>s+r.amount,0);
  return(
    <>
      <div className="topbar"><h2>Stock Manager</h2></div>
      <div className="content">
        <div className="card mb16">
          <div className="frow">
            <div className="fg" style={{margin:0}}><label className="flbl">Filter: Party</label><select className="fselect" value={fParty} onChange={e=>setFParty(e.target.value)}><option value="">All Parties</option>{state.parties.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}</select></div>
            <div className="fg" style={{margin:0}}><label className="flbl">Filter: Quality</label><select className="fselect" value={fQuality} onChange={e=>setFQuality(e.target.value)}><option value="">All Qualities</option>{renderQualityOptions(state,'paddy')}</select></div>
          </div>
        </div>
        <div className="g3 mb16">
          <div className="stat-card bl-accent"><div className="stat-lbl">Total Stock</div><div className="stat-val c-accent">{totWt.toFixed(2)} Q</div></div>
          <div className="stat-card bl-green"><div className="stat-lbl">Total Value</div><div className="stat-val c-green">{fmt(totAmt)}</div></div>
          <div className="stat-card bl-blue"><div className="stat-lbl">Avg Rate/Q</div><div className="stat-val c-blue">{totWt>0?fmt(totAmt/totWt):'—'}</div></div>
        </div>
        <div className="card">
          <div className="twrap"><table>
            <thead><tr><th>Bill No</th><th>Date</th><th>Party</th><th>Quality</th><th>Bags</th><th>Weight (Q)</th><th>Rate/Q</th><th>Amount</th></tr></thead>
            <tbody>
              {rows.length===0&&<tr><td colSpan={8}><div className="empty"><div className="empty-ico">📊</div><p>No stock data</p></div></td></tr>}
              {rows.map((r,i)=><tr key={i}>
                <td className="c-accent bold">{r.billNo}</td><td className="c-muted">{r.date}</td>
                <td>{r.party}</td><td><span className="pill p-orange">{r.quality}</span></td>
                <td>{r.bags}</td><td className="bold">{r.weight.toFixed(2)}</td>
                <td>{fmt(r.rate)}</td><td className="c-green bold">{fmt(r.amount)}</td>
              </tr>)}
              {rows.length>0&&<tr style={{background:'var(--surface3)',fontWeight:700}}>
                <td colSpan={5} className="tr bold">TOTALS →</td>
                <td className="c-accent">{totWt.toFixed(2)}</td><td>—</td><td className="c-green">{fmt(totAmt)}</td>
              </tr>}
            </tbody>
          </table></div>
        </div>
      </div>
    </>
  );
}

/* ─── SHARE BUTTONS ─────────────────────────────────────── */
function ShareButtons({bill,state,billType}){
  const [showEInv,setShowEInv]=useState(false);
  const doPrint=()=>{
    const html=buildBillHTML(bill,state,billType);
    printBillHTML(html);
  };
  const doWhatsApp=()=>{
    const party=state.parties.find(p=>p.id===bill.partyId);
    const totalWt=bill.items.reduce((s,i)=>s+(i.totalWeightKg||i.totalWeight||0),0)/100;
    const lines=[
      `*${billType==='paddy'?'PADDY PURCHASE':'RICE SALE'} BILL*`,
      `Bill No: ${bill.billNo}`,
      `Date: ${bill.date}`,
      `Party: ${party?.name||'—'}`,
      ``,
      ...bill.items.map(item=>{
        const q=state.qualities.find(qq=>qq.id===item.qualityId);
        return `• ${q?.name||item.itemName||'Item'}: ${item.bags||''} bags × ${item.weightPerBag||item.weightKg||0}kg = ${((item.totalWeightKg||item.totalWeight||0)/100).toFixed(2)}Q @ ₹${item.rate}/Q = ₹${(item.totalAmt||item.amount||0).toLocaleString('en-IN')}`;
      }),
      ``,
      `Total Weight: ${totalWt.toFixed(2)} Q`,
      `*Net Amount: ₹${(+bill.totalAmount||0).toLocaleString('en-IN')}*`,
    ];
    const text=encodeURIComponent(lines.join('\n'));
    const phone=party?.phone?party.phone.replace(/\D/g,''):'';
    window.open(`https://wa.me/${phone?'91'+phone:''}?text=${text}`,'_blank');
  };
  return(
    <div className="fxc gap6">
      <button className="btn btn-ghost btn-sm" onClick={doPrint}>🖨️ Print</button>
      <button className="btn btn-success btn-sm" onClick={doWhatsApp}>📱 WhatsApp</button>
      <button className="btn btn-blue btn-sm" onClick={()=>setShowEInv(true)}>🧾 E-Invoice</button>
      {showEInv&&<EInvoiceModal bill={bill} state={state} billType={billType} onClose={()=>setShowEInv(false)} save={null}/>}
    </div>
  );
}

/* ─── PADDY BILLS ──────────────────────────────────────── */
function PaddyBills({state,save,setPage}){
  const [modal,setModal]=useState(null);   // null | {edit:bool}
  const [viewBill,setViewBill]=useState(null);
  const [form,setForm]=useState(()=>blankBill());
  const [err,setErr]=useState('');
  // Quick-create order modal
  const [newOrderModal,setNewOrderModal]=useState(false);
  const [orderForm,setOrderForm]=useState({});

  /* ── blank structures ── */
  function blankLine(itemGroup){
    return {
      id:uid(),
      qualityId:'',               // subtype quality id
      bagType:'bori',             // 'bori' | 'katte'
      bags:'',
      weightPerBag:50,
      totalWeightKg:0,
      rate:'',
      amount:0,
      manualAmount:false,
      customAmount:0,
    };
  }
  function blankBill(b){
    if(b) return {
      ...b,
      lines:(b.lines||b.items||[]).map(l=>({...l})),
      expenses:(b.expenses||b.partyExpenses||[]).map(e=>({...e})),
      freight:{...( b.freight||{type:'included',amount:0})},
    };
    return {
      id:null, billNo:'', date:tod(),
      itemGroupKey:'',   // subtype|||category key
      orderId:'',
      partyId:'',
      lines:[blankLine()],
      expenses:[],
      freight:{type:'included',amount:0,vehicleId:'',advancePaid:0},
      warehouseId:'',
      status:'unpaid',
      totalAmount:0,
    };
  }

  /* ── calc helpers ── */
  function calcLine(l){
    const bags=+l.bags||0, wpb=+l.weightPerBag||0;
    const totalWeightKg=bags*wpb;
    const rate=+l.rate||0;
    const auto=(totalWeightKg/100)*rate;
    const amount=l.manualAmount?(+l.customAmount||0):auto;
    return {...l, totalWeightKg, amount};
  }
  function calcTotal(f){
    const linesTotal=(f.lines||[]).reduce((s,l)=>s+l.amount,0);
    const expTotal=(f.expenses||[]).reduce((s,e)=>s+(+e.amt||0),0);
    const frAmt=f.freight?.type==='pay'?(+f.freight.amount||0):0;
    return +(linesTotal + expTotal + frAmt).toFixed(2);
  }

  /* ── line updaters ── */
  const updLine=(idx,patch)=>setForm(f=>{
    const lines=[...f.lines];
    lines[idx]=calcLine({...lines[idx],...patch});
    return {...f, lines, totalAmount:calcTotal({...f,lines})};
  });
  const addLine=()=>setForm(f=>{
    const lines=[...f.lines, blankLine()];
    // carry rate from order if linked
    const ord=f.orderId?(state.orders||[]).find(o=>o.id===f.orderId):null;
    if(ord) lines[lines.length-1]={...lines[lines.length-1], rate:ord.rate||''};
    return {...f, lines};
  });
  const remLine=idx=>setForm(f=>{
    const lines=f.lines.filter((_,i)=>i!==idx);
    return {...f, lines, totalAmount:calcTotal({...f,lines})};
  });

  /* ── expense updaters ── */
  const addExp=()=>setForm(f=>({...f,expenses:[...f.expenses,{id:uid(),typeId:'',note:'',usePercent:false,pct:0,amt:0}]}));
  const updExp=(idx,patch)=>setForm(f=>{
    const expenses=[...f.expenses];
    expenses[idx]={...expenses[idx],...patch};
    if(expenses[idx].usePercent){
      const base=(f.lines||[]).reduce((s,l)=>s+l.amount,0);
      expenses[idx].amt=+(base*(+expenses[idx].pct||0)/100).toFixed(2);
    }
    return {...f, expenses, totalAmount:calcTotal({...f,expenses})};
  });
  const remExp=idx=>setForm(f=>{
    const expenses=f.expenses.filter((_,i)=>i!==idx);
    return {...f, expenses, totalAmount:calcTotal({...f,expenses})};
  });

  const updFreight=(patch)=>setForm(f=>{
    const freight={...f.freight,...patch};
    return {...f, freight, totalAmount:calcTotal({...f,freight})};
  });

  /* ── item group helpers ── */
  const allGroups=React.useMemo(()=>{
    const fromQ=[...new Map((state.qualities||[]).map(q=>{
      const k=`${q.subtype||''}|||${q.type||''}`;
      return [k,{key:k,subtype:q.subtype||'',category:q.type||'other'}];
    })).values()];
    const fromCat=(state.itemCategories||[])
      .filter(ic=>!fromQ.some(g=>g.subtype===ic.name&&g.category===ic.category))
      .map(ic=>({key:`${ic.name}|||${ic.category}`,subtype:ic.name,category:ic.category}));
    return [...fromQ,...fromCat].sort((a,b)=>a.subtype.localeCompare(b.subtype));
  },[state.qualities,state.itemCategories]);

  const selGroup=form.itemGroupKey?allGroups.find(g=>g.key===form.itemGroupKey):null;

  // qualities (subtypes) for the selected item group
  const groupQualities=selGroup
    ?(state.qualities||[]).filter(q=>(q.subtype||'')===selGroup.subtype&&(q.type||'')===selGroup.category)
    :[];

  // purchase expense types for selected item
  const itemPurchaseExps=selGroup
    ?(((state.itemExpenseTypes||{})[selGroup.key]||{}).purchase||[])
    :[];

  // ongoing purchase orders for selected item
  const relevantOrders=React.useMemo(()=>{
    if(!selGroup) return [];
    return (state.orders||[]).filter(o=>{
      if(o.status!=='ongoing') return false;
      // match by quality being in the selected group
      const q=(state.qualities||[]).find(qq=>qq.id===o.qualityId);
      if(q) return (q.subtype||'')===selGroup.subtype&&(q.type||'')===selGroup.category;
      // fallback: match by orderType→category mapping
      if(selGroup.category==='paddy'&&o.orderType==='paddy') return true;
      if(selGroup.category==='rice'&&(o.orderType==='rice'||o.orderType==='chilkha'||o.orderType==='phack'||o.orderType==='polish')) return true;
      return false;
    });
  },[selGroup,state.orders,state.qualities]);

  const linkedOrder=form.orderId?(state.orders||[]).find(o=>o.id===form.orderId):null;

  /* ── pick item group ── */
  function pickItemGroup(key){
    setForm(f=>({...blankBill(),billNo:f.billNo,date:f.date,itemGroupKey:key}));
  }

  /* ── pick order ── */
  function pickOrder(orderId){
    if(!orderId){setForm(f=>({...f,orderId:'',partyId:''}));return;}
    const o=(state.orders||[]).find(x=>x.id===orderId);
    if(!o) return;
    setForm(f=>{
      const lines=f.lines.map(l=>calcLine({...l,rate:o.rate||''}));
      return {...f, orderId:o.id, partyId:o.partyId||'', lines, totalAmount:calcTotal({...f,lines})};
    });
  }

  /* ── quick create order ── */
  function openNewOrder(){
    const nextNo='ORD-'+((state.orders||[]).length+1).toString().padStart(4,'0');
    setOrderForm({
      orderNo:nextNo, date:tod(),
      orderType: selGroup?.category==='paddy'?'paddy':selGroup?.category||'paddy',
      partyId:'', qualityId:'', quantity:'', rate:'',
      cd:0, dalali:0, brokerId:'', paidBy:'party', brokerName:'', status:'ongoing',
    });
    setNewOrderModal(true);
  }
  function saveNewOrder(){
    if(!orderForm.partyId||!orderForm.qualityId||!(+orderForm.quantity>0)||!(+orderForm.rate>0)){
      alert('Fill party, quality, quantity and rate');return;
    }
    const qty=+orderForm.quantity, rate=+orderForm.rate, cd=+orderForm.cd||0, dalali=+orderForm.dalali||0;
    const amt=orderForm.paidBy==='party'?qty*rate+cd-dalali:qty*rate+cd;
    const newOrder={...orderForm,id:uid(),quantity:qty,rate,cd,dalali,amount:amt};
    save(s=>({...s,orders:[...(s.orders||[]),newOrder]}));
    setNewOrderModal(false);
    // auto-link the new order
    setForm(f=>{
      const lines=f.lines.map(l=>calcLine({...l,rate:newOrder.rate||''}));
      return {...f,orderId:newOrder.id,partyId:newOrder.partyId,lines,totalAmount:calcTotal({...f,lines})};
    });
  }

  /* ── save bill ── */
  const doSave=()=>{
    if(!form.partyId){setErr('Select a party (link an order or fill manually)');return;}
    if(!form.billNo){setErr('Bill number is required');return;}
    if(!form.itemGroupKey){setErr('Select an item');return;}
    if(form.lines.some(l=>!l.qualityId)){setErr('Select quality for all line items');return;}
    if(!modal?.edit&&(state.paddyBills||[]).find(b=>b.billNo===form.billNo)){setErr('Bill number already exists');return;}
    setErr('');
    const bill={
      ...form,
      id:form.id||uid(),
      // keep legacy fields for BillView compatibility
      items:form.lines.map(l=>({qualityId:l.qualityId,bags:l.bags,weightPerBag:l.weightPerBag,totalWeight:l.totalWeightKg,rate:l.rate,amount:l.amount})),
      partyExpenses:form.expenses,
      fixedExpenses:{kachiAadat:0,pakkiAadat:0,labour:0},
      totalAmount:calcTotal(form),
    };
    if(modal?.edit){
      save(s=>{
        let ns={...s,paddyBills:s.paddyBills.map(b=>b.id===bill.id?bill:b)};
        if(bill.freight?.type==='pay'&&+bill.freight.amount>0){
          const linked=(s.freightEntries||[]).find(e=>e.linkedBillId===bill.id);
          if(linked) ns={...ns,freightEntries:ns.freightEntries.map(e=>e.id===linked.id?{...e,freightAmt:+bill.freight.amount,billRef:bill.billNo,date:bill.date}:e)};
        }
        return ns;
      });
    } else {
      save(s=>{
        let ns={...s,paddyBills:[...(s.paddyBills||[]),bill]};
        if(bill.freight?.type==='pay'&&+bill.freight.amount>0){
          const fe={id:uid(),date:bill.date,vehicleId:bill.freight.vehicleId||'',billRef:bill.billNo,billType:'paddy',tripType:'inward',freightAmt:+bill.freight.amount,dihadiAmt:0,shortageAmt:0,shortageQty:0,note:`Auto from ${bill.billNo}`,status:'unpaid',linkedBillId:bill.id,advancePaid:+bill.freight.advancePaid||0};
          ns={...ns,freightEntries:[...(ns.freightEntries||[]),fe]};
        }
        return ns;
      });
    }
    setModal(null);
  };
  const del=id=>{if(confirm('Delete bill?'))save(s=>({...s,paddyBills:s.paddyBills.filter(b=>b.id!==id)}));};

  // totals for summary
  const linesTotal=(form.lines||[]).reduce((s,l)=>s+l.amount,0);
  const expTotal=(form.expenses||[]).reduce((s,e)=>s+(+e.amt||0),0);
  const totalWtKg=(form.lines||[]).reduce((s,l)=>s+l.totalWeightKg,0);
  const totalBillAmt=calcTotal(form);

  // order progress
  function orderDoneQ(ordId){
    return (state.paddyBills||[]).filter(b=>b.orderId===ordId)
      .reduce((s,b)=>{
        const lines=b.lines||b.items||[];
        return s+lines.reduce((ss,l)=>ss+((l.totalWeightKg||l.totalWeight||0)/100),0);
      },0);
  }

  const CAT_CFG={
    paddy:{icon:'🌾',color:'var(--accent)',label:'Purchase'},
    rice: {icon:'🍚',color:'var(--teal)',  label:'Sale'},
    other:{icon:'📦',color:'var(--blue)', label:'Other'},
  };

  return(
    <>
      <div className="topbar">
        <h2>Purchase Bills</h2>
        <div className="topbar-right">
          <button className="btn btn-ghost" onClick={()=>setPage('orders')} style={{borderColor:'var(--primary)',color:'var(--primary)'}}>📋 Add Purchase Order</button>
          <button className="btn btn-primary" onClick={()=>{setForm(blankBill());setErr('');setModal({edit:false});}}>+ New Bill</button>
        </div>
      </div>
      <div className="content">
        {/* Bills table */}
        <div className="twrap">
          <table>
            <thead><tr><th>Bill No</th><th>Date</th><th>Item</th><th>Party</th><th>Bags</th><th>Wt (Q)</th><th>Amount</th><th>Status</th><th>Actions</th></tr></thead>
            <tbody>
              {(state.paddyBills||[]).length===0&&<tr><td colSpan={9}><div className="empty"><div className="empty-ico">📦</div><p>No purchase bills yet</p></div></td></tr>}
              {(state.paddyBills||[]).map(b=>{
                const party=(state.parties||[]).find(p=>p.id===b.partyId);
                const lines=b.lines||b.items||[];
                const wt=lines.reduce((s,l)=>s+(l.totalWeightKg||l.totalWeight||0),0)/100;
                const bags=lines.reduce((s,l)=>s+(+l.bags||0),0);
                const grp=b.itemGroupKey?allGroups.find(g=>g.key===b.itemGroupKey):null;
                return <tr key={b.id}>
                  <td className="c-accent bold">{b.billNo}</td>
                  <td className="c-muted">{b.date}</td>
                  <td>{grp?<span className="pill p-orange">{grp.subtype}</span>:<span className="c-muted">—</span>}</td>
                  <td>{party?.name||'—'}</td>
                  <td className="bold">{bags}</td>
                  <td>{wt.toFixed(2)}</td>
                  <td className="c-green bold">{fmt(b.totalAmount)}</td>
                  <td><span className={`pill ${b.status==='paid'?'p-green':b.status==='partial'?'p-orange':'p-gray'}`}>{b.status}</span></td>
                  <td><div className="tda">
                    <button className="btn btn-ghost btn-xs" onClick={()=>setViewBill(b)}>🔍</button>
                    <button className="btn btn-ghost btn-xs" onClick={()=>{setForm(blankBill(b));setErr('');setModal({edit:true});}}>✏️</button>
                    <button className="btn btn-danger btn-xs" onClick={()=>del(b.id)}>🗑</button>
                  </div></td>
                </tr>;
              })}
            </tbody>
          </table>
        </div>

        {/* ══ NEW / EDIT BILL MODAL ══ */}
        {modal&&<div className="overlay"><div className="modal modal-xl">
          <div className="mhead">
            <h3>{modal.edit?'✏️ Edit':'📦 New'} Purchase Bill</h3>
            <button className="xbtn" onClick={()=>setModal(null)}>✕</button>
          </div>
          <div className="mbody">
            {err&&<div className="alert alert-err">{err}</div>}

            {/* ── STEP 1: Select Item ── */}
            <div style={{marginBottom:16}}>
              <div style={{fontSize:11,fontWeight:700,color:'var(--text2)',textTransform:'uppercase',letterSpacing:.8,marginBottom:8}}>① Select Item</div>
              <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
                {allGroups.map(g=>{
                  const cfg=CAT_CFG[g.category]||CAT_CFG.other;
                  const active=form.itemGroupKey===g.key;
                  return <div key={g.key}
                    onClick={()=>pickItemGroup(g.key)}
                    style={{padding:'9px 16px',borderRadius:9,border:`2px solid ${active?cfg.color:'var(--border)'}`,background:active?`${cfg.color}15`:'var(--surface2)',cursor:'pointer',fontWeight:700,fontSize:13,color:active?cfg.color:'var(--text2)',display:'flex',alignItems:'center',gap:7,transition:'all .13s',userSelect:'none'}}>
                    <span style={{fontSize:18}}>{cfg.icon}</span>{g.subtype}
                  </div>;
                })}
                {allGroups.length===0&&<span className="c-muted" style={{fontSize:13}}>No items configured. Go to Items → Add Item first.</span>}
              </div>
            </div>

            {selGroup&&<>
            {/* ── STEP 2: Link to Order ── */}
            <div style={{background:linkedOrder?'var(--primary-dim)':'var(--surface2)',border:`1.5px solid ${linkedOrder?'var(--primary-mid)':'var(--border)'}`,borderRadius:10,padding:'12px 14px',marginBottom:14}}>
              <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8}}>
                <span style={{fontSize:12,fontWeight:700,color:'var(--primary)'}}>② Link to Purchase Order</span>
                <span style={{fontSize:11,color:'var(--text3)'}}>— auto-fills party & rate</span>
                {linkedOrder&&<button className="btn btn-danger btn-xs" style={{marginLeft:'auto'}} onClick={()=>pickOrder('')}>✕ Unlink</button>}
              </div>
              {!linkedOrder&&<div style={{display:'flex',gap:8,alignItems:'center'}}>
                <select className="fselect" style={{flex:1}} value={form.orderId} onChange={e=>pickOrder(e.target.value)}>
                  <option value="">— Select a purchase order —</option>
                  {relevantOrders.map(o=>{
                    const p=(state.parties||[]).find(x=>x.id===o.partyId);
                    const q=(state.qualities||[]).find(x=>x.id===o.qualityId);
                    const done=orderDoneQ(o.id);
                    const rem=Math.max(0,(+o.quantity||0)-done);
                    return <option key={o.id} value={o.id}>{o.orderNo} — {p?.name||'?'} — {q?.name||'?'} — {fmt(o.rate)}/Q — {rem.toFixed(1)}Q remaining</option>;
                  })}
                </select>
                <button className="btn btn-ghost btn-sm" onClick={openNewOrder}>+ New Order</button>
              </div>}
              {linkedOrder&&(()=>{
                const p=(state.parties||[]).find(x=>x.id===linkedOrder.partyId);
                const q=(state.qualities||[]).find(x=>x.id===linkedOrder.qualityId);
                const done=orderDoneQ(linkedOrder.id);
                const totalQ=+linkedOrder.quantity||0;
                const rem=Math.max(0,totalQ-done);
                const pct=totalQ>0?Math.min(100,(done/totalQ)*100):0;
                return <div style={{display:'flex',gap:10,flexWrap:'wrap',alignItems:'center'}}>
                  {[['Order',linkedOrder.orderNo,'var(--primary)'],['Party',p?.name||'—',null],['Quality',q?.name||'—',null],['Rate',fmt(linkedOrder.rate)+'/Q',null]].map(([l,v,c])=>(
                    <div key={l} style={{background:'var(--surface)',borderRadius:7,padding:'5px 11px'}}>
                      <div style={{fontSize:9,color:'var(--text3)',fontWeight:700,textTransform:'uppercase',letterSpacing:.7}}>{l}</div>
                      <div style={{fontWeight:700,fontSize:13,color:c||'var(--text)'}}>{v}</div>
                    </div>
                  ))}
                  <div style={{flex:1,minWidth:140}}>
                    <div style={{display:'flex',justifyContent:'space-between',marginBottom:3}}>
                      <span style={{fontSize:10,color:'var(--text3)',fontWeight:600}}>PROGRESS</span>
                      <span style={{fontSize:10,color:'var(--text3)'}}>{done.toFixed(1)}Q / {totalQ}Q</span>
                    </div>
                    <div style={{background:'var(--surface3)',borderRadius:6,height:7,overflow:'hidden'}}>
                      <div style={{width:pct+'%',background:'var(--primary)',height:7,borderRadius:6}}/>
                    </div>
                    <div style={{fontSize:10,color:rem>0?'var(--accent)':'var(--green)',marginTop:2,fontWeight:600}}>
                      {rem>0?rem.toFixed(2)+'Q remaining':'✅ Complete'}
                    </div>
                  </div>
                </div>;
              })()}
            </div>

            {/* ── STEP 3: Bill header ── */}
            <div className="frow" style={{marginBottom:14}}>
              <div className="fg">
                <label className="flbl">Party *</label>
                <select className="fselect" value={form.partyId} onChange={e=>setForm(f=>({...f,partyId:e.target.value}))}>
                  <option value="">Select Party</option>
                  {(state.parties||[]).filter(p=>p.type==='supplier'||p.type==='both').map(p=><option key={p.id} value={p.id}>{p.name}{p.nick?' ('+p.nick+')':''}</option>)}
                </select>
              </div>
              <div className="fg">
                <label className="flbl">Bill No *</label>
                <input className="finput" value={form.billNo} onChange={e=>setForm(f=>({...f,billNo:e.target.value}))} placeholder="PP-001"/>
              </div>
              <div className="fg">
                <label className="flbl">Date</label>
                <input type="date" className="finput" value={form.date} onChange={e=>setForm(f=>({...f,date:e.target.value}))}/>
              </div>
            </div>

            {/* ── STEP 4: Line Items ── */}
            <div className="divider"/>
            <div className="fxb mb12">
              <div className="sec-ttl">📦 Items Loaded</div>
              <button className="btn btn-ghost btn-sm" onClick={addLine}>+ Add Line</button>
            </div>

            {form.lines.map((line,idx)=>{
              const autoAmt=(line.totalWeightKg/100)*(+line.rate||0);
              return <div key={line.id||idx} style={{background:'var(--surface)',border:'1.5px solid var(--border)',borderRadius:10,padding:14,marginBottom:10}}>
                <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12}}>
                  <span style={{fontSize:12,fontWeight:700,color:'var(--text3)'}}>Line {idx+1}</span>
                  {form.lines.length>1&&<button className="btn btn-danger btn-xs" onClick={()=>remLine(idx)}>✕ Remove</button>}
                </div>

                {/* Quality */}
                <div className="frow">
                  <div className="fg">
                    <label className="flbl">Quality / Variety *</label>
                    <select className="fselect" value={line.qualityId} onChange={e=>updLine(idx,{qualityId:e.target.value})}>
                      <option value="">— Select —</option>
                      {groupQualities.map(q=><option key={q.id} value={q.id}>{q.name}</option>)}
                    </select>
                  </div>
                </div>

                {/* Bag type + count */}
                <div className="frow">
                  <div className="fg">
                    <label className="flbl">Bag Type</label>
                    <div style={{display:'flex',gap:8}}>
                      {[['bori','🛍️ Bori'],['katte','🪣 Katte']].map(([v,lbl])=>(
                        <div key={v} onClick={()=>updLine(idx,{bagType:v})}
                          style={{flex:1,padding:'8px 10px',borderRadius:8,border:`2px solid ${line.bagType===v?'var(--primary-mid)':'var(--border)'}`,background:line.bagType===v?'var(--primary-dim)':'var(--surface2)',cursor:'pointer',textAlign:'center',fontWeight:600,fontSize:13,color:line.bagType===v?'var(--primary)':'var(--text2)',transition:'all .12s'}}>
                          {lbl}
                        </div>

/* ── ORDER LINK PANEL (used inside RiceSaleBills form) ── */
function OrderLinkPanel({form,setForm,state}){
  var ongoingOrders=(state.orders||[]).filter(function(o){return o.status==='ongoing';});
  var linkedOrder=form.orderId?(state.orders||[]).find(function(o){return o.id===form.orderId;}):null;

  function pickOrder(e){
    var oid=e.target.value;
    if(!oid) return;
    var o=(state.orders||[]).find(function(x){return x.id===oid;});
    if(!o) return;
    var firstItem=blankSaleItem(o.orderType||'rice');
    firstItem.qualityId=o.qualityId||'';
    firstItem.rate=o.rate||'';
    firstItem=calcSaleItem(firstItem);
    setForm(function(f){return Object.assign({},f,{orderId:o.id,partyId:o.partyId||f.partyId,items:[firstItem]});});
  }

  function unlinkOrder(){
    setForm(function(f){return Object.assign({},f,{orderId:'',partyId:'',items:[blankSaleItem('rice')]});});
  }

  var linked=!!linkedOrder;
  var party=linked?(state.parties||[]).find(function(p){return p.id===linkedOrder.partyId;}):null;
  var qual=linked?(state.qualities||[]).find(function(q){return q.id===linkedOrder.qualityId;}):null;
  var bills=linked?(state.riceSaleBills||[]).filter(function(b){return b.orderId===linkedOrder.id;}):[];
  var doneQ=bills.reduce(function(s,b){return s+(b.items||[]).reduce(function(ss,i){return ss+((i.totalWeightKg||0)/100);},0);},0);
  var totalQ=linked?(+linkedOrder.quantity||0):0;
  var remaining=Math.max(0,totalQ-doneQ);
  var pct=totalQ>0?Math.min(100,(doneQ/totalQ)*100):0;

  return (
    <div style={{background:linked?'var(--primary-dim)':'var(--surface2)',border:'1.5px solid '+(linked?'var(--primary-mid)':'var(--border)'),borderRadius:10,padding:'12px 14px',marginBottom:14}}>
      <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:linked?10:6}}>
        <span style={{fontSize:12,fontWeight:700,color:'var(--primary)'}}>📋 Link to Order</span>
        <span style={{fontSize:11,color:'var(--text3)'}}>— optional, auto-fills party &amp; quality</span>
        {linked&&<button className="btn btn-danger btn-xs" style={{marginLeft:'auto'}} onClick={unlinkOrder}>✕ Unlink</button>}
      </div>
      {!linked&&<select className="fselect" value="" onChange={pickOrder}>
        <option value="">— Select an order to link —</option>
        {ongoingOrders.map(function(o){
          var p=(state.parties||[]).find(function(x){return x.id===o.partyId;});
          var q=(state.qualities||[]).find(function(x){return x.id===o.qualityId;});
          var obills=(state.riceSaleBills||[]).filter(function(b){return b.orderId===o.id;});
          var odone=obills.reduce(function(s,b){return s+(b.items||[]).reduce(function(ss,i){return ss+((i.totalWeightKg||0)/100);},0);},0);
          var oremain=Math.max(0,(+o.quantity||0)-odone);
          return <option key={o.id} value={o.id}>{o.orderNo} — {p?p.name:'?'} — {q?q.name:'?'} — {oremain.toFixed(1)}Q remaining</option>;
        })}
      </select>}
      {linked&&<div style={{display:'flex',gap:12,flexWrap:'wrap',alignItems:'center'}}>
        <div style={{background:'var(--surface)',borderRadius:7,padding:'6px 12px'}}>
          <div style={{fontSize:10,color:'var(--text3)',fontWeight:600,textTransform:'uppercase',letterSpacing:.7}}>Order</div>
          <div style={{fontWeight:700,color:'var(--primary)',fontSize:14}}>{linkedOrder.orderNo}</div>
        </div>
        <div style={{background:'var(--surface)',borderRadius:7,padding:'6px 12px'}}>
          <div style={{fontSize:10,color:'var(--text3)',fontWeight:600,textTransform:'uppercase',letterSpacing:.7}}>Party</div>
          <div style={{fontWeight:600,fontSize:13}}>{party?party.name:'—'}</div>
        </div>
        <div style={{background:'var(--surface)',borderRadius:7,padding:'6px 12px'}}>
          <div style={{fontSize:10,color:'var(--text3)',fontWeight:600,textTransform:'uppercase',letterSpacing:.7}}>Quality</div>
          <div style={{fontSize:13}}>{qual?qual.name:'—'}</div>
        </div>
        <div style={{background:'var(--surface)',borderRadius:7,padding:'6px 12px'}}>
          <div style={{fontSize:10,color:'var(--text3)',fontWeight:600,textTransform:'uppercase',letterSpacing:.7}}>Ordered</div>
          <div style={{fontWeight:700,fontSize:13}}>{totalQ} Q</div>
        </div>
        <div style={{background:'var(--surface)',borderRadius:7,padding:'6px 12px'}}>
          <div style={{fontSize:10,color:'var(--text3)',fontWeight:600,textTransform:'uppercase',letterSpacing:.7}}>Done</div>
          <div style={{fontWeight:700,color:'var(--green)',fontSize:13}}>{doneQ.toFixed(2)} Q</div>
        </div>
        <div style={{flex:1,minWidth:140}}>
          <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
            <span style={{fontSize:10,color:'var(--text3)',fontWeight:600,textTransform:'uppercase',letterSpacing:.7}}>Progress</span>
            <span style={{fontSize:11,color:'var(--text3)'}}>{pct.toFixed(1)}%</span>
          </div>
          <div style={{background:'var(--surface3)',borderRadius:6,height:8,overflow:'hidden'}}>
            <div style={{width:pct+'%',background:'var(--primary)',height:8,borderRadius:6,transition:'width .3s'}}/>
          </div>
          <div style={{fontSize:11,color:remaining>0?'var(--accent)':'var(--green)',marginTop:3,fontWeight:600}}>
            {remaining>0?remaining.toFixed(2)+'Q remaining':'✅ Fully dispatched'}
          </div>
        </div>
      </div>}
    </div>
  );
}

/* ─── RICE SALE BILLS ──────────────────────────────────── */
/* ── SALE ITEM TYPES ──────────────────────────────────────────────
   rice    : bags, hsnCode, weightPerBag, totalWeightKg, rate, amtMode(wt|bags), manualAmt override
   chilkha : hsnCode, weightKg, rate → amt = wt*rate, manualAmt override
   polish  : placeholder (rules TBD)
   phack   : placeholder (rules TBD)
   custom  : itemName, hsnCode, bags, weightKg, rate, amtMode, manualAmt override
   All items: sgstPct, cgstPct → sgstAmt, cgstAmt, totalAmt
──────────────────────────────────────────────────────────────── */
function blankSaleItem(type){
  type=type||'rice';
  const base={id:uid(),type,hsnCode:'',sgstPct:0,cgstPct:0,manualAmt:false,customAmt:0,taxableAmt:0,sgstAmt:0,cgstAmt:0,totalAmt:0};
  if(type==='rice')    return Object.assign({},base,{qualityId:'',bags:'',weightPerBag:50,totalWeightKg:0,rate:'',amtMode:'wt'});
  if(type==='chilkha') return Object.assign({},base,{weightKg:'',rate:''});
  if(type==='polish')  return Object.assign({},base,{weightKg:'',rate:''});
  if(type==='phack')   return Object.assign({},base,{weightKg:'',rate:''});
  if(type==='custom')  return Object.assign({},base,{itemName:'',bags:'',weightKg:'',rate:'',amtMode:'wt'});
  return base;
}

function calcSaleItem(item){
  var taxableAmt=0;
  if(item.type==='rice'){
    var bags=+item.bags||0, wpb=+item.weightPerBag||0, totalWeightKg=bags*wpb, rate=+item.rate||0;
    var raw=item.amtMode==='bags'?bags*rate:(totalWeightKg/100)*rate;
    if(item.manualAmt) raw=+item.customAmt||0;
    taxableAmt=raw;
    var sgstAmt=+(taxableAmt*(+item.sgstPct||0)/100).toFixed(2);
    var cgstAmt=+(taxableAmt*(+item.cgstPct||0)/100).toFixed(2);
    return Object.assign({},item,{totalWeightKg:totalWeightKg,taxableAmt:+taxableAmt.toFixed(2),sgstAmt:sgstAmt,cgstAmt:cgstAmt,totalAmt:+(taxableAmt+sgstAmt+cgstAmt).toFixed(2)});
  }
  if(item.type==='chilkha'||item.type==='polish'||item.type==='phack'){
    var wt=+item.weightKg||0, rate=+item.rate||0, raw2=wt*rate;
    if(item.manualAmt) raw2=+item.customAmt||0;
    taxableAmt=raw2;
    var sgstAmt2=+(taxableAmt*(+item.sgstPct||0)/100).toFixed(2);
    var cgstAmt2=+(taxableAmt*(+item.cgstPct||0)/100).toFixed(2);
    return Object.assign({},item,{taxableAmt:+taxableAmt.toFixed(2),sgstAmt:sgstAmt2,cgstAmt:cgstAmt2,totalAmt:+(taxableAmt+sgstAmt2+cgstAmt2).toFixed(2)});
  }
  if(item.type==='custom'){
    var bags2=+item.bags||0, wt2=+item.weightKg||0, rate3=+item.rate||0;
    var raw3=item.amtMode==='bags'?bags2*rate3:wt2*rate3;
    if(item.manualAmt) raw3=+item.customAmt||0;
    taxableAmt=raw3;
    var sgstAmt3=+(taxableAmt*(+item.sgstPct||0)/100).toFixed(2);
    var cgstAmt3=+(taxableAmt*(+item.cgstPct||0)/100).toFixed(2);
    return Object.assign({},item,{taxableAmt:+taxableAmt.toFixed(2),sgstAmt:sgstAmt3,cgstAmt:cgstAmt3,totalAmt:+(taxableAmt+sgstAmt3+cgstAmt3).toFixed(2)});
  }
  return item;
}

/* ── AMOUNT FIELD WITH OVERRIDE ── */
function AmtField({item,label,autoAmt,onMulti}){
  return(
    <div className="fg">
      <label className="flbl">{label||'Amount (₹)'}</label>
      <div style={{display:'flex',gap:6,alignItems:'center'}}>
        <input type="number" className="finput"
          value={item.manualAmt?(item.customAmt||''):item.taxableAmt}
          onChange={function(e){if(item.manualAmt)onMulti({customAmt:e.target.value,manualAmt:true});}}
          readOnly={!item.manualAmt}
          style={{background:item.manualAmt?'var(--surface)':'var(--surface3)',fontWeight:600,color:'var(--green)',flex:1}}
        />
        <label className="fcheck" style={{whiteSpace:'nowrap',fontSize:11,gap:4}}>
          <input type="checkbox" checked={!!item.manualAmt}
            onChange={function(e){onMulti({manualAmt:e.target.checked,customAmt:item.taxableAmt});}}/>
          Override
        </label>
      </div>
      {item.manualAmt&&<div style={{fontSize:11,color:'var(--text3)',marginTop:2}}>Auto would be: {fmt(autoAmt||item.taxableAmt)}</div>}
    </div>
  );
}

/* ── ITEM TYPE BADGE ── */
function TypeBadge({type}){
  var cfg={
    rice:    {label:'🍚 RICE',    bg:'var(--teal-dim)',   color:'var(--teal)'},
    chilkha: {label:'🌾 CHILKHA', bg:'var(--amber-dim)',  color:'var(--amber)'},
    polish:  {label:'✨ POLISH',  bg:'var(--purple-dim)', color:'var(--purple)'},
    phack:   {label:'💧 PHACK',   bg:'var(--blue-dim)',   color:'var(--blue)'},
    custom:  {label:'⚙️ CUSTOM',  bg:'var(--surface3)',   color:'var(--text2)'},
  }[type]||{label:type,bg:'var(--surface3)',color:'var(--text2)'};
  return <span style={{background:cfg.bg,color:cfg.color,padding:'3px 12px',borderRadius:20,fontSize:11,fontWeight:700}}>{cfg.label}</span>;
}

/* ── ITEM ROWS ── */
function RiceItemRow({item,idx,state,onUpdate,onRemove,canRemove}){
  function u(f,v){onUpdate(idx,calcSaleItem(Object.assign({},item,{[f]:v})));}
  function um(patch){onUpdate(idx,calcSaleItem(Object.assign({},item,patch)));}
  var bags=+item.bags||0, wpb=+item.weightPerBag||0, totalKg=bags*wpb;
  var autoAmt=item.amtMode==='bags'?bags*(+item.rate||0):(totalKg/100)*(+item.rate||0);
  return(
    <div style={{background:'var(--surface)',border:'1.5px solid var(--border)',borderRadius:10,padding:14,marginBottom:10}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12}}>
        <TypeBadge type="rice"/>
        {canRemove&&<button className="btn btn-danger btn-xs btn-icon" onClick={function(){onRemove(idx);}}>✕ Remove</button>}
      </div>
      <div className="frow">
        <div className="fg"><label className="flbl">Rice Quality *</label>
          <select className="fselect" value={item.qualityId} onChange={function(e){u('qualityId',e.target.value);}}>
            <option value="">— Select Quality —</option>{renderQualityOptions(state,'rice')}
          </select>
        </div>
        <div className="fg"><label className="flbl">HSN Code</label>
          <input className="finput mono" value={item.hsnCode} onChange={function(e){u('hsnCode',e.target.value);}} placeholder="1006"/>
        </div>
      </div>
      <div className="frow">
        <div className="fg"><label className="flbl">No. of Bags</label>
          <input type="number" className="finput" value={item.bags} onChange={function(e){u('bags',e.target.value);}} placeholder="0"/>
        </div>
        <div className="fg"><label className="flbl">Weight per Bag (KG)</label>
          <input type="number" className="finput" value={item.weightPerBag} onChange={function(e){u('weightPerBag',e.target.value);}}/>
        </div>
        <div className="fg"><label className="flbl">Total Weight</label>
          <div className="finput" style={{background:'var(--surface3)',color:'var(--teal)',fontWeight:700,cursor:'default'}}>
            {totalKg.toLocaleString()} KG &nbsp;=&nbsp; {(totalKg/100).toFixed(2)} Q
          </div>
        </div>
      </div>
      <div className="frow">
        <div className="fg"><label className="flbl">Rate (₹)</label>
          <input type="number" className="finput" value={item.rate} onChange={function(e){u('rate',e.target.value);}} placeholder="0"/>
        </div>
        <div className="fg"><label className="flbl">Amount Calculation</label>
          <select className="fselect" value={item.amtMode} onChange={function(e){u('amtMode',e.target.value);}}>
            <option value="wt">Weight × Rate (per Quintal)</option>
            <option value="bags">Bags × Rate (per Bag)</option>
          </select>
        </div>
        <AmtField item={item} autoAmt={autoAmt} onMulti={um}/>
      </div>
      <GstRow item={item} onU={function(f,v){u(f,v);}}/>
    </div>
  );
}

function renderSaleItem(item,idx,items,state,onUpdate,onRemove){
  var canRemove=items.length>1;
  var props={item:item,idx:idx,state:state,onUpdate:onUpdate,onRemove:onRemove,canRemove:canRemove};
  if(item.type==='rice')    return <RiceItemRow key={item.id||idx} {...props}/>;
  if(item.type==='chilkha') return <ChilkhaItemRow key={item.id||idx} {...props}/>;
  if(item.type==='polish')  return <PolishItemRow key={item.id||idx} {...props}/>;
  if(item.type==='phack')   return <PhackItemRow key={item.id||idx} {...props}/>;
  if(item.type==='custom')  return <CustomItemRow key={item.id||idx} {...props}/>;
  return null;
}

/* ── MAIN COMPONENT ── */
function RiceSaleBills({state,save,setPage}){
  const [modal,setModal]=useState(null);
  const [viewBill,setViewBill]=useState(null);
  const [form,setForm]=useState(function(){return blankRiceBill();});
  const [err,setErr]=useState('');
  // ── CREATE ORDER FROM BILL ──
  const [orderModal,setOrderModal]=useState(false);
  const [orderForm,setOrderForm]=useState({date:tod(),orderNo:'',orderType:'rice',partyId:'',qualityId:'',quantity:'',rate:'',cd:'',dalali:'',brokerId:'',paidBy:'party',brokerName:'',status:'ongoing'});
  const [orderErr,setOrderErr]=useState('');

  const openCreateOrder=function(){
    // Pre-fill from current bill form
    var itemType=form.items&&form.items[0]?form.items[0].type:'rice';
    var qualityId=form.items&&form.items[0]?form.items[0].qualityId||'':'';
    var rate=form.items&&form.items[0]?form.items[0].rate||'':'';
    var existingOrders=state.orders||[];
    var nums=existingOrders.map(function(o){var m=(o.orderNo||'').match(/(\d+)$/);return m?+m[1]:0;});
    var nextNo='ORD-'+(String(Math.max(0,...nums)+1).padStart(3,'0'));
    setOrderForm({date:tod(),orderNo:nextNo,orderType:itemType,partyId:form.partyId||'',qualityId:qualityId,quantity:'',rate:rate,cd:'',dalali:'',brokerId:'',paidBy:'party',brokerName:'',status:'ongoing'});
    setOrderErr('');
    setOrderModal(true);
  };

  const doSaveOrder=function(){
    if(!orderForm.partyId){setOrderErr('Select a party');return;}
    if(!orderForm.orderNo){setOrderErr('Order number required');return;}
    if(!orderForm.quantity||!orderForm.rate){setOrderErr('Quantity and rate are required');return;}
    var existing=state.orders||[];
    if(existing.find(function(o){return o.orderNo===orderForm.orderNo;})){setOrderErr('Order number already exists');return;}
    setOrderErr('');
    var newOrder=Object.assign({},orderForm,{id:uid(),totalAmount:0,cdAmt:0});
    save(function(s){return Object.assign({},s,{orders:(s.orders||[]).concat([newOrder])});});
    // Auto-link the new order to current bill form
    setForm(function(f){return Object.assign({},f,{orderId:newOrder.id,partyId:newOrder.partyId||f.partyId});});
    setOrderModal(false);
  };
  // ── FILTER STATE ──
  const [srch,setSrch]=useState('');
  const [fParty,setFParty]=useState('');
  const [fItem,setFItem]=useState('');
  const [fStatus,setFStatus]=useState('');
  const [fDateFrom,setFDateFrom]=useState('');
  const [fDateTo,setFDateTo]=useState('');

  function blankRiceBill(b){
    if(b) return Object.assign({},b,{
      items:(b.items||[]).map(function(i){return Object.assign({},i);}),
      partyExpenses:(b.partyExpenses||[]).map(function(e){return Object.assign({},e);}),
      freight:Object.assign({},b.freight||{})
    });
    return{
      id:null,billNo:'',date:tod(),partyId:'',orderId:'',
      itemGroupKey:'',
      items:[],
      partyExpenses:[],
      freight:{type:'included',amount:0,vehicleId:'',advancePaid:0},
      tds:0,tdsRate:0,applyTds:false,
      totalAmount:0,warehouseId:'',fundingId:'',status:'unpaid',transportDetails:''
    };
  }

  const calcBillTotal=function(f){
    var itemsTotal=(f.items||[]).reduce(function(s,i){return s+(i.totalAmt||0);},0);
    var deductions=(f.partyExpenses||[]).reduce(function(s,e){return s+(+e.amt||0);},0);
    var freightDeduct=f.freight&&f.freight.type==='pay'?(+f.freight.amount||0):0;
    var tdsAmt=(f.applyTds)?(itemsTotal*(+(f.tdsRate||1)/100)):0;
    return+(itemsTotal-deductions-freightDeduct-tdsAmt).toFixed(2);
  };

  const updItem=function(idx,updatedItem){
    setForm(function(f){
      var items=f.items.slice(); items[idx]=updatedItem;
      return Object.assign({},f,{items:items,totalAmount:calcBillTotal(Object.assign({},f,{items:items}))});
    });
  };
  const addItem=function(type){
    setForm(function(f){
      // Enforce single item type per bill
      if(f.items&&f.items.length>0&&f.items[0].type!==type){
        return f; // silently ignore — buttons are disabled anyway
      }
      return Object.assign({},f,{items:f.items.concat([blankSaleItem(type)])});
    });
  };
  const remItem=function(idx){
    setForm(function(f){
      var items=f.items.filter(function(_,i){return i!==idx;});
      return Object.assign({},f,{items:items,totalAmount:calcBillTotal(Object.assign({},f,{items:items}))});
    });
  };

  const addExp=function(){setForm(function(f){return Object.assign({},f,{partyExpenses:f.partyExpenses.concat([{typeId:'',usePercent:false,pct:0,amt:0,note:''}])});});};
  const updExp=function(idx,field,val){
    setForm(function(f){
      var pe=f.partyExpenses.slice(); pe[idx]=Object.assign({},pe[idx],{[field]:val});
      if(pe[idx].usePercent&&field!=='amt'){
        var base=(f.items||[]).reduce(function(s,i){return s+(i.totalAmt||0);},0);
        pe[idx].amt=+(base*pe[idx].pct/100).toFixed(2);
      }
      return Object.assign({},f,{partyExpenses:pe,totalAmount:calcBillTotal(Object.assign({},f,{partyExpenses:pe}))});
    });
  };
  const updFreight=function(field,val){
    setForm(function(f){var freight=Object.assign({},f.freight,{[field]:val});return Object.assign({},f,{freight:freight,totalAmount:calcBillTotal(Object.assign({},f,{freight:freight}))});});
  };
  const toggleTds=function(checked){setForm(function(f){return Object.assign({},f,{applyTds:checked,totalAmount:calcBillTotal(Object.assign({},f,{applyTds:checked}))});});};
  const updTdsRate=function(rate){setForm(function(f){return Object.assign({},f,{tdsRate:rate,totalAmount:calcBillTotal(Object.assign({},f,{tdsRate:rate}))});});};

  const doSave=function(){
    if(!form.itemGroupKey){setErr('Select an item first');return;}
    if(!form.partyId){setErr('Select a party');return;}
    if(!form.billNo){setErr('Bill number required');return;}
    if(!modal||!modal.edit){
      if(state.riceSaleBills.find(function(b){return b.billNo===form.billNo;})){setErr('Bill number already exists');return;}
    }
    setErr('');
    var bill=Object.assign({},form,{id:form.id||uid(),totalAmount:calcBillTotal(form)});
    if(modal&&modal.edit){
      save(function(s){
        var ns=Object.assign({},s,{riceSaleBills:s.riceSaleBills.map(function(b){return b.id===bill.id?bill:b;})});
        if(bill.freight&&bill.freight.type==='pay'&&+bill.freight.amount>0){
          var linked=(s.freightEntries||[]).find(function(e){return e.linkedBillId===bill.id;});
          if(linked){ns=Object.assign({},ns,{freightEntries:ns.freightEntries.map(function(e){return e.id===linked.id?Object.assign({},e,{freightAmt:+bill.freight.amount,billRef:bill.billNo,date:bill.date}):e;})});}
        }
        return ns;
      });
    } else {
      save(function(s){
        var ns=Object.assign({},s,{riceSaleBills:s.riceSaleBills.concat([bill])});
        if(bill.freight&&bill.freight.type==='pay'&&+bill.freight.amount>0){
          var fe={id:uid(),date:bill.date,vehicleId:bill.freight.vehicleId||'',billRef:bill.billNo,billType:'rice',tripType:'outward',freightAmt:+bill.freight.amount,dihadiAmt:0,shortageAmt:0,shortageQty:0,note:'Auto from '+bill.billNo,status:'unpaid',linkedBillId:bill.id,advancePaid:+bill.freight.advancePaid||0};
          ns=Object.assign({},ns,{freightEntries:(ns.freightEntries||[]).concat([fe])});
        }
        return ns;
      });
    }
    setModal(null);
  };

  const del=function(id){if(confirm('Delete bill?'))save(function(s){return Object.assign({},s,{riceSaleBills:s.riceSaleBills.filter(function(b){return b.id!==id;})});});};

  // ── Item groups for sale bill (all groups from Items master) ──
  var allSaleGroups=React.useMemo(function(){
    var fromQ=[...new Map((state.qualities||[]).map(function(q){
      var k=(q.subtype||'')+'|||'+(q.type||'');
      return [k,{key:k,subtype:q.subtype||'',category:q.type||'other',icon:q.type==='rice'?'🍚':q.type==='paddy'?'🌾':'📦'}];
    })).values()];
    var fromCat=(state.itemCategories||[]).filter(function(ic){return !fromQ.some(function(g){return g.subtype===ic.name&&g.category===ic.category;});})
      .map(function(ic){return {key:ic.name+'|||'+ic.category,subtype:ic.name,category:ic.category,icon:ic.category==='rice'?'🍚':ic.category==='paddy'?'🌾':'📦'};});
    return [...fromQ,...fromCat].sort(function(a,b){return a.subtype.localeCompare(b.subtype);});
  },[state.qualities,state.itemCategories]);

  var selSaleGroup=form.itemGroupKey?allSaleGroups.find(function(g){return g.key===form.itemGroupKey;}):null;

  // sale expense types for selected item
  var itemSaleExps=selSaleGroup
    ?(((state.itemExpenseTypes||{})[selSaleGroup.key]||{}).sale||[])
    :[];

  // sale orders relevant to selected item group
  var relevantSaleOrders=React.useMemo(function(){
    var saleOrds=(state.orders||[]).filter(function(o){
      return o.status==='ongoing'&&(o.orderCategory==='sale'||(!o.orderCategory&&o.orderType!=='paddy'));
    });
    if(!selSaleGroup) return saleOrds;
    return saleOrds.filter(function(o){
      var q=(state.qualities||[]).find(function(qq){return qq.id===o.qualityId;});
      if(q) return (q.subtype||'')===selSaleGroup.subtype&&(q.type||'')===selSaleGroup.category;
      return true; // include if quality unknown
    });
  },[selSaleGroup,state.orders,state.qualities]);

  function pickSaleItemGroup(key){
    setForm(function(f){
      // reset items when group changes

  var totalSgst=(form.items||[]).reduce(function(s,i){return s+(i.sgstAmt||0);},0);
  var totalCgst=(form.items||[]).reduce(function(s,i){return s+(i.cgstAmt||0);},0);
  var deductions=(form.partyExpenses||[]).reduce(function(s,e){return s+(+e.amt||0);},0);
  var freightDeduct=form.freight&&form.freight.type==='pay'?(+form.freight.amount||0):0;
  var tdsAmt=form.applyTds?(itemsTotal*(+(form.tdsRate||1)/100)):0;
  var netReceivable=calcBillTotal(form);

  // ── FILTERED BILLS ──
  var filtered=state.riceSaleBills.filter(function(b){
    var party=state.parties.find(function(p){return p.id===b.partyId;});

    var q=srch.toLowerCase();
    if(q&&!partyName.includes(q)&&!billNo.includes(q)) return false;
    if(fParty&&b.partyId!==fParty) return false;
    if(fStatus&&b.status!==fStatus) return false;
    if(fDateFrom&&b.date<fDateFrom) return false;
    if(fDateTo&&b.date>fDateTo) return false;
    if(fItem&&!(b.items||[]).some(function(i){
      if(fItem==='custom') return i.type==='custom';
      return i.type===fItem;
    })) return false;
    return true;
  });

  var filTotalAmt=filtered.reduce(function(s,b){return s+b.totalAmount;},0);
  var filPaid=filtered.filter(function(b){return b.status==='paid';}).length;
  var filUnpaid=filtered.filter(function(b){return b.status==='unpaid';}).length;
  var filPartial=filtered.filter(function(b){return b.status==='partial';}).length;
  var hasFilter=srch||fParty||fItem||fStatus||fDateFrom||fDateTo;

  // unique parties in bills for dropdown
  var billParties=state.parties.filter(function(p){return state.riceSaleBills.some(function(b){return b.partyId===p.id;});});

  return(
    <>
      <div className="topbar">
        <h2>🍚 Sale Bills</h2>

        </div>
      </div>
      <div className="content">

        {/* ── SUMMARY CARDS ── */}
        {state.riceSaleBills.length>0&&<div className="g4 mb16">

            <div className="stat-val c-teal">{fmt(filTotalAmt)}</div>
            <div className="stat-sub">{filtered.length} of {state.riceSaleBills.length} bills</div>
          </div>
          <div className="stat-card bl-green">
            <div className="stat-lbl">Paid</div>
            <div className="stat-val c-green">{filPaid}</div>
            <div className="stat-sub">{fmt(filtered.filter(function(b){return b.status==='paid';}).reduce(function(s,b){return s+b.totalAmount;},0))}</div>
          </div>
          <div className="stat-card bl-orange">
            <div className="stat-lbl">Partial</div>
            <div className="stat-val c-accent">{filPartial}</div>
          </div>
          <div className="stat-card bl-red">
            <div className="stat-lbl">Unpaid</div>
            <div className="stat-val c-red">{filUnpaid}</div>
            <div className="stat-sub">{fmt(filtered.filter(function(b){return b.status==='unpaid';}).reduce(function(s,b){return s+b.totalAmount;},0))}</div>
          </div>
        </div>}

        {/* ── FILTERS BAR ── */}
        <div style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:10,padding:'12px 16px',marginBottom:14}}>

            <span style={{fontSize:11,fontWeight:700,color:'var(--text3)',textTransform:'uppercase',letterSpacing:.8,marginRight:4}}>🔍 Filters</span>

          </div>

            <div className="swrap" style={{gridColumn:'span 2'}}>
              <span className="sico">🔍</span>
              <input className="finput" style={{paddingLeft:30}} placeholder="Search bill no or party name..." value={srch} onChange={function(e){setSrch(e.target.value);}}/>
            </div>
            {/* Party */}
            <select className="fselect" value={fParty} onChange={function(e){setFParty(e.target.value);}}>
              <option value="">All Parties</option>
              {billParties.map(function(p){return <option key={p.id} value={p.id}>{p.name}</option>;})}
            </select>
            {/* Item Type */}
            <select className="fselect" value={fItem} onChange={function(e){setFItem(e.target.value);}}>
              <option value="">All Item Types</option>
              <option value="rice">🍚 Rice</option>
              <option value="chilkha">🌾 Chilkha</option>
              <option value="polish">✨ Polish</option>
              <option value="phack">💧 Phack</option>
              <option value="custom">⚙️ Custom</option>
            </select>
            {/* Status */}
            <select className="fselect" value={fStatus} onChange={function(e){setFStatus(e.target.value);}}>
              <option value="">All Status</option>
              <option value="paid">✅ Paid</option>
              <option value="partial">🔶 Partial</option>
              <option value="unpaid">🔴 Unpaid</option>
            </select>
            {/* Date From */}
            <div>
              <div style={{fontSize:10,fontWeight:600,color:'var(--text3)',marginBottom:3}}>FROM DATE</div>
              <input type="date" className="finput" value={fDateFrom} onChange={function(e){setFDateFrom(e.target.value);}}/>
            </div>
            {/* Date To */}
            <div>
              <div style={{fontSize:10,fontWeight:600,color:'var(--text3)',marginBottom:3}}>TO DATE</div>

          {hasFilter&&<div style={{marginTop:8,fontSize:12,color:'var(--text3)'}}>Showing <b style={{color:'var(--primary)'}}>{filtered.length}</b> bill{filtered.length!==1?'s':''} matching your filters</div>}

              {filtered.map(function(b){

                          {cfg.icon} {k==='rice'?'Rice':k==='chilkha'?'Chilkha':k==='polish'?'Polish':k==='phack'?'Phack':k}

                        </span>;
                      })}
                    </div>
                  </td>
                  <td className="bold" style={{whiteSpace:'nowrap'}}>{fmt(billTaxable)}</td>
                  <td style={{whiteSpace:'nowrap',color:'var(--blue)',fontSize:12}}>{totalGst>0?fmt(totalGst):<span className="c-muted">—</span>}</td>

                  <td><div className="tda">
                    <button className="btn btn-teal btn-xs" onClick={function(){setViewBill(b);}}>🔍 View</button>
                    <button className="btn btn-ghost btn-xs" onClick={function(){setForm(blankRiceBill(b));setErr('');setModal({edit:true});}}>✏️</button>
                    <button className="btn btn-danger btn-xs" onClick={function(){del(b.id);}}>🗑</button>
                  </div></td>
                </tr>;

            </tbody>
            {filtered.length>0&&<tfoot><tr>

              <td className="bold" style={{color:'var(--blue)'}}>{fmt(filtered.reduce(function(s,b){return s+(b.items||[]).reduce(function(ss,i){return ss+(i.sgstAmt||0)+(i.cgstAmt||0);},0);},0))}</td>

              <td colSpan={2}></td>
            </tr></tfoot>}
          </table>
        </div>

        {modal&&<div className="overlay"><div className="modal modal-xl">
          <div className="mhead">
            <h3>{modal.edit?'✏️ Edit':'+ New'} Sale Bill</h3>

              <button className="xbtn" onClick={function(){setModal(null);}}>✕</button>
            </div>
          </div>
          <div className="mbody">
            {err&&<div className="alert alert-err">{err}</div>}

            {/* ── STEP 1: Select Item Group ── */}
            <div style={{marginBottom:16}}>
              <div style={{fontSize:11,fontWeight:700,color:'var(--text2)',textTransform:'uppercase',letterSpacing:.8,marginBottom:8}}>① Select Item</div>
              <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
                {allSaleGroups.map(function(g){
                  var active=form.itemGroupKey===g.key;
                  var col=g.category==='rice'?'var(--teal)':g.category==='paddy'?'var(--accent)':'var(--blue)';
                  var bg=g.category==='rice'?'var(--teal-dim)':g.category==='paddy'?'var(--accent-dim)':'var(--blue-dim)';
                  return <div key={g.key}
                    onClick={function(){pickSaleItemGroup(g.key);}}
                    style={{padding:'9px 16px',borderRadius:9,border:'2px solid '+(active?col:'var(--border)'),background:active?bg:'var(--surface2)',cursor:'pointer',fontWeight:700,fontSize:13,color:active?col:'var(--text2)',display:'flex',alignItems:'center',gap:7,transition:'all .13s',userSelect:'none'}}>
                    <span style={{fontSize:18}}>{g.icon}</span>{g.subtype}
                  </div>;

                {allSaleGroups.length===0&&<span className="c-muted" style={{fontSize:13}}>No items configured. Go to Items → Add Item first.</span>}

            {selSaleGroup&&<>

            {/* ── STEP 2: Link to Sale Order ── */}
            {(function(){
              var linkedOrder=form.orderId?(state.orders||[]).find(function(o){return o.id===form.orderId;}):null;
              var party=linkedOrder?(state.parties||[]).find(function(p){return p.id===linkedOrder.partyId;}):null;
              var qual=linkedOrder?(state.qualities||[]).find(function(q){return q.id===linkedOrder.qualityId;}):null;
              var bills=linkedOrder?(state.riceSaleBills||[]).filter(function(b){return b.orderId===linkedOrder.id;}):[];
              var doneQ=bills.reduce(function(s,b){return s+(b.items||[]).reduce(function(ss,i){return ss+((i.totalWeightKg||0)/100);},0);},0);
              var totalQ=linkedOrder?(+linkedOrder.quantity||0):0;
              var remaining=Math.max(0,totalQ-doneQ);
              var pct=totalQ>0?Math.min(100,(doneQ/totalQ)*100):0;
              return <div style={{background:linkedOrder?'var(--primary-dim)':'var(--surface2)',border:'1.5px solid '+(linkedOrder?'var(--primary-mid)':'var(--border)'),borderRadius:10,padding:'12px 14px',marginBottom:14}}>
                <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:linkedOrder?10:6}}>
                  <span style={{fontSize:12,fontWeight:700,color:'var(--primary)'}}>② Link to Sale Order</span>
                  <span style={{fontSize:11,color:'var(--text3)'}}>— auto-fills party &amp; rate</span>
                  {linkedOrder&&<button className="btn btn-danger btn-xs" style={{marginLeft:'auto'}} onClick={function(){setForm(function(f){return Object.assign({},f,{orderId:'',partyId:''});});}}>✕ Unlink</button>}
                </div>
                {!linkedOrder&&<div style={{display:'flex',gap:8}}>
                  <select className="fselect" style={{flex:1}} value={form.orderId||''} onChange={function(e){

                    var o=(state.orders||[]).find(function(x){return x.id===oid;});
                    if(!o) return;
                    var firstItem=blankSaleItem(selSaleGroup.category==='rice'?'rice':selSaleGroup.category||'rice');
                    firstItem.qualityId=o.qualityId||'';
                    firstItem.rate=o.rate||'';
                    firstItem=calcSaleItem(firstItem);
                    setForm(function(f){return Object.assign({},f,{orderId:o.id,partyId:o.partyId||f.partyId,items:[firstItem]});});
                  }}>
                    <option value="">— Select a sale order —</option>
                    {relevantSaleOrders.map(function(o){
                      var p=(state.parties||[]).find(function(x){return x.id===o.partyId;});
                      var q=(state.qualities||[]).find(function(x){return x.id===o.qualityId;});
                      var ob=(state.riceSaleBills||[]).filter(function(b){return b.orderId===o.id;});
                      var od=ob.reduce(function(s,b){return s+(b.items||[]).reduce(function(ss,i){return ss+((i.totalWeightKg||0)/100);},0);},0);
                      var or_=Math.max(0,(+o.quantity||0)-od);
                      return <option key={o.id} value={o.id}>{o.orderNo} — {p?p.name:'?'} — {q?q.name:'?'} — {or_.toFixed(1)}Q remaining</option>;

                  <button className="btn btn-ghost btn-sm" onClick={openCreateOrder}>+ New Order</button>
                </div>}
                {linkedOrder&&<div style={{display:'flex',gap:10,flexWrap:'wrap',alignItems:'center'}}>
                  {[['Order',linkedOrder.orderNo,'var(--primary)'],['Party',party?party.name:'—',null],['Quality',qual?qual.name:'—',null],['Rate',fmt(linkedOrder.rate)+'/Q',null]].map(function(arr){
                    var l=arr[0],v=arr[1],c=arr[2];
                    return <div key={l} style={{background:'var(--surface)',borderRadius:7,padding:'5px 11px'}}>
                      <div style={{fontSize:9,color:'var(--text3)',fontWeight:700,textTransform:'uppercase',letterSpacing:.7}}>{l}</div>

                      <span style={{fontSize:10,color:'var(--text3)'}}>{doneQ.toFixed(1)}Q / {totalQ}Q</span>

                <input className="finput" value={form.billNo} onChange={function(e){setForm(function(f){return Object.assign({},f,{billNo:e.target.value});});}} placeholder="RS-001"/>
              </div>
              <div className="fg"><label className="flbl">Date</label>
                <input type="date" className="finput" value={form.date} onChange={function(e){setForm(function(f){return Object.assign({},f,{date:e.target.value});});}}/>
              </div>

            {/* ── STEP 4: Items ── */}
            <div className="divider"/>
            {(function(){
              var activeType=form.items&&form.items.length>0?form.items[0].type:null;

            {(!form.items||form.items.length===0)&&<div style={{fontSize:12,color:'var(--text3)',marginBottom:10,padding:'8px 12px',background:'var(--surface2)',borderRadius:6,border:'1px dashed var(--border)'}}>
