            <thead><tr><th>Type</th><th>For</th><th>Name</th><th>Category</th><th style={{textAlign:'right'}}>Amount</th><th>Mode</th><th>Note</th><th></th></tr></thead>
            <tbody>
              {list.length===0&&<tr><td colSpan={8}><div className="empty"><div className="empty-ico">💳</div><p>No payments for this date</p></div></td></tr>}
              {list
                .slice()
                .sort((a,b)=>String(a.type).localeCompare(String(b.type))||String(a.forType||'').localeCompare(String(b.forType||''))||String(a.partyId||a.forId||'').localeCompare(String(b.partyId||b.forId||'')))
                .map(p=>{
                  return(
                    <tr key={p.id}>
                      <td><span className={`pill ${p.type==='received'?'p-green':'p-red'}`}>{p.type==='received'?'Received':'Paid'}</span></td>
                      <td><span className="pill p-gray">{forTypeLabel(p.forType||'party')}</span></td>
                      <td>{displayNameForPayment(p)}</td>
                      <td>{p.category||'—'}</td>
                      <td className={`${p.type==='received'?'c-green':'c-red'} bold`} style={{textAlign:'right'}}>{fmt(p.amount)}</td>
                      <td>{p.mode||'—'}</td>
                      <td>{p.note||''}</td>
                      <td><button className="btn btn-danger btn-xs" onClick={()=>del(p.id)}>🗑</button></td>
                    </tr>
                  );
                })}
            </tbody>
          </table></div>
        </div>
      </div>
    </>
  );
}

/* ─── LEDGER ───────────────────────────────────────────── */
function Ledger({state}){
  const [pid,setPid]=useState('');
  const [ps,setPs]=useState('');
  const [tds,setTds]=useState(true);
  const [tdsRate,setTdsRate]=useState(1);
  const [viewBill,setViewBill]=useState(null);
  const party=state.parties.find(p=>p.id===pid);

  const partyList=useMemo(()=>{
    const q=String(ps||'').trim().toLowerCase();
    const list=(state.parties||[]).slice();
    if(!q) return list;
    return list.filter(p=>{
      const hay=[p.name,p.nick,p.gst,p.phone,p.address].filter(Boolean).join(' ').toLowerCase();
      return hay.includes(q);
    });
  },[state.parties,ps]);

  // For running balance, we treat:
  // - purchases as debit (you owe party)
  // - sales as credit (party owes you)
  // - payment received as debit (reduces receivable)
  // - payment paid as credit (reduces payable)
  const entries=pid?[
    ...state.paddyBills.filter(b=>b.partyId===pid).map(b=>({id:b.id,date:b.date,desc:`Paddy Bill ${b.billNo}`,debit:b.totalAmount-(+b.advance||0),credit:+b.advance||0,type:'paddy',raw:b})),
    ...state.riceSaleBills.filter(b=>b.partyId===pid).map(b=>({id:b.id,date:b.date,desc:`Rice Sale ${b.billNo}`,debit:0,credit:b.totalAmount,type:'rice',raw:b})),
    ...(state.payments||[])
      .filter(p=>p.partyId===pid)
      .map(p=>({
        id:p.id,
        date:p.date,
        desc:`Payment ${p.type==='paid'?'Paid':'Received'}${p.mode?` (${p.mode})`:''}${p.note?` — ${p.note}`:''}`,
        debit:p.type==='received'?(+p.amount||0):0,
        credit:p.type==='paid'?(+p.amount||0):0,
        type:'payment',
        raw:p,
      })),
  ].sort((a,b)=>a.date.localeCompare(b.date) || String(a.type).localeCompare(String(b.type)) || String(a.id).localeCompare(String(b.id))):[];

  const tdsAmt=tds?entries.filter(e=>e.type==='paddy').reduce((s,e)=>s+e.debit,0)*(tdsRate/100):0;
  const netDebit=entries.reduce((s,e)=>s+e.debit,0)-tdsAmt;
  const netCredit=entries.reduce((s,e)=>s+e.credit,0);
  const balance=netDebit-netCredit;

  return(
    <>
      <div className="topbar"><h2>Party Ledger</h2></div>
      <div className="content">
        <div className="card mb16">
          <div className="frow" style={{alignItems:'flex-end',marginBottom:0}}>
            <div className="fg" style={{margin:0}}>
              <label className="flbl">Select Party</label>
              <div className="flex gap8" style={{alignItems:'center'}}>
                <input className="finput" style={{width:220}} placeholder="Search party..." value={ps} onChange={e=>setPs(e.target.value)}/>
                <select className="fselect" style={{width:320}} value={pid} onChange={e=>setPid(e.target.value)}>
                  <option value="">— Choose Party —</option>
                  {partyList.map(p=><option key={p.id} value={p.id}>{p.name} ({p.nick||p.name})</option>)}
                </select>
              </div>
            </div>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:14,marginTop:12,paddingTop:12,borderTop:'1px solid var(--border2)'}}>
            <label className="fcheck" style={{gap:7}}>
              <input type="checkbox" checked={tds} onChange={e=>setTds(e.target.checked)}/>
              <span style={{fontSize:13,fontWeight:600,color:'var(--text2)'}}>Apply TDS</span>
            </label>
            {tds&&<div style={{display:'flex',alignItems:'center',gap:8}}>
              <label className="flbl" style={{margin:0,whiteSpace:'nowrap'}}>TDS %</label>
              <input type="number" className="finput" style={{width:90}} value={tdsRate} onChange={e=>setTdsRate(+e.target.value)} min={0} max={10} step={0.5}/>
              {pid&&<span style={{fontSize:12,color:'var(--accent)',fontWeight:600}}>= {fmt(tdsAmt)} deducted</span>}
            </div>}
          </div>
        </div>

        {party&&<>
          <div className="g4 mb16">
            <div className="stat-card bl-red"><div className="stat-lbl">Paddy Payable</div><div className="stat-val c-red">{fmt(netDebit)}</div>{tds&&<div className="stat-sub">Incl. TDS: −{fmt(tdsAmt)}</div>}</div>
            <div className="stat-card bl-teal"><div className="stat-lbl">Rice Receivable</div><div className="stat-val c-teal">{fmt(netCredit)}</div></div>
            <div className="stat-card bl-accent"><div className="stat-lbl">Net Balance</div><div className={`stat-val ${balance>0?'c-red':'c-green'}`}>{fmt(Math.abs(balance))}</div><div className="stat-sub">{balance>0?'You owe party':'Party owes you'}</div></div>
            <div className="stat-card"><div className="stat-lbl">Party</div><div className="stat-val" style={{fontSize:16}}>{party.name}</div><div className="stat-sub">GST: {party.gst||'N/A'}</div></div>
          </div>
          <div className="card">
            <div className="twrap"><table>
              <thead><tr><th>Date</th><th>Description</th><th>Type</th><th>Debit (₹)</th><th>Credit (₹)</th><th>Running Bal</th><th>View</th></tr></thead>
              <tbody>
                {entries.length===0&&<tr><td colSpan={7}><div className="empty"><p>No transactions</p></div></td></tr>}
                {entries.map((e,i)=>{
                  const runBal=entries.slice(0,i+1).reduce((s,x)=>s+(x.debit-x.credit),0);
                  return <tr key={e.id}>
                    <td className="c-muted">{e.date}</td>
                    <td>{e.desc}</td>
                    <td><span className={`pill ${e.type==='paddy'?'p-orange':e.type==='rice'?'p-teal':'p-gray'}`}>{e.type==='paddy'?'Purchase':e.type==='rice'?'Sale':'Payment'}</span></td>
                    <td className="ledger-dr">{e.debit>0?fmt(e.debit):'—'}</td>
                    <td className="ledger-cr">{e.credit>0?fmt(e.credit):'—'}</td>
                    <td className={runBal>0?'c-red bold':'c-green bold'}>{fmt(Math.abs(runBal))}</td>
                    <td>
                      {(e.type==='paddy'||e.type==='rice')
                        ?<button className="btn btn-ghost btn-xs" onClick={()=>setViewBill({...e.raw,_type:e.type})}>🔍 View</button>
                        :<span className="c-muted">—</span>}
                    </td>
                  </tr>;
                })}
                {tds&&entries.length>0&&<tr style={{background:'rgba(245,166,35,.04)'}}>
                  <td></td><td className="c-accent bold">TDS Deduction @{tdsRate}%</td><td></td>
                  <td className="c-accent">(−{fmt(tdsAmt)})</td><td></td><td></td><td></td>
                </tr>}
              </tbody>
            </table></div>
          </div>
        </>}
        {!pid&&<div className="empty" style={{marginTop:40}}><div className="empty-ico">📒</div><p>Select a party to view its ledger</p></div>}

        {viewBill&&<div className="overlay"><div className="modal modal-xl">
          <div className="mhead">
            <h3>Bill — {viewBill.billNo}</h3>
            <div className="fxc gap8">
              <ShareButtons bill={viewBill} state={state} billType={viewBill._type||'paddy'}/>
              <button className="xbtn" onClick={()=>setViewBill(null)}>✕</button>
            </div>
          </div>
          <div className="mbody"><BillView bill={viewBill} state={state} billType={viewBill._type||'paddy'}/></div>
        </div></div>}
      </div>
    </>
  );
}

/* ─── BROKERS ──────────────────────────────────────────── */
function Brokers({state,save}){
  const [modal,setModal]=useState(false);
  const [form,setForm]=useState({name:'',phone:'',commission:1.5,address:''});
  const [editId,setEditId]=useState(null);
  const [payModal,setPayModal]=useState(null);
  const [payForm,setPayForm]=useState({date:tod(),amount:'',note:'',mode:'cash'});

  const brokers = state.brokers||[];
  const brokerTxns = state.brokerTransactions||[];

  const openAdd=()=>{
    setForm({name:'',phone:'',commission:1.5,address:''});
    setEditId(null);
    setModal(true);
  };

  const openEdit=(b)=>{
    setForm({...b});
    setEditId(b.id);
    setModal(true);
  };

  const doSave=()=>{
    if(!form.name.trim()) return;
    if(editId){
      save(s=>({...s,brokers:(s.brokers||[]).map(b=>b.id===editId?{...form,id:editId}:b)}));
    } else {
      save(s=>({...s,brokers:[...(s.brokers||[]),{...form,id:uid()}]}));
    }
    setModal(false);
  };

  const doDel=(id)=>{
    if(!confirm('Delete this broker?')) return;
    save(s=>({...s,brokers:(s.brokers||[]).filter(b=>b.id!==id),brokerTransactions:(s.brokerTransactions||[]).filter(t=>t.brokerId!==id)}));
  };

  const openPayModal=(brokerId)=>{
    setPayModal(brokerId);
    setPayForm({date:tod(),amount:'',note:'',mode:'cash'});
  };

  const doSavePay=()=>{
    if(!(+payForm.amount>0)) return;
    
    // Mark pending broker transactions as paid (up to the payment amount)
    let remainingAmt=+payForm.amount;
    save(s=>{
      const updatedTxns=(s.brokerTransactions||[]).map(t=>{
        if(t.brokerId===payModal && t.status==='pending' && remainingAmt>0){
          const amtToPay=Math.min(remainingAmt,t.amount);
          remainingAmt-=amtToPay;
          return {...t,status:'paid',paidDate:payForm.date,paidAmount:amtToPay,paymentMode:payForm.mode,paymentNote:payForm.note};
        }
        return t;
      });
      
      // If there's remaining amount, add as separate payment record
      if(remainingAmt>0){
        updatedTxns.push({
          id:uid(),
          brokerId:payModal,
          date:payForm.date,
          amount:remainingAmt,
          status:'paid',
          paidDate:payForm.date,
          paidAmount:remainingAmt,
          paymentMode:payForm.mode,
          note:payForm.note||'Direct payment',
          orderId:null
        });
      }
      
      return {...s,brokerTransactions:updatedTxns};
    });
    setPayModal(null);
  };

  const brokerBalance=(bId)=>{
    const txns=brokerTxns.filter(t=>t.brokerId===bId);
    
    // Get pending amounts from orders where we pay
    const orderDues=txns.filter(t=>t.status==='pending').reduce((s,t)=>s+(+t.amount||0),0);
    
    // Get completed payments
    const paidTxns=txns.filter(t=>t.status==='paid');
    const totalPaid=paidTxns.reduce((s,t)=>s+(+t.amount||0),0);
    
    return {totalDue:orderDues,totalPaid,balance:orderDues-totalPaid};
  };

  return(
    <>
      <div className="topbar">
        <h2>🤵 Brokers</h2>
        <div className="topbar-right">
          <button className="btn btn-primary" onClick={openAdd}>+ Add Broker</button>
        </div>
      </div>
      <div className="content">
        <div className="card">
          <div className="twrap">
            <table>
              <thead><tr>
                <th>Broker Name</th><th>Phone</th><th>Commission %</th><th>Address</th>
                <th style={{textAlign:'right'}}>Total Due</th><th style={{textAlign:'right'}}>Paid</th>
                <th style={{textAlign:'right'}}>Balance</th><th>Actions</th>
              </tr></thead>
              <tbody>
                {brokers.length===0&&<tr><td colSpan={8}><div className="empty"><div className="empty-ico">🤵</div><p>No brokers yet</p></div></td></tr>}
                {brokers.map(b=>{
                  const bal=brokerBalance(b.id);
                  return(
                    <tr key={b.id}>
                      <td className="bold">{b.name}</td>
                      <td>{b.phone||'—'}</td>
                      <td>{b.commission}%</td>
                      <td className="c-muted">{b.address||'—'}</td>
                      <td className="tr c-accent bold">{fmt(bal.totalDue)}</td>
                      <td className="tr c-green">{fmt(bal.totalPaid)}</td>
                      <td className="tr bold" style={{color:bal.balance>0?'var(--red)':'var(--text3)'}}>{fmt(bal.balance)}</td>
                      <td>
                        <div className="tda">
                          {bal.balance>0&&<button className="btn btn-success btn-xs" onClick={()=>openPayModal(b.id)}>💳 Pay</button>}
                          <button className="btn btn-ghost btn-xs" onClick={()=>openEdit(b)}>Edit</button>
                          <button className="btn btn-danger btn-xs" onClick={()=>doDel(b.id)}>Del</button>
                        </div>
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </div>

        {/* Broker Transactions History */}
        <div className="card mt16">
          <div className="sec-hdr mb12">
            <div className="sec-ttl">💳 Brokerage Transactions</div>
          </div>
          <div className="twrap">
            <table>
              <thead><tr>
                <th>Date</th><th>Broker</th><th>Order No</th><th>Type</th>
                <th style={{textAlign:'right'}}>Amount</th><th>Status</th>
                <th>Payment Date</th><th>Mode</th><th>Note</th>
              </tr></thead>
              <tbody>
                {brokerTxns.length===0&&<tr><td colSpan={9}><div className="empty"><p>No broker transactions yet</p></div></td></tr>}
                {brokerTxns.slice().sort((a,b)=>b.date.localeCompare(a.date)).map(t=>{
                  const broker=brokers.find(b=>b.id===t.brokerId);
                  const order=(state.orders||[]).find(o=>o.id===t.orderId);
                  return(
                    <tr key={t.id}>
                      <td>{t.date}</td>
                      <td className="bold">{broker?.name||t.brokerName||'—'}</td>
                      <td className="c-muted">{order?.orderNo||'—'}</td>
                      <td>{t.orderId?<span className="pill p-blue">Order Brokerage</span>:<span className="pill p-gray">Direct Payment</span>}</td>
                      <td className="tr bold c-accent">{fmt(t.amount)}</td>
                      <td>
                        {t.status==='paid'
                          ?<span className="pill p-green">✅ Paid</span>
                          :<span className="pill p-orange">⏳ Pending</span>}
                      </td>
                      <td className="c-muted">{t.paidDate||'—'}</td>
                      <td>{t.paymentMode?<span className={`pill ${t.paymentMode==='cash'?'p-green':'p-blue'}`}>{t.paymentMode}</span>:'—'}</td>
                      <td className="c-muted" style={{fontSize:11}}>{t.note||t.paymentNote||'—'}</td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </div>
      </div>

      {modal&&<div className="overlay" onClick={()=>setModal(false)}>
        <div className="modal" onClick={e=>e.stopPropagation()}>
          <div className="mhead">
            <h3>{editId?'Edit':'Add'} Broker</h3>
            <button className="xbtn" onClick={()=>setModal(false)}>✕</button>
          </div>
          <div className="mbody">
            <div className="fg">
              <div className="flbl">Broker Name</div>
              <input className="finput" value={form.name} onChange={e=>setForm({...form,name:e.target.value})}/>
            </div>
            <div className="frow">
              <div className="fg">
                <div className="flbl">Phone</div>
                <input className="finput" value={form.phone} onChange={e=>setForm({...form,phone:e.target.value})}/>
              </div>
              <div className="fg">
                <div className="flbl">Commission %</div>
                <input type="number" step="0.1" className="finput" value={form.commission} onChange={e=>setForm({...form,commission:e.target.value})}/>
              </div>
            </div>
            <div className="fg">
              <div className="flbl">Address</div>
              <input className="finput" value={form.address} onChange={e=>setForm({...form,address:e.target.value})}/>
            </div>
          </div>
          <div className="mfoot">
            <button className="btn btn-ghost" onClick={()=>setModal(false)}>Cancel</button>
            <button className="btn btn-primary" onClick={doSave}>💾 Save</button>
          </div>
        </div>
      </div>}

      {payModal&&<div className="overlay" onClick={()=>setPayModal(null)}>
        <div className="modal" onClick={e=>e.stopPropagation()}>
          <div className="mhead">
            <h3>💳 Pay Broker</h3>
            <button className="xbtn" onClick={()=>setPayModal(null)}>✕</button>
          </div>
          <div className="mbody">
            <div className="frow">
              <div className="fg">
                <div className="flbl">Date</div>
                <input type="date" className="finput" value={payForm.date} onChange={e=>setPayForm({...payForm,date:e.target.value})}/>
              </div>
              <div className="fg">
                <div className="flbl">Amount</div>
                <input type="number" className="finput" value={payForm.amount} onChange={e=>setPayForm({...payForm,amount:e.target.value})}/>
              </div>
            </div>
            <div className="frow">
              <div className="fg">
                <div className="flbl">Mode</div>
                <select className="fselect" value={payForm.mode} onChange={e=>setPayForm({...payForm,mode:e.target.value})}>
                  <option value="cash">Cash</option>
                  <option value="bank">Bank</option>
                  <option value="upi">UPI</option>
                </select>
              </div>
              <div className="fg">
                <div className="flbl">Note</div>
                <input className="finput" value={payForm.note} onChange={e=>setPayForm({...payForm,note:e.target.value})}/>
              </div>
            </div>
          </div>
          <div className="mfoot">
            <button className="btn btn-ghost" onClick={()=>setPayModal(null)}>Cancel</button>
            <button className="btn btn-primary" onClick={doSavePay}>💳 Save Payment</button>
          </div>
        </div>
      </div>}
    </>
  );
}

/* ─── ORDERS ───────────────────────────────────────────── */
function Orders({state,save}){

  /* ── Top-level tab: purchase | sale ── */
  const [mainTab,setMainTab]=useState('sale');
  
  // Auto-switch to purchase tab if coming from purchase bills
  React.useEffect(()=>{
    const params=new URLSearchParams(window.location.search);
    if(params.get('type')==='purchase') setMainTab('purchase');
  },[]);        // 'sale' | 'purchase'

  /* ── Status sub-tab per section ── */
  const [saleStatusTab,setSaleStatusTab]=useState('ongoing');
  const [purchStatusTab,setPurchStatusTab]=useState('ongoing');

  /* ── Filters — sale ── */
  const [sSrch,setSSrch]=useState('');
  const [sFParty,setSFParty]=useState('');
  const [sFQuality,setSFQuality]=useState('');
  const [sFDateFrom,setSFDateFrom]=useState('');
  const [sFDateTo,setSFDateTo]=useState('');

  /* ── Filters — purchase ── */
  const [pSrch,setPSrch]=useState('');
  const [pFParty,setPFParty]=useState('');
  const [pFQuality,setPFQuality]=useState('');
  const [pFDateFrom,setPFDateFrom]=useState('');
  const [pFDateTo,setPFDateTo]=useState('');

  /* ── Modal state ── */
  const [modal,setModal]=useState(false);
  const [editId,setEditId]=useState(null);

  /* ── Order form ── */
  const blankItem=()=>({id:uid(),qualityId:'',bags:'',totalWeightKg:'',rate:'',cd:'',note:''});
  const blankForm=(type)=>({
    date:tod(),
    orderNo:'',
    orderCategory:type||mainTab,   // 'sale' | 'purchase'
    lockedCategory:!!(type),       // true = opened with a forced category, hide toggle
    partyId:'',
    items:[blankItem()],           // ← multi-item support
    dalali:'',
    brokerId:'',
    paidBy:'party',
    brokerName:'',
    status:'ongoing',
    note:'',
  });
  const [form,setForm]=useState(blankForm('sale'));

  /* ── Quick-add modals ── */
  const [addPartyModal,setAddPartyModal]=useState(false);
  const [addBrokerModal,setAddBrokerModal]=useState(false);
  const [partyForm,setPartyForm]=useState({name:'',nick:'',gst:'',type:'both',phone:'',address:''});
  const [brokerForm,setBrokerForm]=useState({name:'',phone:'',commission:1.5,address:''});

  const orders  = state.orders||[];
  const parties = state.parties||[];
  const qualities=state.qualities||[];
  const brokers = state.brokers||[];

  /* ── next order number ── */
  const nextNo=(cat)=>{
    const prefix=cat==='sale'?'SO-':'PO-';
    const nums=orders
      .filter(o=>o.orderCategory===cat||(cat==='sale'&&!o.orderCategory))
      .map(o=>{const m=(o.orderNo||'').match(/(\d+)$/);return m?+m[1]:0;});
    return prefix+(Math.max(0,...nums)+1).toString().padStart(4,'0');
  };

  /* ── open add ── */
  const openAdd=(cat)=>{
    const f=blankForm(cat);
    f.orderNo=nextNo(cat);
    setForm(f);setEditId(null);setModal(true);
  };

  /* ── open edit ── */
  const openEdit=(o)=>{
    // migrate old single-item orders and old field names
    const items=o.items&&o.items.length>0
      ?o.items.map(i=>({
          ...i,
          id:i.id||uid(),
          bags:i.bags||'',
          // migrate: if old item has quantity (quintals) but no totalWeightKg, convert
          totalWeightKg:i.totalWeightKg||((+i.quantity||0)*100)||'',
        }))
      :[{id:uid(),qualityId:o.qualityId||'',bags:'',totalWeightKg:(+o.quantity||0)*100||'',rate:o.rate||'',cd:o.cd||'',note:''}];
    setForm({...o,items,orderCategory:o.orderCategory||(o.orderType==='paddy'?'purchase':'sale')});
    setEditId(o.id);setModal(true);
  };

  /* ── item row helpers ── */
  const updItem=(idx,k,v)=>setForm(f=>{
    const items=[...f.items];items[idx]={...items[idx],[k]:v};return{...f,items};
  });
  const addItem=()=>setForm(f=>({...f,items:[...f.items,blankItem()]}));
  const remItem=(idx)=>setForm(f=>({...f,items:f.items.filter((_,i)=>i!==idx)}));

  /* ── compute total amount for form preview ── */
  const formTotal=form.items.reduce((s,it)=>{
    const qtls=(+it.totalWeightKg||0)/100;
    const gross=qtls*(+it.rate||0);
    const cd=+it.cd||0;
    return s+gross+cd;
  },0);
  const formTotalQ=form.items.reduce((s,it)=>s+(+it.totalWeightKg||0)/100,0);
  const dalaliAmt=+form.dalali||0;
  const formNet=formTotal-(form.paidBy==='party'?dalaliAmt:0);

  /* ── save ── */
  const doSave=()=>{
    if(!form.partyId){alert('Select a party');return;}
    if(form.items.some(it=>!it.qualityId||!(+it.totalWeightKg>0)||!(+it.rate>0))){
      alert('Fill quality, total weight and rate for all items');return;
    }
    // compute per-item amounts using totalWeightKg → quintals
    const itemsClean=form.items.map(it=>{
      const qtls=(+it.totalWeightKg)/100;
      const gross=qtls*(+it.rate);
      const cd=+it.cd||0;
      return{...it,bags:+it.bags||0,totalWeightKg:+it.totalWeightKg,quantity:+qtls.toFixed(4),rate:+it.rate,cd,amount:+(gross+cd).toFixed(2)};
    });
    const totalAmt=itemsClean.reduce((s,it)=>s+it.amount,0);
    const finalAmt=totalAmt-(form.paidBy==='party'?dalaliAmt:0);
    const totalQtls=itemsClean.reduce((s,it)=>s+(+it.quantity||0),0);
    const totalKg=itemsClean.reduce((s,it)=>s+(+it.totalWeightKg||0),0);
    const totalBags=itemsClean.reduce((s,it)=>s+(+it.bags||0),0);
    const newOrder={
      ...form,
      items:itemsClean,
      dalali:dalaliAmt,
      amount:finalAmt,
      // legacy compat fields (use first item)
      qualityId:itemsClean[0]?.qualityId||'',
      quantity:+totalQtls.toFixed(4),
      totalWeightKg:totalKg,
      totalBags,
      rate:itemsClean[0]?.rate||0,
      id:editId||uid(),
    };
    const brokerTxn=form.paidBy==='us'&&dalaliAmt>0&&(form.brokerId||form.brokerName)?{
      id:uid(),orderId:newOrder.id,brokerId:form.brokerId||'',brokerName:form.brokerName||'',
      date:form.date,amount:dalaliAmt,status:'pending',note:`Brokerage for ${form.orderNo}`
    }:null;

    save(s=>{
      let ns={...s};
      if(editId){
        ns={...ns,orders:(ns.orders||[]).map(o=>o.id===editId?newOrder:o)};
        if(brokerTxn) ns={...ns,brokerTransactions:[...(ns.brokerTransactions||[]).filter(t=>t.orderId!==editId),brokerTxn]};
        else ns={...ns,brokerTransactions:(ns.brokerTransactions||[]).filter(t=>t.orderId!==editId)};
      } else {
        ns={...ns,orders:[...(ns.orders||[]),newOrder]};
        if(brokerTxn) ns={...ns,brokerTransactions:[...(ns.brokerTransactions||[]),brokerTxn]};
      }
      return ns;
    });
    setModal(false);
  };

  const doDel=(id)=>{
    if(!confirm('Delete this order?'))return;
    save(s=>({...s,orders:(s.orders||[]).filter(o=>o.id!==id)}));
  };
  const setStatus=(id,status)=>save(s=>({...s,orders:(s.orders||[]).map(o=>o.id===id?{...o,status}:o)}));

  /* ── quick add party / broker ── */
  const doAddParty=()=>{
    if(!partyForm.name.trim()){alert('Enter party name');return;}
    const p={...partyForm,id:uid()};
    save(s=>({...s,parties:[...(s.parties||[]),p]}));
    setForm(f=>({...f,partyId:p.id}));
    setAddPartyModal(false);setPartyForm({name:'',nick:'',gst:'',type:'both',phone:'',address:''});
  };
  const doAddBroker=()=>{
    if(!brokerForm.name.trim()){alert('Enter broker name');return;}
    const b={...brokerForm,commission:+brokerForm.commission||0,id:uid()};
    save(s=>({...s,brokers:[...(s.brokers||[]),b]}));
    setForm(f=>({...f,brokerId:b.id}));
    setAddBrokerModal(false);setBrokerForm({name:'',phone:'',commission:1.5,address:''});
  };

  /* ── fulfilled Q helper ── */
  const fulfilledQ=(o)=>{
    if(o.orderCategory==='purchase'){
      return (state.paddyBills||[])
        .filter(b=>b.orderId===o.id)
        .reduce((s,b)=>(b.items||[]).reduce((ss,i)=>ss+((+i.totalWeight||0)/100),s),0);
    }
    return (state.riceSaleBills||[])
      .filter(b=>b.orderId===o.id)
      .reduce((s,b)=>(b.items||[]).reduce((ss,i)=>ss+((i.totalWeightKg||0)/100),s),0);
  };

  /* ── filter helper ── */
  const applyFilters=(list,{srch,fParty,fQuality,fDateFrom,fDateTo})=>{
    return list.filter(o=>{
      const party=parties.find(p=>p.id===o.partyId);
      const q=srch.toLowerCase();
      if(q&&!(o.orderNo||'').toLowerCase().includes(q)&&!(party?.name||'').toLowerCase().includes(q)) return false;
      if(fParty&&o.partyId!==fParty) return false;
      if(fQuality&&!(o.items||[]).some(it=>it.qualityId===fQuality)) return false;
      if(fDateFrom&&o.date<fDateFrom) return false;
      if(fDateTo&&o.date>fDateTo) return false;
      return true;
    });
  };

  /* ── split by category ── */
  const saleOrders    =orders.filter(o=>(o.orderCategory==='sale'   ||(!o.orderCategory&&o.orderType!=='paddy')));
  const purchOrders   =orders.filter(o=>(o.orderCategory==='purchase'||(o.orderType==='paddy')));

  const filtSale  =applyFilters(saleOrders, {srch:sSrch,fParty:sFParty,fQuality:sFQuality,fDateFrom:sFDateFrom,fDateTo:sFDateTo});
  const filtPurch =applyFilters(purchOrders,{srch:pSrch,fParty:pFParty,fQuality:pFQuality,fDateFrom:pFDateFrom,fDateTo:pFDateTo});

  const saleOngoing   =filtSale.filter(o=>o.status==='ongoing');
  const saleCompleted =filtSale.filter(o=>o.status==='completed');
  const purchOngoing  =filtPurch.filter(o=>o.status==='ongoing');
  const purchCompleted=filtPurch.filter(o=>o.status==='completed');

  const hasSaleFilter =sSrch||sFParty||sFQuality||sFDateFrom||sFDateTo;
  const hasPurchFilter=pSrch||pFParty||pFQuality||pFDateFrom||pFDateTo;

  /* ── unique parties/qualities per section for filter dropdowns ── */
  const saleParties    =parties.filter(p=>saleOrders.some(o=>o.partyId===p.id));
  const purchParties   =parties.filter(p=>purchOrders.some(o=>o.partyId===p.id));
  const saleQuals      =qualities.filter(q=>saleOrders.some(o=>(o.items||[]).some(it=>it.qualityId===q.id)));
  const purchQuals     =qualities.filter(q=>purchOrders.some(o=>(o.items||[]).some(it=>it.qualityId===q.id)));

  /* ── Quality options for the form based on order category ── */
  const formQuals=form.orderCategory==='purchase'
    ?qualities.filter(q=>q.type==='paddy')
    :qualities.filter(q=>q.type==='rice'||q.type==='other');

  /* ═══ ORDER CARD ═══ */
  const OrderCard=({o})=>{
    const party=parties.find(p=>p.id===o.partyId);
    const broker=brokers.find(b=>b.id===o.brokerId);
    const isPurch=o.orderCategory==='purchase';
    const done=fulfilledQ(o);
    const totalQ=+o.quantity||0;
    const remaining=Math.max(0,totalQ-done);
    const pct=totalQ>0?Math.min(100,(done/totalQ)*100):0;
    const isFullyDone=remaining<0.01&&totalQ>0;
    const linkedBills=isPurch
      ?(state.paddyBills||[]).filter(b=>b.orderId===o.id)
      :(state.riceSaleBills||[]).filter(b=>b.orderId===o.id);
    const itemsList=o.items&&o.items.length>0?o.items:
      [{qualityId:o.qualityId,quantity:o.quantity,rate:o.rate,cd:o.cd,amount:o.amount}];

    return(
      <div style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:12,padding:16,marginBottom:10,boxShadow:'var(--shadow-sm)'}}>
        {/* Header */}
        <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:12,flexWrap:'wrap',gap:8}}>
          <div style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
            <span style={{fontFamily:'Plus Jakarta Sans',fontWeight:800,fontSize:15,color:'var(--primary)'}}>{o.orderNo}</span>
            <span className={`pill ${isPurch?'p-orange':'p-teal'}`}>{isPurch?'🌾 Purchase':'🍚 Sale'}</span>
            {isFullyDone&&<span className="pill p-green">✅ Dispatched</span>}
          </div>
          <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
            {o.status==='ongoing'&&<button className="btn btn-success btn-xs" onClick={()=>setStatus(o.id,'completed')}>✓ Complete</button>}
            {o.status==='completed'&&<button className="btn btn-ghost btn-xs" onClick={()=>setStatus(o.id,'ongoing')}>↩ Reopen</button>}
            <button className="btn btn-ghost btn-xs" onClick={()=>openEdit(o)}>✏️</button>
            <button className="btn btn-danger btn-xs" onClick={()=>doDel(o.id)}>🗑</button>
          </div>
        </div>

        {/* Party + date + broker */}
        <div style={{display:'flex',gap:10,flexWrap:'wrap',marginBottom:12}}>
          <div style={{background:'var(--surface2)',borderRadius:8,padding:'7px 12px',flex:1,minWidth:120}}>
            <div style={{fontSize:10,fontWeight:600,color:'var(--text3)',textTransform:'uppercase',letterSpacing:.8}}>Party</div>
            <div style={{fontWeight:700,fontSize:13}}>{party?.name||'—'}</div>
          </div>
          <div style={{background:'var(--surface2)',borderRadius:8,padding:'7px 12px',minWidth:100}}>
            <div style={{fontSize:10,fontWeight:600,color:'var(--text3)',textTransform:'uppercase',letterSpacing:.8}}>Date</div>
            <div style={{fontWeight:600,fontSize:13}}>{o.date}</div>
          </div>
          {(broker?.name||o.brokerName)&&<div style={{background:'var(--surface2)',borderRadius:8,padding:'7px 12px',minWidth:100}}>
            <div style={{fontSize:10,fontWeight:600,color:'var(--text3)',textTransform:'uppercase',letterSpacing:.8}}>Broker</div>
            <div style={{fontWeight:600,fontSize:13}}>{broker?.name||o.brokerName}</div>
          </div>}
          <div style={{background:'var(--green-dim)',borderRadius:8,padding:'7px 12px',minWidth:110,borderLeft:'3px solid var(--green)'}}>
            <div style={{fontSize:10,fontWeight:600,color:'var(--green)',textTransform:'uppercase',letterSpacing:.8}}>Total Amount</div>
            <div style={{fontWeight:800,fontSize:15,color:'var(--green)'}}>{fmt(o.amount)}</div>
          </div>
        </div>

        {/* Items breakdown table */}
        <div style={{background:'var(--surface2)',borderRadius:8,overflow:'hidden',marginBottom:12,border:'1px solid var(--border2)'}}>
          <table style={{width:'100%',borderCollapse:'collapse'}}>
            <thead>
              <tr style={{background:'var(--surface3)'}}>
                <th style={{padding:'6px 10px',fontSize:10,fontWeight:700,color:'var(--text3)',textTransform:'uppercase',letterSpacing:.8,textAlign:'left'}}>Quality / Item</th>
                <th style={{padding:'6px 10px',fontSize:10,fontWeight:700,color:'var(--text3)',textTransform:'uppercase',letterSpacing:.8,textAlign:'right'}}>Bags</th>
                <th style={{padding:'6px 10px',fontSize:10,fontWeight:700,color:'var(--text3)',textTransform:'uppercase',letterSpacing:.8,textAlign:'right'}}>Total KG</th>
                <th style={{padding:'6px 10px',fontSize:10,fontWeight:700,color:'var(--text3)',textTransform:'uppercase',letterSpacing:.8,textAlign:'right'}}>Qty (Q)</th>
                <th style={{padding:'6px 10px',fontSize:10,fontWeight:700,color:'var(--text3)',textTransform:'uppercase',letterSpacing:.8,textAlign:'right'}}>Rate</th>
                <th style={{padding:'6px 10px',fontSize:10,fontWeight:700,color:'var(--text3)',textTransform:'uppercase',letterSpacing:.8,textAlign:'right'}}>CD</th>
                <th style={{padding:'6px 10px',fontSize:10,fontWeight:700,color:'var(--text3)',textTransform:'uppercase',letterSpacing:.8,textAlign:'right'}}>Amount</th>
              </tr>
            </thead>
            <tbody>
              {itemsList.map((it,i)=>{
                const q=qualities.find(qq=>qq.id===it.qualityId);
                const kg=+it.totalWeightKg||((+it.quantity||0)*100);
                const qtls=+it.quantity||kg/100;
                return(
                  <tr key={i} style={{borderTop:i>0?'1px solid var(--border2)':'none'}}>
                    <td style={{padding:'7px 10px',fontWeight:600,fontSize:13}}>
                      {q?<><span style={{color:'var(--primary)'}}>{q.subtype&&q.subtype!==q.name?q.subtype+' — ':''}{q.name}</span></>:'—'}
                    </td>
                    <td style={{padding:'7px 10px',textAlign:'right',color:'var(--text2)'}}>{(+it.bags||0)>0?it.bags:'—'}</td>
                    <td style={{padding:'7px 10px',textAlign:'right',fontWeight:600,color:'var(--text)'}}>{kg>0?kg.toLocaleString()+' KG':'—'}</td>
                    <td style={{padding:'7px 10px',textAlign:'right',fontWeight:700,color:'var(--accent)'}}>{qtls.toFixed(2)} Q</td>
                    <td style={{padding:'7px 10px',textAlign:'right',color:'var(--text2)'}}>{fmt(it.rate)}</td>
                    <td style={{padding:'7px 10px',textAlign:'right',color:'var(--text3)',fontSize:12}}>{it.cd>0?fmt(it.cd):'—'}</td>
                    <td style={{padding:'7px 10px',textAlign:'right',fontWeight:700,color:'var(--green)'}}>{fmt(it.amount||((qtls)*(+it.rate||0)+(+it.cd||0)))}</td>
                  </tr>
                );
              })}
            </tbody>
            {itemsList.length>1&&<tfoot>
              <tr style={{background:'var(--surface3)',borderTop:'2px solid var(--border)'}}>
                <td style={{padding:'6px 10px',fontWeight:700,fontSize:12}}>TOTAL</td>
                <td style={{padding:'6px 10px',textAlign:'right',fontWeight:700,color:'var(--text2)'}}>{itemsList.reduce((s,it)=>s+(+it.bags||0),0)}</td>
                <td style={{padding:'6px 10px',textAlign:'right',fontWeight:700,color:'var(--text)'}}>{itemsList.reduce((s,it)=>s+(+it.totalWeightKg||(+it.quantity||0)*100),0).toLocaleString()+' KG'}</td>
                <td style={{padding:'6px 10px',textAlign:'right',fontWeight:700,color:'var(--accent)'}}>{itemsList.reduce((s,it)=>s+(+it.quantity||(+it.totalWeightKg||0)/100),0).toFixed(2)} Q</td>
                <td colSpan={2}></td>
                <td style={{padding:'6px 10px',textAlign:'right',fontWeight:800,color:'var(--green)'}}>{fmt(o.amount)}</td>
              </tr>
            </tfoot>}
          </table>
        </div>

        {/* Dispatch progress */}
        {totalQ>0&&<div style={{marginBottom:linkedBills.length>0?10:0}}>
          <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
            <span style={{fontSize:12,fontWeight:700,color:'var(--text2)'}}>Dispatch Progress</span>
            <span style={{fontSize:12,color:'var(--text3)'}}>{done.toFixed(2)} / {totalQ} Q</span>
          </div>
          <div style={{background:'var(--surface3)',borderRadius:8,height:10,overflow:'hidden',marginBottom:4}}>
            <div style={{width:pct+'%',background:pct>=100?'var(--green)':pct>50?'var(--primary-mid)':'var(--primary-lt)',height:10,borderRadius:8,transition:'width .4s'}}/>
          </div>
          <div style={{display:'flex',gap:12,fontSize:11}}>
            <span style={{color:'var(--green)',fontWeight:600}}>✅ {done.toFixed(2)} Q ({pct.toFixed(0)}%)</span>
            {remaining>0.01&&<span style={{color:'var(--accent)',fontWeight:600}}>⏳ Remaining: {remaining.toFixed(2)} Q</span>}
            {!remaining&&totalQ>0&&<span style={{color:'var(--green)',fontWeight:600}}>🎉 Fully done!</span>}
            <span style={{color:'var(--blue)',marginLeft:'auto'}}>{linkedBills.length} bill{linkedBills.length!==1?'s':''} linked</span>
          </div>
        </div>}

        {/* Linked bills chips */}
        {linkedBills.length>0&&<div style={{borderTop:'1px solid var(--border2)',paddingTop:8,marginTop:4,display:'flex',gap:6,flexWrap:'wrap'}}>
          {linkedBills.map(b=>{
            const bQ=isPurch
              ?(b.items||[]).reduce((s,i)=>s+((+i.totalWeight||0)/100),0)
              :(b.items||[]).reduce((s,i)=>s+((i.totalWeightKg||0)/100),0);
            return<span key={b.id} style={{background:'var(--primary-dim)',color:'var(--primary)',padding:'3px 10px',borderRadius:8,fontSize:11,fontWeight:600}}>
              {b.billNo} · {bQ.toFixed(1)}Q · {fmt(b.totalAmount)}
            </span>;
          })}
        </div>}
      </div>
    );
  };

  /* ═══ FILTER BAR ═══ */
  const FilterBar=({srch,setSrch,fParty,setFParty,fQuality,setFQuality,fDateFrom,setFDateFrom,fDateTo,setFDateTo,partyList,qualList,hasFilter,category})=>(
    <div style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:10,padding:'12px 16px',marginBottom:14}}>
      <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:10,flexWrap:'wrap'}}>
        <span style={{fontSize:11,fontWeight:700,color:'var(--text3)',textTransform:'uppercase',letterSpacing:.8}}>🔍 Filter</span>
        {hasFilter&&<button className="btn btn-xs btn-danger" onClick={()=>{setSrch('');setFParty('');setFQuality('');setFDateFrom('');setFDateTo('');}}>✕ Clear</button>}
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(145px,1fr))',gap:8}}>
        <div className="swrap" style={{gridColumn:'span 2'}}>
          <span className="sico">🔍</span>
          <input className="finput" style={{paddingLeft:30}} placeholder="Search order no or party…" value={srch} onChange={e=>setSrch(e.target.value)}/>
        </div>
        <select className="fselect" value={fParty} onChange={e=>setFParty(e.target.value)}>
          <option value="">All Parties</option>
          {partyList.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}
        </select>
        <select className="fselect" value={fQuality} onChange={e=>setFQuality(e.target.value)}>
          <option value="">All {category==='purchase'?'Paddy':'Rice'} Types</option>
          {qualList.map(q=><option key={q.id} value={q.id}>{q.name}</option>)}
        </select>
        <div>
          <div style={{fontSize:10,fontWeight:600,color:'var(--text3)',marginBottom:3}}>FROM</div>
          <input type="date" className="finput" value={fDateFrom} onChange={e=>setFDateFrom(e.target.value)}/>
        </div>
        <div>
          <div style={{fontSize:10,fontWeight:600,color:'var(--text3)',marginBottom:3}}>TO</div>
          <input type="date" className="finput" value={fDateTo} onChange={e=>setFDateTo(e.target.value)}/>
        </div>
      </div>
    </div>
  );

  /* ═══ RENDER ═══ */
  return(
    <>
      <div className="topbar">
        <h2>📋 Orders</h2>
        <div className="topbar-right">
          <span className="c-muted" style={{fontSize:12}}>
            {saleOrders.filter(o=>o.status==='ongoing').length} sale · {purchOrders.filter(o=>o.status==='ongoing').length} purchase ongoing
          </span>
          <button className="btn btn-ghost" onClick={()=>openAdd('purchase')}>+ Purchase Order</button>
          <button className="btn btn-primary" onClick={()=>openAdd('sale')}>+ Sale Order</button>
        </div>
      </div>

      <div className="content">

        {/* ── Summary stats ── */}
        <div className="g4 mb16">
          <div className="stat-card bl-teal">
            <div className="stat-lbl">Sale Orders (Ongoing)</div>
            <div className="stat-val c-teal">{saleOrders.filter(o=>o.status==='ongoing').length}</div>
            <div className="stat-sub">{fmt(saleOrders.filter(o=>o.status==='ongoing').reduce((s,o)=>s+(+o.amount||0),0))} value</div>
          </div>
          <div className="stat-card bl-orange">
            <div className="stat-lbl">Purchase Orders (Ongoing)</div>
            <div className="stat-val c-accent">{purchOrders.filter(o=>o.status==='ongoing').length}</div>
            <div className="stat-sub">{fmt(purchOrders.filter(o=>o.status==='ongoing').reduce((s,o)=>s+(+o.amount||0),0))} value</div>
          </div>
          <div className="stat-card bl-green">
            <div className="stat-lbl">Sale Completed</div>
            <div className="stat-val c-green">{saleOrders.filter(o=>o.status==='completed').length}</div>
            <div className="stat-sub">all time</div>
          </div>
          <div className="stat-card bl-blue">
            <div className="stat-lbl">Purchase Completed</div>
            <div className="stat-val c-blue">{purchOrders.filter(o=>o.status==='completed').length}</div>
            <div className="stat-sub">all time</div>
          </div>
        </div>

        {/* ── Main tabs: Sale / Purchase ── */}
        <div className="tabs mb16" style={{width:'fit-content'}}>
          <div className={`tab ${mainTab==='sale'?'on':''}`} onClick={()=>setMainTab('sale')}>🍚 Sale Orders ({saleOrders.length})</div>
          <div className={`tab ${mainTab==='purchase'?'on':''}`} onClick={()=>setMainTab('purchase')}>🌾 Purchase Orders ({purchOrders.length})</div>
        </div>

        {/* ══════ SALE SECTION ══════ */}
        {mainTab==='sale'&&<>
          <FilterBar
            srch={sSrch} setSrch={setSSrch}
            fParty={sFParty} setFParty={setSFParty}
            fQuality={sFQuality} setFQuality={setSFQuality}
            fDateFrom={sFDateFrom} setFDateFrom={setSFDateFrom}
            fDateTo={sFDateTo} setFDateTo={setSFDateTo}
            partyList={saleParties} qualList={saleQuals}
            hasFilter={hasSaleFilter} category="sale"
          />
          <div className="tabs" style={{marginBottom:14}}>
            <div className={`tab ${saleStatusTab==='ongoing'?'on':''}`} onClick={()=>setSaleStatusTab('ongoing')}>
              📋 Ongoing ({saleOngoing.length})
            </div>
            <div className={`tab ${saleStatusTab==='completed'?'on':''}`} onClick={()=>setSaleStatusTab('completed')}>
              ✅ Completed ({saleCompleted.length})
            </div>
          </div>
          {saleStatusTab==='ongoing'&&(
            saleOngoing.length===0
              ?<div className="empty"><div className="empty-ico">{hasSaleFilter?'🔍':'🍚'}</div><p>{hasSaleFilter?'No orders match filters.':'No ongoing sale orders. Click "+ Sale Order" to add one.'}</p></div>
              :saleOngoing.map(o=><OrderCard key={o.id} o={o}/>)
          )}
          {saleStatusTab==='completed'&&(
            saleCompleted.length===0
              ?<div className="empty"><div className="empty-ico">{hasSaleFilter?'🔍':'✅'}</div><p>{hasSaleFilter?'No orders match filters.':'No completed sale orders.'}</p></div>
              :saleCompleted.map(o=><OrderCard key={o.id} o={o}/>)
          )}
        </>}

        {/* ══════ PURCHASE SECTION ══════ */}
        {mainTab==='purchase'&&<>
          <FilterBar
            srch={pSrch} setSrch={setPSrch}
            fParty={pFParty} setFParty={setPFParty}
            fQuality={pFQuality} setFQuality={setPFQuality}
            fDateFrom={pFDateFrom} setFDateFrom={setPFDateFrom}
            fDateTo={pFDateTo} setFDateTo={setPFDateTo}
            partyList={purchParties} qualList={purchQuals}
            hasFilter={hasPurchFilter} category="purchase"
          />
          <div className="tabs" style={{marginBottom:14}}>
            <div className={`tab ${purchStatusTab==='ongoing'?'on':''}`} onClick={()=>setPurchStatusTab('ongoing')}>
              📋 Ongoing ({purchOngoing.length})
            </div>
            <div className={`tab ${purchStatusTab==='completed'?'on':''}`} onClick={()=>setPurchStatusTab('completed')}>
              ✅ Completed ({purchCompleted.length})
            </div>
          </div>
          {purchStatusTab==='ongoing'&&(
            purchOngoing.length===0
              ?<div className="empty"><div className="empty-ico">{hasPurchFilter?'🔍':'🌾'}</div><p>{hasPurchFilter?'No orders match filters.':'No ongoing purchase orders. Click "+ Purchase Order" to add one.'}</p></div>
              :purchOngoing.map(o=><OrderCard key={o.id} o={o}/>)
          )}
          {purchStatusTab==='completed'&&(
            purchCompleted.length===0
              ?<div className="empty"><div className="empty-ico">{hasPurchFilter?'🔍':'✅'}</div><p>{hasPurchFilter?'No orders match filters.':'No completed purchase orders.'}</p></div>
              :purchCompleted.map(o=><OrderCard key={o.id} o={o}/>)
          )}
        </>}
      </div>

      {/* ══════════════ NEW / EDIT ORDER MODAL ══════════════ */}
      {modal&&<div className="overlay" onClick={()=>setModal(false)}>
        <div className="modal modal-xl" onClick={e=>e.stopPropagation()}>
          <div className="mhead">
            <h3>{editId?'✏️ Edit':'➕ New'} {form.orderCategory==='purchase'?'Purchase':'Sale'} Order</h3>
            <button className="xbtn" onClick={()=>setModal(false)}>✕</button>
          </div>
          <div className="mbody">

            {/* ── Order category toggle (hidden when locked to a category) ── */}
            {!form.lockedCategory&&<div className="fg mb12">
              <div className="flbl">Order Type</div>
              <div style={{display:'flex',gap:8}}>
                {[['sale','🍚 Sale Order'],['purchase','🌾 Purchase Order']].map(([v,lbl])=>(
                  <div key={v} onClick={()=>setForm(f=>({...f,orderCategory:v,items:[blankItem()]}))}
                    style={{flex:1,padding:'9px 12px',borderRadius:8,textAlign:'center',fontWeight:600,fontSize:13,cursor:'pointer',transition:'all .12s',
                      border:`2px solid ${form.orderCategory===v?'var(--primary)':'var(--border)'}`,
                      background:form.orderCategory===v?'var(--primary-dim)':'var(--surface2)',
                      color:form.orderCategory===v?'var(--primary)':'var(--text2)'}}>
                    {lbl}
                  </div>
                ))}
              </div>
            </div>}
            {form.lockedCategory&&<div style={{display:'flex',alignItems:'center',gap:8,padding:'8px 12px',background:form.orderCategory==='purchase'?'var(--accent-dim)':'var(--primary-dim)',borderRadius:8,marginBottom:12}}>
              <span style={{fontSize:16}}>{form.orderCategory==='purchase'?'🌾':'🍚'}</span>
              <span style={{fontWeight:700,fontSize:13,color:form.orderCategory==='purchase'?'var(--accent)':'var(--primary)'}}>
                {form.orderCategory==='purchase'?'Purchase Order':'Sale Order'}
              </span>
              <span style={{fontSize:11,color:'var(--text3)'}}>— type is fixed for this context</span>
            </div>}

            {/* ── Header: order no, date, party ── */}
            <div className="frow">
              <div className="fg">
                <div className="flbl">Order No</div>
                <input className="finput" value={form.orderNo} onChange={e=>setForm(f=>({...f,orderNo:e.target.value}))}/>
              </div>
              <div className="fg">
                <div className="flbl">Date</div>
                <input type="date" className="finput" value={form.date} onChange={e=>setForm(f=>({...f,date:e.target.value}))}/>
              </div>
            </div>
            <div className="fg">
              <div className="flbl">Party *</div>
              <div style={{display:'flex',gap:6}}>
                <select className="fselect" style={{flex:1}} value={form.partyId} onChange={e=>setForm(f=>({...f,partyId:e.target.value}))}>
                  <option value="">— Select Party —</option>
                  {parties.map(p=><option key={p.id} value={p.id}>{p.name}{p.nick?' ('+p.nick+')':''}</option>)}
                </select>
                <button className="btn btn-success btn-sm" onClick={e=>{e.preventDefault();setAddPartyModal(true);}}>+ New</button>
              </div>
            </div>

            <div className="divider"/>

            {/* ── Multi-item rows ── */}
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10}}>
              <div style={{fontWeight:700,fontSize:13,fontFamily:'Plus Jakarta Sans',color:'var(--primary)'}}>
                {form.orderCategory==='purchase'?'🌾':'🍚'} Order Items
              </div>
              <button className="btn btn-ghost btn-sm" onClick={addItem}>+ Add Row</button>
            </div>

            {/* Items table header */}
            <div style={{display:'grid',gridTemplateColumns:'2fr 80px 110px 90px 80px 30px',gap:6,marginBottom:6,padding:'0 2px'}}>
              {['Quality / Item *','Bags / Katte','Total Weight (KG) *','Rate / Q (₹) *','CD (₹)',''].map((h,i)=>(
                <div key={i} style={{fontSize:10,fontWeight:700,color:'var(--text3)',textTransform:'uppercase',letterSpacing:.7}}>{h}</div>
              ))}
            </div>

            {form.items.map((item,idx)=>{
              const qtlsPreview=(+item.totalWeightKg||0)/100;
              return(
              <div key={item.id} style={{display:'grid',gridTemplateColumns:'2fr 80px 110px 90px 80px 30px',gap:6,marginBottom:8,alignItems:'center'}}>
                <select className="fselect" value={item.qualityId} onChange={e=>updItem(idx,'qualityId',e.target.value)}>
                  <option value="">— Select —</option>
                  {formQuals.map(q=>(
                    <option key={q.id} value={q.id}>
                      {q.subtype&&q.subtype!==q.name?q.subtype+' — ':''}{q.name}
                    </option>
                  ))}
                </select>
                <input type="number" className="finput" placeholder="0" min="0"
                  value={item.bags} onChange={e=>updItem(idx,'bags',e.target.value)}/>
                <div style={{position:'relative'}}>
                  <input type="number" className="finput" placeholder="KG" min="0" step="0.01"
                    value={item.totalWeightKg} onChange={e=>updItem(idx,'totalWeightKg',e.target.value)}
                    style={{paddingRight:qtlsPreview>0?36:10}}/>
                  {qtlsPreview>0&&<span style={{position:'absolute',right:8,top:'50%',transform:'translateY(-50%)',fontSize:10,color:'var(--text3)',fontWeight:700,pointerEvents:'none'}}>
                    {qtlsPreview.toFixed(2)}Q
                  </span>}
                </div>
                <input type="number" className="finput" placeholder="0"
                  value={item.rate} onChange={e=>updItem(idx,'rate',e.target.value)}/>
                <input type="number" className="finput" placeholder="0"
                  value={item.cd} onChange={e=>updItem(idx,'cd',e.target.value)}/>
                <button className="btn btn-danger btn-xs btn-icon"
                  onClick={()=>remItem(idx)}
                  disabled={form.items.length===1}
                  style={{opacity:form.items.length===1?.3:1}}>✕</button>
              </div>
              );
            })}

            {/* Items total preview */}
            {formTotal>0&&<div style={{background:'var(--surface2)',borderRadius:8,padding:'10px 14px',marginBottom:4,border:'1px solid var(--border)'}}>
              <div style={{display:'flex',justifyContent:'space-between',fontSize:13,marginBottom:4}}>
                <span style={{color:'var(--text2)'}}>Total: <b>{formTotalQ.toFixed(2)} Q</b> ({(formTotalQ*100).toFixed(0)} KG)</span>
                <span style={{fontWeight:700}}>{fmt(formTotal)}</span>
              </div>
              {form.items.length>1&&<div style={{fontSize:12,color:'var(--text3)'}}>
                {form.items.map((it,i)=>{
                  const q=qualities.find(qq=>qq.id===it.qualityId);
                  const qtls=(+it.totalWeightKg||0)/100;
                  const amt=qtls*(+it.rate||0)+(+it.cd||0);
                  return q?<span key={i} style={{marginRight:12}}>{q.name}: {(+it.bags||0)} bags · {it.totalWeightKg}KG ({qtls.toFixed(2)}Q) @ {fmt(it.rate)} = {fmt(amt)}</span>:null;
                })}
              </div>}
            </div>}

            <div className="divider"/>

            {/* ── Dalali / brokerage ── */}
            <div className="frow">
              <div className="fg">
                <div className="flbl">Dalali (Brokerage) ₹</div>
                <input type="number" className="finput" value={form.dalali} placeholder="0"
                  onChange={e=>setForm(f=>({...f,dalali:e.target.value}))}/>
              </div>
              <div className="fg">
                <div className="flbl">Who Pays Brokerage?</div>
                <div style={{display:'flex',gap:8,marginTop:2}}>
                  {[['party','Party Pays'],['us','We Pay']].map(([v,lbl])=>(
                    <div key={v} onClick={()=>setForm(f=>({...f,paidBy:v}))}
                      style={{flex:1,padding:'7px 10px',borderRadius:8,textAlign:'center',fontWeight:600,fontSize:12,cursor:'pointer',
                        border:`2px solid ${form.paidBy===v?'var(--primary)':'var(--border)'}`,
                        background:form.paidBy===v?'var(--primary-dim)':'var(--surface2)',
                        color:form.paidBy===v?'var(--primary)':'var(--text2)'}}>
                      {lbl}
                    </div>
                  ))}
                </div>
              </div>
            </div>

            {form.paidBy==='us'&&<div style={{display:'flex',gap:6,marginBottom:12}}>
              <select className="fselect" style={{flex:1}} value={form.brokerId} onChange={e=>setForm(f=>({...f,brokerId:e.target.value}))}>
                <option value="">— Select Broker —</option>
                {brokers.map(b=><option key={b.id} value={b.id}>{b.name}</option>)}
              </select>
              {!form.brokerId&&<input className="finput" style={{flex:1}} value={form.brokerName}
                onChange={e=>setForm(f=>({...f,brokerName:e.target.value}))} placeholder="Or type broker name…"/>}
              <button className="btn btn-success btn-sm" onClick={e=>{e.preventDefault();setAddBrokerModal(true);}}>+ New</button>
            </div>}

            {/* ── Net amount preview ── */}
            {formTotal>0&&<div className="alert alert-ok" style={{marginTop:4}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <span style={{fontWeight:600}}>Net {form.orderCategory==='sale'?'Receivable':'Payable'}:</span>
                <span style={{fontSize:20,fontWeight:800}}>{fmt(formNet)}</span>
              </div>
              {dalaliAmt>0&&form.paidBy==='party'&&<div style={{fontSize:11,marginTop:3,opacity:.8}}>Dalali {fmt(dalaliAmt)} deducted (paid by party)</div>}
              {dalaliAmt>0&&form.paidBy==='us'&&<div style={{fontSize:11,marginTop:3,opacity:.8}}>Dalali {fmt(dalaliAmt)} tracked separately (we pay)</div>}
            </div>}

            <div className="fg mt12">
              <div className="flbl">Notes</div>
              <input className="finput" value={form.note||''} onChange={e=>setForm(f=>({...f,note:e.target.value}))} placeholder="Any remarks…"/>
            </div>
          </div>
          <div className="mfoot">
            <button className="btn btn-ghost" onClick={()=>setModal(false)}>Cancel</button>
            <button className="btn btn-primary" onClick={doSave}>💾 Save Order</button>
          </div>
        </div>
      </div>}

      {/* Quick Add Party */}
      {addPartyModal&&<div className="overlay" onClick={()=>setAddPartyModal(false)}>
        <div className="modal" onClick={e=>e.stopPropagation()}>
          <div className="mhead"><h3>+ Quick Add Party</h3><button className="xbtn" onClick={()=>setAddPartyModal(false)}>✕</button></div>
          <div className="mbody">
            <div className="fg"><div className="flbl">Name *</div><input className="finput" autoFocus value={partyForm.name} onChange={e=>setPartyForm(f=>({...f,name:e.target.value}))}/></div>
            <div className="frow">
              <div className="fg"><div className="flbl">Nick</div><input className="finput" value={partyForm.nick} onChange={e=>setPartyForm(f=>({...f,nick:e.target.value}))}/></div>
              <div className="fg"><div className="flbl">Type</div>
                <select className="fselect" value={partyForm.type} onChange={e=>setPartyForm(f=>({...f,type:e.target.value}))}>
                  <option value="supplier">Supplier</option><option value="buyer">Buyer</option><option value="both">Both</option>
                </select>
              </div>
            </div>
            <div className="frow">
              <div className="fg"><div className="flbl">Phone</div><input className="finput" value={partyForm.phone} onChange={e=>setPartyForm(f=>({...f,phone:e.target.value}))}/></div>
              <div className="fg"><div className="flbl">GST</div><input className="finput" value={partyForm.gst} onChange={e=>setPartyForm(f=>({...f,gst:e.target.value}))}/></div>
            </div>
          </div>
          <div className="mfoot"><button className="btn btn-ghost" onClick={()=>setAddPartyModal(false)}>Cancel</button><button className="btn btn-primary" onClick={doAddParty}>+ Add Party</button></div>
        </div>
      </div>}

      {/* Quick Add Broker */}
      {addBrokerModal&&<div className="overlay" onClick={()=>setAddBrokerModal(false)}>
        <div className="modal" onClick={e=>e.stopPropagation()}>
          <div className="mhead"><h3>+ Quick Add Broker</h3><button className="xbtn" onClick={()=>setAddBrokerModal(false)}>✕</button></div>
          <div className="mbody">
            <div className="fg"><div className="flbl">Name *</div><input className="finput" autoFocus value={brokerForm.name} onChange={e=>setBrokerForm(f=>({...f,name:e.target.value}))}/></div>
            <div className="frow">
              <div className="fg"><div className="flbl">Phone</div><input className="finput" value={brokerForm.phone} onChange={e=>setBrokerForm(f=>({...f,phone:e.target.value}))}/></div>
              <div className="fg"><div className="flbl">Commission %</div><input type="number" step="0.1" className="finput" value={brokerForm.commission} onChange={e=>setBrokerForm(f=>({...f,commission:e.target.value}))}/></div>
            </div>
          </div>
          <div className="mfoot"><button className="btn btn-ghost" onClick={()=>setAddBrokerModal(false)}>Cancel</button><button className="btn btn-primary" onClick={doAddBroker}>+ Add Broker</button></div>
        </div>
      </div>}
    </>
  );
}
/* ─── SETTLEMENT ───────────────────────────────────────── */
function Settlement({state,save}){
  const [selParty,setSelParty]=useState('');
  const [payModal,setPayModal]=useState(false);
  const [payForm,setPayForm]=useState({date:tod(),amount:'',mode:'cash',note:''});
  const [mapModal,setMapModal]=useState(null);
  const [mapForm,setMapForm]=useState({orderId:'',amountToMap:''});

  const orders=(state.orders||[]).filter(o=>o.status==='completed');
  const settlements=state.settlements||[];

  const partyOrders=(pId)=>orders.filter(o=>o.partyId===pId);
  const partyPayments=(pId)=>settlements.filter(s=>s.partyId===pId);

  const partyStats=(pId)=>{
    const ords=partyOrders(pId);
    const pays=partyPayments(pId);
    const totalBills=ords.reduce((s,o)=>s+(o.amount||0),0);
    const totalPaid=pays.reduce((s,p)=>s+(p.amount||0),0);
    const settled=pays.reduce((s,p)=>s+(p.settled||0),0);
    const balance=totalBills-settled;
    const unmapped=totalPaid-settled;
    return {totalBills,totalPaid,settled,balance,unmapped};
  };

  const openPay=(pId)=>{
    setSelParty(pId);
    setPayForm({date:tod(),amount:'',mode:'cash',note:''});
    setPayModal(true);
  };

  const doSavePay=()=>{
    if(!(+payForm.amount>0)){alert('Enter amount');return;}
    const pay={id:uid(),partyId:selParty,date:payForm.date,amount:+payForm.amount,mode:payForm.mode,note:payForm.note,settled:0,mappings:[]};
    save(s=>({...s,settlements:[...(s.settlements||[]),pay]}));
    setPayModal(false);
  };

  const openMap=(settlementId)=>{
    setMapModal(settlementId);
    setMapForm({orderId:'',amountToMap:''});
  };

  const doMap=()=>{
    if(!mapForm.orderId||!(+mapForm.amountToMap>0)){alert('Fill all fields');return;}
    const amt=+mapForm.amountToMap;
    save(s=>{
      const newSettlements=s.settlements.map(st=>{
        if(st.id===mapModal){
          const newMappings=[...(st.mappings||[]),{orderId:mapForm.orderId,amount:amt}];
          const newSettled=(st.settled||0)+amt;
          return {...st,mappings:newMappings,settled:newSettled};
        }
        return st;
      });
      return {...s,settlements:newSettlements};
    });
    setMapModal(null);
  };

  const parties=(state.parties||[]).filter(p=>{
    const ords=partyOrders(p.id);
    return ords.length>0;
  });

  return(
    <>
      <div className="topbar">
        <h2>💵 Settlement</h2>
      </div>
      <div className="content">
        {parties.length===0&&<div className="empty"><div className="empty-ico">💵</div><p>No completed orders to settle</p></div>}
        {parties.map(party=>{
          const stats=partyStats(party.id);
          const ords=partyOrders(party.id);
          const pays=partyPayments(party.id);
          return(
            <div key={party.id} className="card mb16">
              <div className="sec-hdr mb12">
                <div className="sec-ttl">{party.name}</div>
                <button className="btn btn-success btn-sm" onClick={()=>openPay(party.id)}>💳 Add Payment</button>
              </div>
              <div className="g4 mb16">
                <div className="stat-card bl-accent">
                  <div className="stat-lbl">Total Bills</div>
                  <div className="stat-val c-accent">{fmt(stats.totalBills)}</div>
                </div>
                <div className="stat-card bl-green">
                  <div className="stat-lbl">Total Received</div>
                  <div className="stat-val c-green">{fmt(stats.totalPaid)}</div>
                </div>
                <div className="stat-card bl-blue">
                  <div className="stat-lbl">Settled</div>
                  <div className="stat-val c-blue">{fmt(stats.settled)}</div>
                </div>
                <div className="stat-card bl-red">
                  <div className="stat-lbl">Balance</div>
                  <div className="stat-val" style={{color:stats.balance>0?'var(--red)':'var(--green)'}}>{fmt(stats.balance)}</div>
                  {stats.unmapped>0&&<div className="stat-sub c-orange">Unmapped: {fmt(stats.unmapped)}</div>}
                </div>
              </div>

              {/* Orders (Bills) */}
              <div className="mb16">
                <div className="c-muted" style={{fontSize:11,fontWeight:700,marginBottom:8,textTransform:'uppercase'}}>BILLS</div>
                <div className="twrap">
                  <table>
                    <thead><tr>
                      <th>Order No</th><th>Date</th><th>Quality</th><th>Qty</th>
                      <th style={{textAlign:'right'}}>Amount</th><th style={{textAlign:'right'}}>Settled</th>
                      <th style={{textAlign:'right'}}>Pending</th>
                    </tr></thead>
                    <tbody>
                      {ords.map(o=>{
                        const quality=(state.qualities||[]).find(q=>q.id===o.qualityId);
                        const mapped=pays.reduce((s,p)=>{
                          const m=(p.mappings||[]).find(mm=>mm.orderId===o.id);
                          return s+(m?m.amount:0);
                        },0);
                        const pending=(o.amount||0)-mapped;
                        return(
                          <tr key={o.id}>
                            <td className="bold" style={{color:'var(--primary)'}}>{o.orderNo}</td>
                            <td>{o.date}</td>
                            <td>{quality?.name||'—'}</td>
                            <td>{o.totalWeightKg?(o.totalWeightKg.toLocaleString()+' KG / '):''}{fmtQ(o.quantity)}</td>
                            <td className="tr bold c-accent">{fmt(o.amount)}</td>
                            <td className="tr c-green">{fmt(mapped)}</td>
                            <td className="tr bold" style={{color:pending>0?'var(--red)':'var(--text3)'}}>{fmt(pending)}</td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
              </div>

              {/* Payments */}
              <div>
                <div className="c-muted" style={{fontSize:11,fontWeight:700,marginBottom:8,textTransform:'uppercase'}}>PAYMENTS RECEIVED</div>
                <div className="twrap">
                  <table>
                    <thead><tr>
                      <th>Date</th><th style={{textAlign:'right'}}>Amount</th><th>Mode</th>
                      <th style={{textAlign:'right'}}>Settled</th><th style={{textAlign:'right'}}>Unmapped</th>
                      <th>Note</th><th>Actions</th>
                    </tr></thead>
                    <tbody>
                      {pays.length===0&&<tr><td colSpan={7}><div className="empty"><p>No payments yet</p></div></td></tr>}
                      {pays.map(p=>{
                        const unmapped=(p.amount||0)-(p.settled||0);
                        return(
                          <tr key={p.id}>
                            <td>{p.date}</td>
                            <td className="tr bold c-green">{fmt(p.amount)}</td>
                            <td><span className={`pill ${p.mode==='cash'?'p-green':'p-blue'}`}>{p.mode}</span></td>
                            <td className="tr c-blue">{fmt(p.settled||0)}</td>
                            <td className="tr" style={{color:unmapped>0?'var(--orange)':'var(--text3)'}}>{fmt(unmapped)}</td>
                            <td className="c-muted">{p.note||'—'}</td>
                            <td>
                              {unmapped>0&&<button className="btn btn-teal btn-xs" onClick={()=>openMap(p.id)}>🔗 Map to Bill</button>}
                            </td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
              </div>
            </div>
          );
        })}
      </div>

      {payModal&&<div className="overlay" onClick={()=>setPayModal(false)}>
        <div className="modal" onClick={e=>e.stopPropagation()}>
          <div className="mhead">
            <h3>💳 Add Payment</h3>
            <button className="xbtn" onClick={()=>setPayModal(false)}>✕</button>
          </div>
          <div className="mbody">
            <div className="frow">
              <div className="fg">
                <div className="flbl">Date</div>
                <input type="date" className="finput" value={payForm.date} onChange={e=>setPayForm({...payForm,date:e.target.value})}/>
              </div>
              <div className="fg">
                <div className="flbl">Amount Received</div>
                <input type="number" className="finput" value={payForm.amount} onChange={e=>setPayForm({...payForm,amount:e.target.value})}/>
              </div>
            </div>
            <div className="frow">
              <div className="fg">
                <div className="flbl">Mode</div>
                <select className="fselect" value={payForm.mode} onChange={e=>setPayForm({...payForm,mode:e.target.value})}>
                  <option value="cash">Cash</option>
                  <option value="bank">Bank</option>
                  <option value="upi">UPI</option>
                  <option value="cheque">Cheque</option>
                </select>
              </div>
              <div className="fg">
                <div className="flbl">Note</div>
                <input className="finput" value={payForm.note} onChange={e=>setPayForm({...payForm,note:e.target.value})}/>
              </div>
            </div>
          </div>
          <div className="mfoot">
            <button className="btn btn-ghost" onClick={()=>setPayModal(false)}>Cancel</button>
            <button className="btn btn-primary" onClick={doSavePay}>💳 Save Payment</button>
          </div>
        </div>
      </div>}

      {mapModal&&<div className="overlay" onClick={()=>setMapModal(null)}>
        <div className="modal" onClick={e=>e.stopPropagation()}>
          <div className="mhead">
            <h3>🔗 Map Payment to Bill</h3>
            <button className="xbtn" onClick={()=>setMapModal(null)}>✕</button>
          </div>
          <div className="mbody">
            {(()=>{
              const settlement=settlements.find(s=>s.id===mapModal);
              const party=(state.parties||[]).find(p=>p.id===settlement?.partyId);
              const ords=partyOrders(settlement?.partyId||'');
              const unmapped=(settlement?.amount||0)-(settlement?.settled||0);
              return(<>
                <div className="alert alert-ok mb12">Available to map: <strong>{fmt(unmapped)}</strong></div>
                <div className="fg">
                  <div className="flbl">Select Bill/Order</div>
                  <select className="fselect" value={mapForm.orderId} onChange={e=>setMapForm({...mapForm,orderId:e.target.value})}>
                    <option value="">-- Select Order --</option>
                    {ords.map(o=>{
                      const quality=(state.qualities||[]).find(q=>q.id===o.qualityId);
                      const mapped=settlements.reduce((s,st)=>{
                        const m=(st.mappings||[]).find(mm=>mm.orderId===o.id);
                        return s+(m?m.amount:0);
                      },0);
                      const pending=(o.amount||0)-mapped;
                      return <option key={o.id} value={o.id}>{o.orderNo} — {quality?.name||'—'} — Pending: {fmt(pending)}</option>;
                    })}
                  </select>
                </div>
                <div className="fg">
                  <div className="flbl">Amount to Map</div>
                  <input type="number" className="finput" value={mapForm.amountToMap} onChange={e=>setMapForm({...mapForm,amountToMap:e.target.value})} placeholder="Enter amount"/>
                </div>
              </>);
            })()}
          </div>
          <div className="mfoot">
            <button className="btn btn-ghost" onClick={()=>setMapModal(null)}>Cancel</button>
            <button className="btn btn-primary" onClick={doMap}>🔗 Map Payment</button>
          </div>
        </div>
      </div>}
    </>
  );
}

/* ─── QUALITIES ────────────────────────────────────────── */
/* ─── ITEMS ─────────────────────────────────────────────── */
function Items({state,save}){
  /* 
    Data model (reuses existing state.qualities):
      - An "Item"    = a unique {subtype, category} group  e.g. "Rice" (sale), "Paddy" (purchase)
      - A "Subtype"  = one quality record inside that group  e.g. "PR-11", "Basmati 1121"
    Bills already use qualityId → no data migration needed.
  */

  /* ── view state: null = overview, else = item group key ── */
  const [selItem,setSelItem]=useState(null); // { subtype, category }
  const [detailTab,setDetailTab]=useState('subtypes'); // subtypes | purchase | sale
  const [err,setErr]=useState('');

  /* ── Item (group) modal ── */
  const [itemModal,setItemModal]=useState(null); // null | 'add' | 'edit'
  const [itemForm,setItemForm]=useState({name:'',category:'both',editOldName:'',editOldCategory:''});

  /* ── Subtype modal ── */
  const [subtypeModal,setSubtypeModal]=useState(null); // null | 'add' | 'edit'
  const [subtypeForm,setSubtypeForm]=useState({name:'',editId:''});

  /* ── Expense type modal ── */
  const [expModal,setExpModal]=useState(null); // null | {mode:'add'|'edit', expType:'purchase'|'sale', item?}
  const [expForm,setExpForm]=useState({name:'',defaultPct:'',fixedAmt:''});

  const qualities = state.qualities || [];

  /* ── Derive distinct item groups ── */
  const itemGroups = useMemo(()=>{
    const map = new Map();
    qualities.forEach(q=>{
      const grpKey = `${q.subtype||''}|||${q.type||''}`;
      if(!map.has(grpKey)){
        map.set(grpKey,{
          subtype: q.subtype||'',
          category: q.type||'other',
          count: 0,
        });
      }
      map.get(grpKey).count++;
    });
    return [...map.values()].sort((a,b)=>a.subtype.localeCompare(b.subtype));
  },[qualities]);

  /* ── Subtypes for selected item ── */
  const subtypesForItem = selItem
    ? qualities
        .filter(q=>(q.subtype||'')===selItem.subtype && (q.type||'')===selItem.category)
        .slice()
        .sort((a,b)=>String(a.name||'').localeCompare(String(b.name||'')))
    : [];

  /* ── Category config ── */
  const CAT={
    paddy: {label:'Purchase (Paddy)',  icon:'🌾', color:'var(--accent)',  pill:'p-orange'},
    rice:  {label:'Sale (Rice)',       icon:'🍚', color:'var(--teal)',    pill:'p-teal'},
    other: {label:'Other',             icon:'📦', color:'var(--blue)',    pill:'p-blue'},
  };

  /* ── Expense type helpers (per-item) ── */
  const itemExpKey = (grp) => `${grp.subtype}|||${grp.category}`;
  const getItemExps = (grp, expType) => {
    const k = itemExpKey(grp);
    return ((state.itemExpenseTypes||{})[k]||{})[expType]||[];
  };
  const purchaseExpTypes = selItem ? getItemExps(selItem,'purchase') : [];
  const saleExpTypes     = selItem ? getItemExps(selItem,'sale')     : [];

  /* ══ ITEM GROUP CRUD ══ */
  const openAddItem=()=>{
    setItemForm({name:'',category:'rice',editOldName:'',editOldCategory:''});
    setErr('');setItemModal('add');
  };
  const openEditItem=(grp)=>{
    setItemForm({name:grp.subtype,category:grp.category,editOldName:grp.subtype,editOldCategory:grp.category});
    setErr('');setItemModal('edit');
  };

  const saveItem=()=>{
    const name=itemForm.name.trim();
    if(!name){setErr('Item name is required');return;}
    const dup=itemGroups.find(g=>
      g.subtype.toLowerCase()===name.toLowerCase()&&
      g.category===itemForm.category&&
      !(itemModal==='edit'&&g.subtype===itemForm.editOldName&&g.category===itemForm.editOldCategory)
    );
    if(dup){setErr('An item with this name and category already exists');return;}
    setErr('');
    if(itemModal==='add'){
      save(s=>({...s,itemCategories:[...(s.itemCategories||[]),{id:uid(),name,category:itemForm.category}]}));
    } else {
      save(s=>({
        ...s,
        qualities:(s.qualities||[]).map(q=>
          (q.subtype||'')===(itemForm.editOldName)&&(q.type||'')===(itemForm.editOldCategory)
            ?{...q,subtype:name,type:itemForm.category}:q
        ),
        itemCategories:(s.itemCategories||[]).map(ic=>
          ic.name===itemForm.editOldName&&ic.category===itemForm.editOldCategory
            ?{...ic,name,category:itemForm.category}:ic
        ),
      }));
      if(selItem&&selItem.subtype===itemForm.editOldName&&selItem.category===itemForm.editOldCategory){
        setSelItem({subtype:name,category:itemForm.category});
      }
    }
    setItemModal(null);
  };

  const deleteItem=(grp)=>{
    const cnt=qualities.filter(q=>(q.subtype||'')===grp.subtype&&(q.type||'')===grp.category).length;
    const msg=cnt>0
      ?`Delete "${grp.subtype}" and all its ${cnt} subtype(s)? This cannot be undone.`
      :`Delete "${grp.subtype}"?`;
    if(!confirm(msg))return;
    save(s=>({
      ...s,
      qualities:(s.qualities||[]).filter(q=>!((q.subtype||'')===grp.subtype&&(q.type||'')===grp.category)),
      itemCategories:(s.itemCategories||[]).filter(ic=>!(ic.name===grp.subtype&&ic.category===grp.category)),
    }));
    if(selItem&&selItem.subtype===grp.subtype&&selItem.category===grp.category) setSelItem(null);
  };

  /* ══ SUBTYPE CRUD ══ */
  const openAddSubtype=()=>{setSubtypeForm({name:'',editId:''});setErr('');setSubtypeModal('add');};
  const openEditSubtype=(q)=>{setSubtypeForm({name:q.name||'',editId:q.id});setErr('');setSubtypeModal('edit');};

  const saveSubtype=()=>{
    const name=subtypeForm.name.trim();
    if(!name){setErr('Subtype name is required');return;}
    const dup=subtypesForItem.find(q=>String(q.name||'').toLowerCase()===name.toLowerCase()&&q.id!==subtypeForm.editId);
    if(dup){setErr('A subtype with this name already exists in this item');return;}
    setErr('');
    if(subtypeModal==='add'){
      save(s=>({...s,qualities:[...(s.qualities||[]),{id:uid(),name,subtype:selItem.subtype,type:selItem.category,unit:'Quintal',baseRate:0}]}));
    } else {
      save(s=>({...s,qualities:(s.qualities||[]).map(q=>q.id===subtypeForm.editId?{...q,name}:q)}));
    }
    setSubtypeModal(null);
  };

  const deleteSubtype=(id)=>{
    if(!confirm('Delete this subtype? Bills referencing it will retain the record.'))return;
    save(s=>({...s,qualities:(s.qualities||[]).filter(q=>q.id!==id)}));
  };

  /* ══ EXPENSE TYPE CRUD ══ */
  const openAddExp=(expType)=>{
    setExpForm({name:'',defaultPct:'',fixedAmt:''});
    setErr('');setExpModal({mode:'add',expType});
  };
  const openEditExp=(expType,item)=>{
    setExpForm({name:item.name||'',defaultPct:String(item.defaultPct||''),fixedAmt:String(item.fixedAmt||'')});
    setErr('');setExpModal({mode:'edit',expType,item});
  };

  const saveExp=()=>{
    const name=expForm.name.trim();
    if(!name){setErr('Expense type name is required');return;}
    setErr('');
    const {expType,mode,item}=expModal;
    const k=itemExpKey(selItem);
    if(mode==='add'){
