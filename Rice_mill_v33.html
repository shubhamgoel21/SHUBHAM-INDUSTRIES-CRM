              <span style={{fontSize:14,fontWeight:700,color:'var(--text)'}}>Taxable: <span className="c-green">{fmt(taxableOnly)}</span></span>
              {totalSgst>0&&<span style={{fontSize:13,color:'var(--blue)'}}>SGST: <b>{fmt(totalSgst)}</b></span>}
              {totalCgst>0&&<span style={{fontSize:13,color:'var(--blue)'}}>CGST: <b>{fmt(totalCgst)}</b></span>}
              <span style={{fontSize:14,fontWeight:700,color:'var(--teal)',marginLeft:'auto'}}>Items Total: {fmt(itemsTotal)}</span>
            </div>

            {/* Freight */}
            <div className="divider"/>
            <div className="sec-ttl mb12">🚛 Freight / Transport</div>
            <div className="frow">
              <div className="fg"><label className="flbl">Freight Type</label>
                <select className="fselect" value={form.freight.type} onChange={function(e){updFreight('type',e.target.value);}}>
                  <option value="included">Included in Price</option>
                  <option value="collect">Buyer Pays (To Collect)</option>
                  <option value="pay">We Pay — Auto-log Entry</option>
                </select>
              </div>
              {form.freight.type==='pay'&&<div className="fg"><label className="flbl">Freight Amount (₹)</label><input type="number" className="finput" value={form.freight.amount||''} onChange={function(e){updFreight('amount',+e.target.value);}}/></div>}
              {form.freight.type==='pay'&&<div className="fg"><label className="flbl">Vehicle (optional)</label>
                <select className="fselect" value={form.freight.vehicleId||''} onChange={function(e){updFreight('vehicleId',e.target.value);}}>
                  <option value="">— Select Vehicle —</option>
                  {(state.vehicles||[]).map(function(v){return <option key={v.id} value={v.id}>{v.vehicleNo} — {v.ownerName}</option>;})}
                </select>
              </div>}
            </div>
            {form.freight.type==='pay'&&<div className="frow">
              <div className="fg"><label className="flbl">Advance Paid (₹)</label><input type="number" className="finput" value={form.freight.advancePaid||''} onChange={function(e){updFreight('advancePaid',+e.target.value);}} placeholder="0"/></div>
              <div className="fg"><label className="flbl">Transport Details</label><input className="finput" value={form.transportDetails||''} onChange={function(e){setForm(function(f){return Object.assign({},f,{transportDetails:e.target.value});});}} placeholder="Driver name, route..."/></div>
            </div>}
            {form.freight.type!=='pay'&&<div className="frow">
              <div className="fg"><label className="flbl">Transport Details</label><input className="finput" value={form.transportDetails||''} onChange={function(e){setForm(function(f){return Object.assign({},f,{transportDetails:e.target.value});});}} placeholder="Truck no, transporter name..."/></div>
            </div>}

            {/* TDS */}
            <div style={{background:'rgba(245,166,35,.06)',border:'1px solid rgba(245,166,35,.15)',borderRadius:8,padding:14,marginBottom:12}}>
              <div className="fxc gap12">
                <label className="fcheck">
                  <input type="checkbox" checked={form.applyTds} onChange={function(e){toggleTds(e.target.checked);}}/>
                  <span className="flbl" style={{margin:0,color:'var(--accent)'}}>Apply TDS on this bill</span>
                </label>
                {form.applyTds&&<>
                  <div className="fg" style={{margin:0,width:120}}><label className="flbl">TDS Rate %</label>
                    <input type="number" className="finput" value={form.tdsRate||1} onChange={function(e){updTdsRate(+e.target.value);}} min={0} max={10} step={0.5}/>
                  </div>
                  <div className="c-accent" style={{fontSize:13}}>TDS: <b>{fmt(tdsAmt)}</b></div>
                </>}
              </div>
            </div>

            {/* Final Summary */}
            <div style={{background:'var(--surface3)',borderRadius:10,padding:16,maxWidth:420,marginLeft:'auto'}}>
              <div style={{fontSize:11,fontWeight:700,color:'var(--text3)',textTransform:'uppercase',letterSpacing:.9,marginBottom:10}}>Bill Summary</div>
              <div className="sum-row"><span>Taxable Amount</span><span className="bold">{fmt(taxableOnly)}</span></div>
              {totalSgst>0&&<div className="sum-row" style={{color:'var(--blue)'}}><span>+ SGST</span><span>{fmt(totalSgst)}</span></div>}
              {totalCgst>0&&<div className="sum-row" style={{color:'var(--blue)'}}><span>+ CGST</span><span>{fmt(totalCgst)}</span></div>}
              {(totalSgst>0||totalCgst>0)&&<div className="sum-row"><span style={{fontWeight:600}}>Items Total (with GST)</span><span className="bold">{fmt(itemsTotal)}</span></div>}
              {freightDeduct>0&&<div className="sum-row c-red"><span>(−) Freight</span><span>({fmt(freightDeduct)})</span></div>}
              {form.applyTds&&<div className="sum-row c-accent"><span>(−) TDS @{form.tdsRate||1}%</span><span>({fmt(tdsAmt)})</span></div>}
              <div className="sum-row sum-total"><span>Net Receivable</span><span className="c-teal" style={{fontSize:17}}>{fmt(netReceivable)}</span></div>
            </div>
          </div>
            </>}
          </div>
          <div className="mfoot">
            <div className="fg" style={{margin:0}}>
              <label className="flbl">Payment Status</label>
              <select className="fselect" value={form.status} onChange={function(e){setForm(function(f){return Object.assign({},f,{status:e.target.value});});}}>
                <option value="unpaid">Unpaid</option><option value="partial">Partial</option><option value="paid">Paid</option>
              </select>
            </div>
            <button className="btn btn-ghost" onClick={function(){setModal(null);}}>Cancel</button>
            <button className="btn btn-primary" onClick={doSave}>💾 Save Sale Bill</button>
          </div>
        </div></div>}

        {/* ── Create Order Modal (from inside sale bill) ── */}
        {orderModal&&<div className="overlay"><div className="modal">
          <div className="mhead"><h3>📋 Create New Order</h3><button className="xbtn" onClick={function(){setOrderModal(false);}}>✕</button></div>
          <div className="mbody">
            {orderErr&&<div className="alert alert-err mb12">{orderErr}</div>}
            <div style={{background:'var(--primary-dim)',border:'1px solid var(--primary-mid)',borderRadius:8,padding:'8px 12px',fontSize:12,color:'var(--primary)',marginBottom:14}}>
              📋 This order will be created and automatically linked to the current bill.
            </div>
            <div className="frow">
              <div className="fg"><label className="flbl">Order No *</label>
                <input className="finput" value={orderForm.orderNo} onChange={function(e){setOrderForm(function(f){return Object.assign({},f,{orderNo:e.target.value});});}} placeholder="ORD-001"/>
              </div>
              <div className="fg"><label className="flbl">Date</label>
                <input type="date" className="finput" value={orderForm.date} onChange={function(e){setOrderForm(function(f){return Object.assign({},f,{date:e.target.value});});}}/>
              </div>
            </div>
            <div className="frow">
              <div className="fg"><label className="flbl">Party *</label>
                <select className="fselect" value={orderForm.partyId} onChange={function(e){setOrderForm(function(f){return Object.assign({},f,{partyId:e.target.value});})}}>
                  <option value="">— Select Party —</option>
                  {(state.parties||[]).filter(function(p){return p.type==='buyer'||p.type==='both';}).map(function(p){return <option key={p.id} value={p.id}>{p.name}{p.nick?' ('+p.nick+')':''}</option>;})}
                </select>
              </div>
              <div className="fg"><label className="flbl">Order Type</label>
                <select className="fselect" value={orderForm.orderType} onChange={function(e){setOrderForm(function(f){return Object.assign({},f,{orderType:e.target.value});})}}>
                  <option value="rice">🍚 Rice</option>
                  <option value="chilkha">🌾 Chilkha</option>
                  <option value="polish">✨ Polish</option>
                  <option value="phack">💧 Phack</option>
                </select>
              </div>
            </div>
            <div className="frow">
              <div className="fg"><label className="flbl">Quality</label>
                <select className="fselect" value={orderForm.qualityId} onChange={function(e){setOrderForm(function(f){return Object.assign({},f,{qualityId:e.target.value});})}}>
                  <option value="">— Optional —</option>
                  {renderQualityOptions(state,'rice')}
                  {renderQualityOptions(state,'paddy')}
                </select>
              </div>
              <div className="fg"><label className="flbl">Quantity *</label>
                <input type="number" className="finput" value={orderForm.quantity} onChange={function(e){setOrderForm(function(f){return Object.assign({},f,{quantity:e.target.value});});}} placeholder="e.g. 100"/>
              </div>
              <div className="fg"><label className="flbl">Unit</label>
                <select className="fselect" value={orderForm.unit||'Quintal'} onChange={function(e){setOrderForm(function(f){return Object.assign({},f,{unit:e.target.value});})}}>
                  <option>Quintal</option><option>KG</option><option>Bag</option><option>MT</option>
                </select>
              </div>
            </div>
            <div className="frow">
              <div className="fg"><label className="flbl">Rate / Unit (₹) *</label>
                <input type="number" className="finput" value={orderForm.rate} onChange={function(e){setOrderForm(function(f){return Object.assign({},f,{rate:e.target.value});});}} placeholder="0"/>
              </div>
              <div className="fg"><label className="flbl">CD %</label>
                <input type="number" className="finput" value={orderForm.cd} onChange={function(e){setOrderForm(function(f){return Object.assign({},f,{cd:e.target.value});});}} placeholder="0"/>
              </div>
              <div className="fg"><label className="flbl">Status</label>
                <select className="fselect" value={orderForm.status} onChange={function(e){setOrderForm(function(f){return Object.assign({},f,{status:e.target.value});})}}>
                  <option value="ongoing">Ongoing</option>
                  <option value="pending">Pending</option>
                  <option value="confirmed">Confirmed</option>
                </select>
              </div>
            </div>
          </div>
          <div className="mfoot">
            <button className="btn btn-ghost" onClick={function(){setOrderModal(false);}}>Cancel</button>
            <button className="btn btn-primary" onClick={doSaveOrder}>📋 Create &amp; Link Order</button>
          </div>
        </div></div>}

        {/* View Bill */}
        {viewBill&&<div className="overlay"><div className="modal modal-xl">
          <div className="mhead">
            <h3>🍚 {viewBill.billNo}</h3>
            <div className="fxc gap8"><ShareButtons bill={viewBill} state={state} billType="rice"/><button className="xbtn" onClick={function(){setViewBill(null);}}>✕</button></div>
          </div>
          <div className="mbody"><BillView bill={viewBill} state={state} billType="rice"/></div>
        </div></div>}
      </div>
    </>
  );
}

/* ─── FREIGHT & TRANSPORT ──────────────────────────────── */
function FreightTransport({state,save}){
  const [tab,setTab]=useState('entries');
  const [modal,setModal]=useState(null);       // 'addVehicle'|'editVehicle'|'addEntry'|'editEntry'
  const [vForm,setVForm]=useState({vehicleNo:'',ownerName:'',phone:'',type:'Truck'});
  const [eForm,setEForm]=useState({date:tod(),vehicleId:'',billRef:'',billType:'paddy',tripType:'inward',freightAmt:'',dihadiAmt:'',shortageAmt:'',shortageQty:'',advancePaid:'',note:'',status:'unpaid'});
  const [err,setErr]=useState('');
  const [srch,setSrch]=useState('');
  const [filterV,setFilterV]=useState('');

  const vehicles=state.vehicles||[];
  const freightEntries=state.freightEntries||[];

  // Payments linked to freight
  const freightPayments=useMemo(()=>(state.payments||[]).filter(p=>p.forType==='freight'),[state.payments]);

  // Compute outstanding per vehicle
  const outstandingByVehicle=useMemo(()=>{
    const map={};
    freightEntries.forEach(e=>{
      const base=(+e.freightAmt||0)-(+e.dihadiAmt||0)-(+e.shortageAmt||0);
      map[e.vehicleId]=(map[e.vehicleId]||0)+base;
    });
    freightPayments.forEach(p=>{
      if(p.vehicleId) map[p.vehicleId]=(map[p.vehicleId]||0)-(+p.amount||0);
    });
    return map;
  },[freightEntries,freightPayments]);

  // Mark entry as paid by checking linked payments
  const paidEntryIds=useMemo(()=>{
    const ids=new Set();
    freightPayments.forEach(p=>{if(p.freightEntryId)ids.add(p.freightEntryId);});
    return ids;
  },[freightPayments]);

  // Filtered entries
  const filteredEntries=useMemo(()=>{
    let list=[...freightEntries].sort((a,b)=>b.date.localeCompare(a.date));
    if(filterV) list=list.filter(e=>e.vehicleId===filterV);
    if(srch){
      const q=srch.toLowerCase();
      list=list.filter(e=>{
        const v=vehicles.find(vv=>vv.id===e.vehicleId);
        return (v?.vehicleNo||'').toLowerCase().includes(q)||(v?.ownerName||'').toLowerCase().includes(q)||(e.billRef||'').toLowerCase().includes(q)||(e.note||'').toLowerCase().includes(q);
      });
    }
    return list;
  },[freightEntries,filterV,srch,vehicles]);

  // Totals
  const totalFreight=filteredEntries.reduce((s,e)=>s+(+e.freightAmt||0),0);
  const totalDihadi=filteredEntries.reduce((s,e)=>s+(+e.dihadiAmt||0),0);
  const totalShortage=filteredEntries.reduce((s,e)=>s+(+e.shortageAmt||0),0);
  const totalNet=totalFreight-totalDihadi-totalShortage;
  const totalPaid=freightPayments.reduce((s,p)=>s+(+p.amount||0),0);

  // Vehicle save
  const doSaveVehicle=()=>{
    if(!vForm.vehicleNo.trim()){setErr('Vehicle number is required');return;}
    if(modal==='addVehicle'){
      save(s=>({...s,vehicles:[...(s.vehicles||[]),{...vForm,id:uid()}]}));
    } else {
      save(s=>({...s,vehicles:(s.vehicles||[]).map(v=>v.id===vForm.id?vForm:v)}));
    }
    setModal(null);setErr('');
  };
  const delVehicle=id=>{
    if(confirm('Delete vehicle? All its freight entries will remain.'))
      save(s=>({...s,vehicles:(s.vehicles||[]).filter(v=>v.id!==id)}));
  };

  const doSaveEntry=()=>{
    if(!eForm.vehicleId){setErr('Select a vehicle');return;}
    if(!+eForm.freightAmt){setErr('Freight amount is required');return;}
    const entry={
      ...eForm,
      id:eForm.id||uid(),
      freightAmt:+eForm.freightAmt||0,
      dihadiAmt:+eForm.dihadiAmt||0,
      shortageAmt:+eForm.shortageAmt||0,
      shortageQty:+eForm.shortageQty||0,
      advancePaid:+eForm.advancePaid||0,
    };
    if(modal==='addEntry'){
      save(s=>({...s,freightEntries:[...(s.freightEntries||[]),entry]}));
    } else {
      save(s=>({...s,freightEntries:(s.freightEntries||[]).map(e=>e.id===entry.id?entry:e)}));
    }
    setModal(null);setErr('');
    setEForm({date:tod(),vehicleId:'',billRef:'',billType:'paddy',tripType:'inward',freightAmt:'',dihadiAmt:'',shortageAmt:'',shortageQty:'',advancePaid:'',note:'',status:'unpaid'});
  };
  const delEntry=id=>{if(confirm('Delete entry?'))save(s=>({...s,freightEntries:(s.freightEntries||[]).filter(e=>e.id!==id)}));};

  const netAmt=(e)=>(+e.freightAmt||0)-(+e.dihadiAmt||0)-(+e.shortageAmt||0);

  return(
    <>
      <div className="topbar">
        <h2>🚛 Freight & Transport</h2>
        <div className="topbar-right">
          <button className="btn btn-ghost" onClick={()=>{setVForm({vehicleNo:'',ownerName:'',phone:'',type:'Truck'});setErr('');setModal('addVehicle');}}>+ Add Vehicle</button>
          <button className="btn btn-primary" onClick={()=>{setEForm({date:tod(),vehicleId:'',billRef:'',billType:'paddy',tripType:'inward',freightAmt:'',dihadiAmt:'',shortageAmt:'',shortageQty:'',advancePaid:'',note:'',status:'unpaid'});setErr('');setModal('addEntry');}}>+ Add Freight Entry</button>
        </div>
      </div>
      <div className="content">

        {/* Summary cards */}
        <div className="g4 mb16">
          <div className="stat-card bl-accent">
            <div className="stat-lbl">Total Freight Charges</div>
            <div className="stat-val c-accent">{fmt(totalFreight)}</div>
            <div className="stat-sub">{filteredEntries.length} entries</div>
          </div>
          <div className="stat-card bl-red">
            <div className="stat-lbl">Dihadi + Shortage Cuts</div>
            <div className="stat-val c-red">{fmt(totalDihadi+totalShortage)}</div>
            <div className="stat-sub">Dihadi: {fmt(totalDihadi)} · Shortage: {fmt(totalShortage)}</div>
          </div>
          <div className="stat-card bl-teal">
            <div className="stat-lbl">Net Payable (Freight)</div>
            <div className="stat-val c-teal">{fmt(totalNet)}</div>
            <div className="stat-sub">After all deductions</div>
          </div>
          <div className="stat-card bl-green">
            <div className="stat-lbl">Paid via Payments</div>
            <div className="stat-val c-green">{fmt(totalPaid)}</div>
            <div className="stat-sub c-red">Outstanding: {fmt(Math.max(0,totalNet-totalPaid))}</div>
          </div>
        </div>

        {/* Tabs */}
        <div className="tabs">
          <div className={`tab ${tab==='entries'?'on':''}`} onClick={()=>setTab('entries')}>📋 Freight Entries</div>
          <div className={`tab ${tab==='vehicles'?'on':''}`} onClick={()=>setTab('vehicles')}>🚚 Vehicles</div>
          <div className={`tab ${tab==='outstanding'?'on':''}`} onClick={()=>setTab('outstanding')}>💰 Outstanding by Vehicle</div>
        </div>

        {/* ── Freight Entries Tab ── */}
        {tab==='entries'&&<>
          <div className="card mb16">
            <div className="fxb mb12">
              <div className="fxc gap8">
                <div className="swrap"><span className="sico">🔍</span><input className="finput" style={{width:210}} placeholder="Search vehicle, bill, note..." value={srch} onChange={e=>setSrch(e.target.value)}/></div>
                <select className="fselect" style={{width:200}} value={filterV} onChange={e=>setFilterV(e.target.value)}>
                  <option value="">All Vehicles</option>
                  {vehicles.map(v=><option key={v.id} value={v.id}>{v.vehicleNo} — {v.ownerName}</option>)}
                </select>
              </div>
              <span className="c-muted" style={{fontSize:12}}>{filteredEntries.length} entries shown</span>
            </div>
            <div className="twrap">
              <table>
                <thead><tr><th>Date</th><th>Vehicle</th><th>Bill Ref</th><th>Trip</th><th style={{textAlign:'right'}}>Freight ₹</th><th style={{textAlign:'right'}}>Advance −</th><th style={{textAlign:'right'}}>Dihadi −</th><th style={{textAlign:'right'}}>Shortage −</th><th style={{textAlign:'right'}}>Net ₹</th><th>Note</th><th></th></tr></thead>
                <tbody>
                  {filteredEntries.length===0&&<tr><td colSpan={11}><div className="empty"><div className="empty-ico">🚛</div><p>No freight entries yet. Click "+ Add Freight Entry" to begin.</p></div></td></tr>}
                  {filteredEntries.map(e=>{
                    const v=vehicles.find(vv=>vv.id===e.vehicleId);
                    const net=(+e.freightAmt||0)-(+e.advancePaid||0)-(+e.dihadiAmt||0)-(+e.shortageAmt||0);
                    const isLinked=!!e.linkedBillId;
                    return <tr key={e.id}>
                      <td className="c-muted">{e.date}</td>
                      <td>
                        <div className="bold" style={{fontSize:13}}>{v?.vehicleNo||<span className="c-muted">No vehicle</span>}</div>
                        <div className="c-muted" style={{fontSize:11}}>{v?.ownerName||''}</div>
                      </td>
                      <td>{e.billRef?<span className={`pill ${isLinked?'p-purple':'p-blue'}`}>{e.billRef}{isLinked?' 🔗':''}</span>:'—'}</td>
                      <td><span className={`pill ${e.tripType==='inward'?'p-orange':e.tripType==='transfer'?'p-purple':'p-teal'}`}>{e.tripType==='inward'?'Inward':e.tripType==='transfer'?'🔄 Transfer':'Outward'}</span></td>
                      <td className="c-accent bold" style={{textAlign:'right'}}>{fmt(e.freightAmt)}</td>
                      <td className="c-green" style={{textAlign:'right'}}>{(+e.advancePaid)>0?`(${fmt(e.advancePaid)})`:'—'}</td>
                      <td className="c-red" style={{textAlign:'right'}}>{(+e.dihadiAmt)>0?`(${fmt(e.dihadiAmt)})`:'—'}</td>
                      <td className="c-red" style={{textAlign:'right'}}>{(+e.shortageAmt)>0?<span title={`${e.shortageQty} Q short`}>(${fmt(e.shortageAmt)})</span>:'—'}</td>
                      <td className="bold c-teal" style={{textAlign:'right'}}>{fmt(net)}</td>
                      <td className="c-muted" style={{maxWidth:160,overflow:'hidden',textOverflow:'ellipsis'}}>{e.note||'—'}</td>
                      <td>
                        <div className="tda">
                          <button className="btn btn-ghost btn-xs" onClick={()=>{setEForm({...e,freightAmt:e.freightAmt||'',dihadiAmt:e.dihadiAmt||'',shortageAmt:e.shortageAmt||'',shortageQty:e.shortageQty||'',advancePaid:e.advancePaid||''});setErr('');setModal('editEntry');}}>✏️</button>
                          <button className="btn btn-danger btn-xs" onClick={()=>delEntry(e.id)}>🗑</button>
                        </div>
                      </td>
                    </tr>;
                  })}
                </tbody>
                {filteredEntries.length>0&&<tfoot>
                  <tr style={{background:'var(--surface3)',fontWeight:700}}>
                    <td colSpan={4} className="bold">TOTAL</td>
                    <td className="c-accent" style={{textAlign:'right'}}>{fmt(totalFreight)}</td>
                    <td className="c-green" style={{textAlign:'right'}}>{filteredEntries.reduce((s,e)=>s+(+e.advancePaid||0),0)>0?`(${fmt(filteredEntries.reduce((s,e)=>s+(+e.advancePaid||0),0))})`:'—'}</td>
                    <td className="c-red" style={{textAlign:'right'}}>{totalDihadi>0?`(${fmt(totalDihadi)})`:'—'}</td>
                    <td className="c-red" style={{textAlign:'right'}}>{totalShortage>0?`(${fmt(totalShortage)})`:'—'}</td>
                    <td className="c-teal" style={{textAlign:'right'}}>{fmt(totalNet)}</td>
                    <td colSpan={2}></td>
                  </tr>
                </tfoot>}
              </table>
            </div>
          </div>
        </>}

        {/* ── Vehicles Tab ── */}
        {tab==='vehicles'&&<div className="card">
          <div className="twrap">
            <table>
              <thead><tr><th>#</th><th>Vehicle No</th><th>Owner</th><th>Phone</th><th>Type</th><th>Total Trips</th><th>Outstanding</th><th></th></tr></thead>
              <tbody>
                {vehicles.length===0&&<tr><td colSpan={8}><div className="empty"><div className="empty-ico">🚚</div><p>No vehicles added yet</p></div></td></tr>}
                {vehicles.map((v,i)=>{
                  const trips=freightEntries.filter(e=>e.vehicleId===v.id).length;
                  const outstanding=outstandingByVehicle[v.id]||0;
                  return <tr key={v.id}>
                    <td className="c-muted">{i+1}</td>
                    <td className="bold c-accent">{v.vehicleNo}</td>
                    <td>{v.ownerName}</td>
                    <td>{v.phone||'—'}</td>
                    <td><span className="pill p-blue">{v.type}</span></td>
                    <td>{trips}</td>
                    <td className={outstanding>0?'c-red bold':'c-green bold'}>{fmt(Math.max(0,outstanding))}</td>
                    <td><div className="tda">
                      <button className="btn btn-ghost btn-xs" onClick={()=>{setVForm({...v});setErr('');setModal('editVehicle');}}>✏️</button>
                      <button className="btn btn-danger btn-xs" onClick={()=>delVehicle(v.id)}>🗑</button>
                    </div></td>
                  </tr>;
                })}
              </tbody>
            </table>
          </div>
        </div>}

        {/* ── Outstanding by Vehicle Tab ── */}
        {tab==='outstanding'&&<div className="card">
          <div className="mb12 c-muted" style={{fontSize:12}}>💡 To pay a vehicle, go to <b>Payments</b> → select <b>Freight / Vehicle</b> as Payment For → pick the vehicle. The balance will update here automatically.</div>
          <div className="twrap">
            <table>
              <thead><tr><th>Vehicle</th><th>Owner</th><th>Total Freight</th><th>Total Deductions</th><th>Net Payable</th><th>Paid</th><th>Outstanding</th></tr></thead>
              <tbody>
                {vehicles.length===0&&<tr><td colSpan={7}><div className="empty"><p>No vehicles</p></div></td></tr>}
                {vehicles.map(v=>{
                  const vEntries=freightEntries.filter(e=>e.vehicleId===v.id);
                  const vFreight=vEntries.reduce((s,e)=>s+(+e.freightAmt||0),0);
                  const vDeduct=vEntries.reduce((s,e)=>s+(+e.dihadiAmt||0)+(+e.shortageAmt||0),0);
                  const vNet=vFreight-vDeduct;
                  const vPaid=freightPayments.filter(p=>p.vehicleId===v.id).reduce((s,p)=>s+(+p.amount||0),0);
                  const vOut=vNet-vPaid;
                  if(vFreight===0&&vPaid===0) return null;
                  return <tr key={v.id}>
                    <td className="bold">{v.vehicleNo}</td>
                    <td>{v.ownerName}</td>
                    <td className="c-accent">{fmt(vFreight)}</td>
                    <td className="c-red">{vDeduct>0?`(${fmt(vDeduct)})`:'—'}</td>
                    <td className="c-teal bold">{fmt(vNet)}</td>
                    <td className="c-green">{fmt(vPaid)}</td>
                    <td className={vOut>0?'c-red bold':'c-green bold'}>{vOut>0?fmt(vOut):'✅ Clear'}</td>
                  </tr>;
                }).filter(Boolean)}
              </tbody>
            </table>
          </div>
        </div>}

      </div>

      {/* ── Add/Edit Vehicle Modal ── */}
      {(modal==='addVehicle'||modal==='editVehicle')&&<div className="overlay"><div className="modal">
        <div className="mhead"><h3>{modal==='addVehicle'?'Add Vehicle':'Edit Vehicle'}</h3><button className="xbtn" onClick={()=>setModal(null)}>✕</button></div>
        <div className="mbody">
          {err&&<div className="alert alert-err">{err}</div>}
          <div className="frow">
            <div className="fg"><label className="flbl">Vehicle Number *</label><input className="finput" value={vForm.vehicleNo} onChange={e=>setVForm(f=>({...f,vehicleNo:e.target.value.toUpperCase()}))} placeholder="HR55-1234"/></div>
            <div className="fg"><label className="flbl">Vehicle Type</label>
              <select className="fselect" value={vForm.type} onChange={e=>setVForm(f=>({...f,type:e.target.value}))}>
                <option>Truck</option><option>Tractor</option><option>Mini Truck</option><option>Tempo</option><option>Other</option>
              </select>
            </div>
          </div>
          <div className="frow">
            <div className="fg"><label className="flbl">Owner Name *</label><input className="finput" value={vForm.ownerName} onChange={e=>setVForm(f=>({...f,ownerName:e.target.value}))} placeholder="Transport owner name"/></div>
            <div className="fg"><label className="flbl">Phone</label><input className="finput" value={vForm.phone||''} onChange={e=>setVForm(f=>({...f,phone:e.target.value}))} placeholder="Mobile number"/></div>
          </div>
        </div>
        <div className="mfoot">
          <button className="btn btn-ghost" onClick={()=>setModal(null)}>Cancel</button>
          <button className="btn btn-primary" onClick={doSaveVehicle}>💾 Save Vehicle</button>
        </div>
      </div></div>}

      {/* ── Add/Edit Freight Entry Modal ── */}
      {(modal==='addEntry'||modal==='editEntry')&&<div className="overlay"><div className="modal modal-xl">
        <div className="mhead"><h3>{modal==='addEntry'?'Add Freight Entry':'Edit Freight Entry'}</h3><button className="xbtn" onClick={()=>setModal(null)}>✕</button></div>
        <div className="mbody">
          {err&&<div className="alert alert-err">{err}</div>}
          <div className="frow">
            <div className="fg"><label className="flbl">Date</label><input type="date" className="finput" value={eForm.date} onChange={e=>setEForm(f=>({...f,date:e.target.value}))}/></div>
            <div className="fg"><label className="flbl">Vehicle *</label>
              <select className="fselect" value={eForm.vehicleId} onChange={e=>setEForm(f=>({...f,vehicleId:e.target.value}))}>
                <option value="">— Select Vehicle —</option>
                {vehicles.map(v=><option key={v.id} value={v.id}>{v.vehicleNo} — {v.ownerName}</option>)}
              </select>
            </div>
          </div>
          <div className="frow">
            <div className="fg"><label className="flbl">Bill Reference</label><input className="finput" value={eForm.billRef} onChange={e=>setEForm(f=>({...f,billRef:e.target.value}))} placeholder="e.g. PP-001, RS-003"/></div>
            <div className="fg"><label className="flbl">Bill Type</label>
              <select className="fselect" value={eForm.billType} onChange={e=>setEForm(f=>({...f,billType:e.target.value}))}>
                <option value="paddy">Paddy Purchase</option><option value="rice">Rice Sale</option><option value="other">Other</option>
              </select>
            </div>
            <div className="fg"><label className="flbl">Trip Type</label>
              <select className="fselect" value={eForm.tripType} onChange={e=>setEForm(f=>({...f,tripType:e.target.value}))}>
                <option value="inward">Inward (Paddy In)</option><option value="outward">Outward (Rice Out)</option><option value="transfer">Transfer (Godown to Godown)</option>
              </select>
            </div>
          </div>

          <div className="divider"/>
          <div className="sec-ttl mb12" style={{fontSize:13}}>💰 Charges & Deductions</div>

          <div className="frow">
            <div className="fg">
              <label className="flbl">Freight Amount (₹) *</label>
              <input type="number" className="finput" value={eForm.freightAmt} onChange={e=>setEForm(f=>({...f,freightAmt:e.target.value}))} placeholder="0"/>
            </div>
            <div className="fg">
              <label className="flbl">Advance Paid (₹)</label>
              <input type="number" className="finput" value={eForm.advancePaid} onChange={e=>setEForm(f=>({...f,advancePaid:e.target.value}))} placeholder="0 if none"/>

            <div className="c-red bold mb12" style={{fontSize:12,textTransform:'uppercase',letterSpacing:.7}}>⚠️ Deductions (cuts from freight)</div>
            <div className="frow">
              <div className="fg">
                <label className="flbl">Dihadi (Late Unloading) ₹</label>
                <input type="number" className="finput" value={eForm.dihadiAmt} onChange={e=>setEForm(f=>({...f,dihadiAmt:e.target.value}))} placeholder="0 if none"/>
              </div>
              <div className="fg">
                <label className="flbl">Rice/Paddy Shortage ₹</label>
                <input type="number" className="finput" value={eForm.shortageAmt} onChange={e=>setEForm(f=>({...f,shortageAmt:e.target.value}))} placeholder="0 if none"/>
              </div>
              <div className="fg">
                <label className="flbl">Shortage Qty (Q)</label>
                <input type="number" className="finput" value={eForm.shortageQty} onChange={e=>setEForm(f=>({...f,shortageQty:e.target.value}))} placeholder="e.g. 0.5"/>

          {/* Net summary */}
          <div style={{background:'var(--surface3)',borderRadius:8,padding:14,maxWidth:320,marginLeft:'auto'}}>
            <div className="sum-row"><span>Freight Charges</span><span className="bold c-accent">{fmt(+eForm.freightAmt||0)}</span></div>
            {(+eForm.advancePaid||0)>0&&<div className="sum-row c-green"><span>(−) Advance Paid</span><span>({fmt(+eForm.advancePaid)})</span></div>}
            {(+eForm.dihadiAmt||0)>0&&<div className="sum-row c-red"><span>(−) Dihadi</span><span>({fmt(+eForm.dihadiAmt)})</span></div>}
            {(+eForm.shortageAmt||0)>0&&<div className="sum-row c-red"><span>(−) Shortage</span><span>({fmt(+eForm.shortageAmt)})</span></div>}
            <div className="sum-row sum-total"><span>Net Payable</span><span className="c-teal">{fmt((+eForm.freightAmt||0)-(+eForm.advancePaid||0)-(+eForm.dihadiAmt||0)-(+eForm.shortageAmt||0))}</span></div>
          </div>

          <div className="fg mt12"><label className="flbl">Note / Remarks</label><input className="finput" value={eForm.note} onChange={e=>setEForm(f=>({...f,note:e.target.value}))} placeholder="Driver name, route, details..."/></div>
        </div>
        <div className="mfoot">
          <button className="btn btn-ghost" onClick={()=>setModal(null)}>Cancel</button>
          <button className="btn btn-primary" onClick={doSaveEntry}>💾 Save Entry</button>
        </div>
      </div></div>}
    </>
  );
}


function BillView({bill,state,billType='paddy'}){
  const party=state.parties.find(p=>p.id===bill.partyId);
  const warehouse=state.warehouses.find(w=>w.id===bill.warehouseId);
  const isPurchase=billType==='paddy';
  const totalWt=bill.items.reduce((s,i)=>s+i.totalWeight,0);
  const itemsTotal=bill.items.reduce((s,i)=>s+i.amount,0);
  const totalDynamicExp=(bill.partyExpenses||[]).reduce((s,e)=>s+(+e.amt||0),0);
  const fixedExp=isPurchase?((+(bill.fixedExpenses?.kachiAadat||0))+(+(bill.fixedExpenses?.pakkiAadat||0))+(+(bill.fixedExpenses?.labour||0))):0;
  // Pull expense types from itemExpenseTypes (per-item) with global fallback
  const expTypes=isPurchase
    ?[...(()=>{
        const allItemExps=state.itemExpenseTypes||{};
        return Object.values(allItemExps).flatMap(grp=>(grp.purchase||[]));
      })(),...(state.customPaddyExpenseTypes||[])]
    :(()=>{
        const allItemExps=state.itemExpenseTypes||{};
        return Object.values(allItemExps).flatMap(grp=>(grp.sale||[]));
      })();

  return(
    <div style={{background:'var(--surface2)',borderRadius:8,padding:18,border:'1px solid var(--border)'}}>
      <div style={{display:'flex',justifyContent:'space-between',marginBottom:18}}>
        <div>
          <div className="c-muted" style={{fontSize:11,textTransform:'uppercase',letterSpacing:1}}>Bill No</div>
          <div style={{fontSize:24,fontFamily:'Plus Jakarta Sans',fontWeight:800,color:isPurchase?'var(--accent)':'var(--teal)'}}>{bill.billNo}</div>
          <div className="c-muted" style={{fontSize:12,marginTop:4}}>Date: {bill.date} · {isPurchase?'Paddy Purchase':'Rice Sale'}</div>
        </div>
        <div style={{textAlign:'right'}}>
          <div className="c-muted" style={{fontSize:11}}>{isPurchase?'Supplier':'Buyer'}</div>
          <div className="bold" style={{fontSize:16}}>{party?.name||'—'}</div>
          <div className="c-muted" style={{fontSize:12}}>GST: {party?.gst||'N/A'}</div>
          <div className="c-muted" style={{fontSize:12}}>📞 {party?.phone||'—'}</div>
          <span className={`pill mt8 ${bill.status==='paid'?'p-green':bill.status==='partial'?'p-orange':'p-gray'}`}>{bill.status?.toUpperCase()}</span>
        </div>
      </div>
      <div className="twrap mb16">
        <table>
          <thead><tr><th>{isPurchase?'Paddy Quality':'Rice Quality'}</th><th>Bags</th><th>Wt/Bag</th><th>Total KG</th><th>Quintals</th><th>Rate/Q</th><th>Amount</th></tr></thead>
          <tbody>
            {bill.items.map((item,i)=>{
              const q=state.qualities.find(qq=>qq.id===item.qualityId);
              return <tr key={i}>
                <td><span className={`pill ${isPurchase?'p-orange':'p-teal'}`}>{q?.name||'—'}</span></td>
                <td>{item.bags}</td><td>{item.weightPerBag} KG</td>
                <td className="bold">{item.totalWeight.toLocaleString()} KG</td>
                <td className="c-muted">{(item.totalWeight/100).toFixed(2)}</td>
                <td>{fmt(item.rate)}</td>
                <td className="c-green bold">{fmt(item.amount)}</td>
              </tr>;
            })}
            <tr style={{background:'var(--surface3)',fontWeight:700}}>
              <td className="bold">TOTAL</td>
              <td className="bold">{bill.items.reduce((s,i)=>s+(+i.bags||0),0)}</td>
              <td></td>
              <td className="c-accent">{totalWt.toLocaleString()} KG</td>
              <td className="c-muted">{(totalWt/100).toFixed(2)} Q</td>
              <td></td><td className="c-green">{fmt(itemsTotal)}</td>
            </tr>
          </tbody>
        </table>
      </div>
      <div style={{display:'flex',gap:20,flexWrap:'wrap'}}>
        <div style={{flex:1,minWidth:200}}>
          {isPurchase&&(bill.fixedExpenses?.kachiAadat||bill.fixedExpenses?.pakkiAadat||bill.fixedExpenses?.labour)&&<>
            <div className="c-muted" style={{fontSize:11,fontWeight:700,marginBottom:8,textTransform:'uppercase'}}>FIXED EXPENSES</div>
            {(+bill.fixedExpenses?.kachiAadat||0)>0&&<div className="sum-row"><span>Kachi Aadat</span><span className="c-accent">+{fmt(bill.fixedExpenses.kachiAadat)}</span></div>}
            {(+bill.fixedExpenses?.pakkiAadat||0)>0&&<div className="sum-row"><span>Pakki Aadat</span><span className="c-accent">+{fmt(bill.fixedExpenses.pakkiAadat)}</span></div>}
            {(+bill.fixedExpenses?.labour||0)>0&&<div className="sum-row"><span>Labour</span><span className="c-accent">+{fmt(bill.fixedExpenses.labour)}</span></div>}
            <div className="divider"/>
          </>}
          {(bill.partyExpenses||[]).length>0&&<>
            <div className="c-muted" style={{fontSize:11,fontWeight:700,marginBottom:8,textTransform:'uppercase'}}>{isPurchase?'ADDITIONAL EXPENSES':'DEDUCTIONS'}</div>
            {bill.partyExpenses.map((e,i)=>{
              const t=expTypes.find(tt=>tt.id===e.typeId);
              return <div key={i} className="sum-row"><span>{t?.name||e.note||'Expense'}{e.note&&t?' ('+e.note+')':''}</span><span>{isPurchase?'+':'-'}{fmt(e.amt)}</span></div>;
            })}
            <div className="divider"/>
          </>}
          {bill.freight&&bill.freight.type!=='included'&&<div className="sum-row"><span>🚛 Freight ({bill.freight.type==='collect'?'Buyer pays':'We pay'})</span><span>{fmt(bill.freight.amount)}</span></div>}
          {bill.freight?.type==='pay'&&(+bill.freight.advancePaid||0)>0&&<div className="sum-row c-green" style={{fontSize:12}}><span>↳ Advance to Transporter</span><span>{fmt(bill.freight.advancePaid)}</span></div>}
          {bill.transportDetails&&<div className="c-muted" style={{fontSize:12,marginTop:4}}>🚚 {bill.transportDetails}</div>}
          {warehouse&&<div className="c-muted" style={{fontSize:12,marginTop:6}}>🏭 Warehouse: {warehouse.name}</div>}
        </div>
        <div style={{minWidth:240}}>
          <div className="sum-row"><span>{isPurchase?'Paddy Total':'Rice Sale Total'}</span><span className="bold">{fmt(itemsTotal)}</span></div>
          {isPurchase&&fixedExp>0&&<div className="sum-row c-accent"><span>(+) Fixed Expenses</span><span>{fmt(fixedExp)}</span></div>}
          {totalDynamicExp>0&&<div className="sum-row"style={{color:isPurchase?'var(--accent)':'var(--red)'}}><span>{isPurchase?'(+)':'(−)'} {isPurchase?'Other Expenses':'Deductions'}</span><span>{isPurchase?'':'-'}{fmt(totalDynamicExp)}</span></div>}
          {bill.freight?.type==='pay'&&isPurchase&&<div className="sum-row c-accent"><span>(+) Freight</span><span>{fmt(bill.freight.amount)}</span></div>}
          {bill.freight?.type==='pay'&&!isPurchase&&<div className="sum-row c-red"><span>(−) Freight</span><span>({fmt(bill.freight.amount)})</span></div>}
          {bill.applyTds&&<div className="sum-row c-accent"><span>(−) TDS @{bill.tdsRate||1}%</span><span>({fmt(bill.tds||0)})</span></div>}
          <div className="sum-row sum-total">
            <span>Net {isPurchase?'Payable':'Receivable'}</span>
            <span className={isPurchase?'c-accent':'c-teal'}>{fmt(bill.totalAmount)}</span>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ─── CASH & BANK REGISTER ─────────────────────────────── */
function CashRegister({state,save}){
  const accounts = state.cashAccounts||[];
  const txns     = state.cashTransactions||[];

  const [tab,setTab]       = useState('overview');   // overview | ledger | transfer
  const [selAcc,setSelAcc] = useState('');
  const [modal,setModal]   = useState(null);         // null | 'addAcc' | 'editAcc' | 'addTxn' | 'transfer'
  const [err,setErr]       = useState('');
  const [srch,setSrch]     = useState('');
  const [fType,setFType]   = useState('');
  const [fFrom,setFFrom]   = useState('');
  const [fTo,setFTo]       = useState('');

  // ── Account form ──
  const blankAcc=()=>({name:'',type:'bank',accountNo:'',ifsc:'',bankName:'',openingBalance:'',color:'#1a6ea8'});
  const [aForm,setAForm]=useState(blankAcc());

  // ── Transaction form ──
  const blankTxn=()=>({date:tod(),accountId:selAcc||accounts[0]?.id||'',type:'credit',category:'',amount:'',note:'',ref:'',partyId:''});
  const [tForm,setTForm]=useState(blankTxn());

  // ── Transfer form ──
  const blankTrf=()=>({date:tod(),fromAccountId:'',toAccountId:'',amount:'',note:''});
  const [trfForm,setTrfForm]=useState(blankTrf());

  // ── Compute running balance per account ──
  const balanceOf=useCallback(accId=>{
    const acc=accounts.find(a=>a.id===accId);
    const open=+(acc?.openingBalance||0);
    return txns
      .filter(t=>t.accountId===accId)
      .reduce((s,t)=>t.type==='credit'?s+(+t.amount||0):s-(+t.amount||0), open);
  },[accounts,txns]);

  const totalCash  = accounts.filter(a=>a.type==='cash').reduce((s,a)=>s+balanceOf(a.id),0);
  const totalBank  = accounts.filter(a=>a.type==='bank').reduce((s,a)=>s+balanceOf(a.id),0);
  const totalFirm  = totalCash+totalBank;

  // ── Recent credits & debits (all accounts) ──
  const totalIn  = txns.filter(t=>t.type==='credit').reduce((s,t)=>s+(+t.amount||0),0);
  const totalOut = txns.filter(t=>t.type==='debit' ).reduce((s,t)=>s+(+t.amount||0),0);

  // ── Ledger for selected account ──
  const ledgerTxns = useMemo(()=>{
    let list=[...txns].filter(t=>!selAcc||t.accountId===selAcc);
    if(fType)  list=list.filter(t=>t.type===fType);
    if(srch)   list=list.filter(t=>(t.note||'').toLowerCase().includes(srch.toLowerCase())||(t.category||'').toLowerCase().includes(srch.toLowerCase())||(t.ref||'').toLowerCase().includes(srch.toLowerCase()));
    if(fFrom)  list=list.filter(t=>t.date>=fFrom);
    if(fTo)    list=list.filter(t=>t.date<=fTo);
    return list.sort((a,b)=>b.date.localeCompare(a.date)||b.id.localeCompare(a.id));
  },[txns,selAcc,fType,srch,fFrom,fTo]);

  // ── Running balance per row (reverse of sorted, so we compute forward then reverse) ──
  const ledgerWithBal = useMemo(()=>{
    const accId = selAcc||'';
    // forward-sorted txns for this account
    const fwd = txns
      .filter(t=>!accId||t.accountId===accId)
      .sort((a,b)=>a.date.localeCompare(b.date)||a.id.localeCompare(b.id));
    const acc = accounts.find(a=>a.id===accId);
    let running = +(acc?.openingBalance||0);
    const balMap={};
    fwd.forEach(t=>{
      running += t.type==='credit'?(+t.amount||0):-(+t.amount||0);
      balMap[t.id]=running;
    });
    return ledgerTxns.map(t=>({...t,runBal:balMap[t.id]??null}));
  },[ledgerTxns,txns,selAcc,accounts]);

  // ── Save account ──
  const doSaveAcc=()=>{
    if(!aForm.name.trim()){setErr('Account name is required');return;}
    if(modal==='addAcc'){
      save(s=>({...s,cashAccounts:[...(s.cashAccounts||[]),{...aForm,openingBalance:+(aForm.openingBalance||0),id:uid()}]}));
    } else {
      save(s=>({...s,cashAccounts:(s.cashAccounts||[]).map(a=>a.id===aForm.id?{...aForm,openingBalance:+(aForm.openingBalance||0)}:a)}));
    }
    setModal(null);setErr('');
  };
  const delAcc=id=>{
    if(!confirm('Delete account? All transactions in this account will also be removed.'))return;
    save(s=>({...s,cashAccounts:(s.cashAccounts||[]).filter(a=>a.id!==id),cashTransactions:(s.cashTransactions||[]).filter(t=>t.accountId!==id)}));
    if(selAcc===id)setSelAcc('');
  };

  // ── Save transaction ──
  const doSaveTxn=()=>{
    if(!tForm.accountId){setErr('Select an account');return;}
    if(!(+tForm.amount>0)){setErr('Enter a valid amount');return;}
    if(!tForm.category.trim()){setErr('Category is required');return;}
    save(s=>({...s,cashTransactions:[...(s.cashTransactions||[]),{...tForm,amount:+(tForm.amount),id:uid()}]}));
    setTForm(blankTxn());setModal(null);setErr('');
  };

  // ── Save transfer between accounts ──
  const doSaveTransfer=()=>{
    if(!trfForm.fromAccountId||!trfForm.toAccountId){setErr('Select both accounts');return;}
    if(trfForm.fromAccountId===trfForm.toAccountId){setErr('Cannot transfer to same account');return;}
    if(!(+trfForm.amount>0)){setErr('Enter a valid amount');return;}
    const tid=uid();
    const fromAcc=accounts.find(a=>a.id===trfForm.fromAccountId);
    const toAcc  =accounts.find(a=>a.id===trfForm.toAccountId);
    const note=trfForm.note||`Transfer: ${fromAcc?.name}→${toAcc?.name}`;
    save(s=>({...s,cashTransactions:[...(s.cashTransactions||[]),
      {id:uid(),date:trfForm.date,accountId:trfForm.fromAccountId,type:'debit', category:'Transfer Out',amount:+trfForm.amount,note,ref:'TRF-'+tid.slice(0,5).toUpperCase(),partyId:'',linkedTransfer:tid},
      {id:uid(),date:trfForm.date,accountId:trfForm.toAccountId,  type:'credit',category:'Transfer In', amount:+trfForm.amount,note,ref:'TRF-'+tid.slice(0,5).toUpperCase(),partyId:'',linkedTransfer:tid},
    ]}));
    setTrfForm(blankTrf());setModal(null);setErr('');
  };

  const delTxn=id=>{
    if(!confirm('Delete this transaction?'))return;
    save(s=>({...s,cashTransactions:(s.cashTransactions||[]).filter(t=>t.id!==id)}));
  };

  const CATS_IN  =['Sale Receipt','Party Payment Received','Capital Brought In','Loan Received','Interest Income','Transfer In','Other Income'];
  const CATS_OUT =['Paddy Payment','Freight Payment','Labour Payment','Electricity','Maintenance','Transport','Commission','Loan Repayment','Partner Withdrawal','Transfer Out','Other Expense'];

  const accColor=id=>accounts.find(a=>a.id===id)?.color||'var(--primary)';

  return(
    <>
      <div className="topbar">
        <h2>💰 Cash & Bank Register</h2>
        <div className="topbar-right">

            <div className="stat-lbl">💵 Cash in Hand</div>

            const isSelected=selAcc===a.id;
            return(
              <div key={a.id}

                  <div>
                    <div style={{fontSize:11,fontWeight:700,color:'var(--text3)',textTransform:'uppercase',letterSpacing:.8,marginBottom:3}}>

                    <button className="btn btn-danger btn-xs btn-icon" onClick={e=>{e.stopPropagation();delAcc(a.id);}}

                  </div>
                </div>
                <div style={{fontSize:26,fontWeight:800,fontFamily:'Plus Jakarta Sans',color:bal>=0?a.color:'var(--red)',marginBottom:4}}>{fmt(bal)}</div>
                <div style={{fontSize:11,color:'var(--text3)'}}>{accTxns.length} txns · Last: {lastTxn?lastTxn.date:'—'}</div>

              </div>
            );

          <div onClick={()=>{setAForm(blankAcc());setErr('');setModal('addAcc');}}

            <div style={{fontSize:28}}>+</div>
            <div style={{fontSize:12,fontWeight:600}}>Add Account</div>
          </div>
        </div>

        {/* ── Tabs ── */}
        <div className="tabs">
          <div className={`tab ${tab==='overview'?'on':''}`} onClick={()=>{setTab('overview');setSelAcc('');}}>📊 All Transactions</div>
          <div className={`tab ${tab==='ledger'?'on':''}`} onClick={()=>setTab('ledger')}>
            📒 Ledger {selAcc?'— '+accounts.find(a=>a.id===selAcc)?.name:'(Select Account)'}
          </div>
        </div>

        {/* ── Filters row ── */}
        <div className="card mb16" style={{padding:'12px 16px'}}>
          <div style={{display:'grid',gridTemplateColumns:'1fr 160px 150px 150px auto',gap:10,alignItems:'flex-end'}}>
            <div className="fg" style={{margin:0}}>
              <label className="flbl">Search</label>
              <div className="swrap"><span className="sico">🔍</span>
                <input className="finput" placeholder="Note, category, ref..." value={srch} onChange={e=>setSrch(e.target.value)}/>

            </div>
            <div className="fg" style={{margin:0}}>
              <label className="flbl">Type</label>
              <select className="fselect" value={fType} onChange={e=>setFType(e.target.value)}>

                <option value="credit">Credit (IN)</option>
                <option value="debit">Debit (OUT)</option>
              </select>
            </div>
            <div className="fg" style={{margin:0}}>
              <label className="flbl">From Date</label>
              <input type="date" className="finput" value={fFrom} onChange={e=>setFFrom(e.target.value)}/>

            <div className="fg" style={{margin:0}}>

              <input type="date" className="finput" value={fTo} onChange={e=>setFTo(e.target.value)}/>

        </div>

          <div className="card">
            <div className="sec-hdr mb12">
              <div className="sec-ttl">All Transactions</div>
              <div style={{fontSize:12,color:'var(--text3)'}}>{ledgerWithBal.length} entries shown</div>
            </div>
            <div className="twrap">
              <table>
                <thead><tr>

                </tr></thead>
                <tbody>
                  {ledgerWithBal.length===0&&<tr><td colSpan={9}><div className="empty"><div className="empty-ico">💰</div><p>No transactions yet. Click "+ New Entry" to add one.</p></div></td></tr>}

                    const acc=accounts.find(a=>a.id===t.accountId);
                    const party=state.parties.find(p=>p.id===t.partyId);

                      <tr key={t.id}>
                        <td className="c-muted" style={{fontSize:12}}>{t.date}</td>
                        <td>
                          <div style={{display:'flex',alignItems:'center',gap:6}}>
                            <div style={{width:8,height:8,borderRadius:'50%',background:acc?.color||'var(--text3)',flexShrink:0}}/>

                        <td>
                          <span className={`pill ${t.type==='credit'?'p-green':'p-red'}`}>

                        </td>
                        <td><span className="pill p-blue" style={{fontSize:10}}>{t.category||'—'}</span></td>
                        <td style={{fontSize:12}}>{party?.name||'—'}</td>

                        <td style={{fontSize:12,maxWidth:180,overflow:'hidden',textOverflow:'ellipsis'}}>{t.note||'—'}</td>
                        <td style={{textAlign:'right'}}>
                          <span className={`bold ${t.type==='credit'?'c-green':'c-red'}`} style={{fontSize:14}}>
                            {t.type==='credit'?'+':'-'}{fmt(t.amount)}
                          </span>
                        </td>
                        <td>
                          <button className="btn btn-danger btn-xs" onClick={()=>delTxn(t.id)}>🗑</button>
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
                {ledgerWithBal.length>0&&(()=>{
                  const sumIn =ledgerWithBal.filter(t=>t.type==='credit').reduce((s,t)=>s+(+t.amount||0),0);
                  const sumOut=ledgerWithBal.filter(t=>t.type==='debit' ).reduce((s,t)=>s+(+t.amount||0),0);
                  return <tfoot><tr>
                    <td colSpan={7} className="bold">TOTAL (filtered)</td>
                    <td style={{textAlign:'right'}}>
                      <div className="c-green bold" style={{fontSize:12}}>+{fmt(sumIn)}</div>
                      <div className="c-red bold"   style={{fontSize:12}}>−{fmt(sumOut)}</div>
                      <div className="bold" style={{fontSize:13,borderTop:'1px solid var(--border)',paddingTop:3,marginTop:3}}>{fmt(sumIn-sumOut)}</div>
                    </td>
                    <td></td>
                  </tr></tfoot>;
                })()}
              </table>
            </div>
          </div>
        )}

        {/* ── Ledger Tab ── */}
        {tab==='ledger'&&(
          !selAcc
          ?<div className="empty"><div className="empty-ico">👆</div><p>Click an account card above to view its running ledger</p></div>
          :(()=>{
            const acc=accounts.find(a=>a.id===selAcc);
            const bal=balanceOf(selAcc);
            const accIn =ledgerWithBal.filter(t=>t.type==='credit').reduce((s,t)=>s+(+t.amount||0),0);
            const accOut=ledgerWithBal.filter(t=>t.type==='debit' ).reduce((s,t)=>s+(+t.amount||0),0);
            return(
              <div>
                {/* Account detail header */}
                <div className="card mb16" style={{borderLeft:`4px solid ${acc?.color||'var(--primary)'}`}}>
                  <div style={{display:'flex',justifyContent:'space-between',flexWrap:'wrap',gap:16}}>
                    <div>
                      <div style={{fontSize:11,fontWeight:700,color:'var(--text3)',textTransform:'uppercase',letterSpacing:.8}}>{acc?.type==='cash'?'💵 Cash Account':'🏦 Bank Account'}</div>
                      <div style={{fontSize:20,fontWeight:800,fontFamily:'Plus Jakarta Sans',color:acc?.color,marginTop:4}}>{acc?.name}</div>
                      {acc?.type==='bank'&&<div style={{fontSize:12,color:'var(--text3)',marginTop:2}}>{acc?.bankName} · A/C {acc?.accountNo} · IFSC {acc?.ifsc}</div>}
                    </div>
                    <div style={{display:'flex',gap:20,flexWrap:'wrap'}}>
                      <div style={{textAlign:'right'}}>
                        <div style={{fontSize:11,color:'var(--text3)',fontWeight:600}}>OPENING BALANCE</div>
                        <div style={{fontSize:16,fontWeight:700}}>{fmt(acc?.openingBalance||0)}</div>
                      </div>
                      <div style={{textAlign:'right'}}>
                        <div style={{fontSize:11,color:'var(--green)',fontWeight:600}}>TOTAL IN</div>
                        <div style={{fontSize:16,fontWeight:700,color:'var(--green)'}}>+{fmt(accIn)}</div>
                      </div>
                      <div style={{textAlign:'right'}}>
                        <div style={{fontSize:11,color:'var(--red)',fontWeight:600}}>TOTAL OUT</div>
                        <div style={{fontSize:16,fontWeight:700,color:'var(--red)'}}>−{fmt(accOut)}</div>
                      </div>
                      <div style={{textAlign:'right',borderLeft:'2px solid var(--border)',paddingLeft:20}}>
                        <div style={{fontSize:11,fontWeight:700,textTransform:'uppercase',letterSpacing:.8,color:'var(--text3)'}}>CURRENT BALANCE</div>
                        <div style={{fontSize:24,fontWeight:800,fontFamily:'Plus Jakarta Sans',color:bal>=0?acc?.color:'var(--red)'}}>{fmt(bal)}</div>
                      </div>
                    </div>
                  </div>
                </div>

                <div className="card">
                  <div className="sec-hdr mb12">
                    <div className="sec-ttl">Account Ledger</div>
                    <button className="btn btn-primary btn-sm" onClick={()=>{setTForm({...blankTxn(),accountId:selAcc});setErr('');setModal('addTxn');}}>+ Add Transaction</button>
                  </div>
                  <div className="twrap">
                    <table>
                      <thead><tr>
                        <th>Date</th><th>Type</th><th>Category</th><th>Party</th>
                        <th>Ref</th><th>Note</th>
                        <th style={{textAlign:'right'}}>Debit (OUT)</th>
                        <th style={{textAlign:'right'}}>Credit (IN)</th>
                        <th style={{textAlign:'right'}}>Balance</th>
                        <th></th>
                      </tr></thead>
                      <tbody>
                        {ledgerWithBal.length===0&&<tr><td colSpan={10}><div className="empty"><div className="empty-ico">📒</div><p>No transactions for this account.</p></div></td></tr>}

                          const party=state.parties.find(p=>p.id===t.partyId);
                          return(
                            <tr key={t.id} style={{background:t.type==='credit'?'rgba(45,106,79,0.02)':'rgba(192,57,43,0.02)'}}>
                              <td className="c-muted" style={{fontSize:12}}>{t.date}</td>
                              <td><span className={`pill ${t.type==='credit'?'p-green':'p-red'}`} style={{fontSize:10}}>{t.type==='credit'?'▲ IN':'▼ OUT'}</span></td>
                              <td><span className="pill p-blue" style={{fontSize:10}}>{t.category||'—'}</span></td>
                              <td style={{fontSize:12}}>{party?.name||'—'}</td>
                              <td className="mono c-muted" style={{fontSize:11}}>{t.ref||'—'}</td>
                              <td style={{fontSize:12,maxWidth:160,overflow:'hidden',textOverflow:'ellipsis'}}>{t.note||'—'}</td>
                              <td style={{textAlign:'right'}} className="c-red bold">{t.type==='debit'?fmt(t.amount):'—'}</td>
                              <td style={{textAlign:'right'}} className="c-green bold">{t.type==='credit'?fmt(t.amount):'—'}</td>
                              <td style={{textAlign:'right'}}>
                                <span className={`bold ${(t.runBal??0)>=0?'c-teal':'c-red'}`}>{t.runBal!=null?fmt(t.runBal):'—'}</span>
                              </td>
                              <td><button className="btn btn-danger btn-xs" onClick={()=>delTxn(t.id)}>🗑</button></td>
                            </tr>
                          );
                        })}
                      </tbody>
                      {ledgerWithBal.length>0&&<tfoot><tr>
                        <td colSpan={6} className="bold">TOTALS</td>
                        <td className="c-red bold" style={{textAlign:'right'}}>{fmt(accOut)}</td>
                        <td className="c-green bold" style={{textAlign:'right'}}>{fmt(accIn)}</td>
                        <td className={`bold ${bal>=0?'c-teal':'c-red'}`} style={{textAlign:'right'}}>{fmt(bal)}</td>
                        <td></td>
                      </tr></tfoot>}
                    </table>
                  </div>
                </div>
              </div>
            );
          })()

          <div className="frow">
            <div className="fg"><label className="flbl">Account Name *</label>
              <input className="finput" value={aForm.name} onChange={e=>setAForm(f=>({...f,name:e.target.value}))} placeholder="e.g. SBI Current A/C"/>
            </div>
            <div className="fg"><label className="flbl">Type</label>
              <select className="fselect" value={aForm.type} onChange={e=>setAForm(f=>({...f,type:e.target.value}))}>
                <option value="cash">💵 Cash</option>
                <option value="bank">🏦 Bank Account</option>
              </select>
            </div>
          </div>
          {aForm.type==='bank'&&<>
            <div className="frow">
              <div className="fg"><label className="flbl">Bank Name</label>
                <input className="finput" value={aForm.bankName||''} onChange={e=>setAForm(f=>({...f,bankName:e.target.value}))} placeholder="e.g. State Bank of India"/>
              </div>
              <div className="fg"><label className="flbl">Account Number</label>
                <input className="finput mono" value={aForm.accountNo||''} onChange={e=>setAForm(f=>({...f,accountNo:e.target.value}))} placeholder="e.g. 1234567890"/>

            </div>
            <div className="frow">
              <div className="fg"><label className="flbl">IFSC Code</label>
                <input className="finput mono" value={aForm.ifsc||''} onChange={e=>setAForm(f=>({...f,ifsc:e.target.value.toUpperCase()}))} placeholder="e.g. SBIN0001234"/>
              </div>
            </div>
          </>}

            <div className="fg"><label className="flbl">Opening Balance (₹)</label>
              <input type="number" className="finput" value={aForm.openingBalance} onChange={e=>setAForm(f=>({...f,openingBalance:e.target.value}))} placeholder="0"/>

            <div className="fg"><label className="flbl">Colour Tag</label>
              <div style={{display:'flex',gap:8,alignItems:'center',marginTop:4}}>

                  <div key={c} onClick={()=>setAForm(f=>({...f,color:c}))}
                    style={{width:22,height:22,borderRadius:'50%',background:c,cursor:'pointer',border:aForm.color===c?'3px solid #111':'2px solid transparent',transition:'all .12s'}}/>
                ))}
                <input type="color" value={aForm.color} onChange={e=>setAForm(f=>({...f,color:e.target.value}))}
                  style={{width:28,height:28,border:'1px solid var(--border)',borderRadius:4,cursor:'pointer',padding:1}}/>
              </div>
            </div>
          </div>
        </div>
        <div className="mfoot">
          <button className="btn btn-ghost" onClick={()=>setModal(null)}>Cancel</button>
          <button className="btn btn-primary" onClick={doSaveAcc}>💾 Save Account</button>
        </div>
      </div></div>}

      {/* ── Add Transaction Modal ── */}
      {modal==='addTxn'&&<div className="overlay"><div className="modal">
        <div className="mhead">
          <h3>➕ New Transaction</h3>
          <button className="xbtn" onClick={()=>setModal(null)}>✕</button>
        </div>
        <div className="mbody">
          {err&&<div className="alert alert-err">{err}</div>}
          <div className="frow">
            <div className="fg"><label className="flbl">Account *</label>
              <select className="fselect" value={tForm.accountId} onChange={e=>setTForm(f=>({...f,accountId:e.target.value}))}>
                <option value="">— Select Account —</option>
                {accounts.map(a=><option key={a.id} value={a.id}>{a.type==='cash'?'💵':'🏦'} {a.name}</option>)}
              </select>
            </div>
            <div className="fg"><label className="flbl">Date</label>
              <input type="date" className="finput" value={tForm.date} onChange={e=>setTForm(f=>({...f,date:e.target.value}))}/>
            </div>
          </div>
          <div className="frow">
            <div className="fg"><label className="flbl">Type *</label>
              <div style={{display:'flex',gap:8}}>
                {[['credit','▲ Money IN','var(--green)'],['debit','▼ Money OUT','var(--red)']].map(([v,lbl,col])=>(
                  <div key={v} onClick={()=>setTForm(f=>({...f,type:v,category:''}))}
                    style={{flex:1,padding:'9px 10px',borderRadius:8,border:`2px solid ${tForm.type===v?col:'var(--border)'}`,background:tForm.type===v?(v==='credit'?'var(--green-dim)':'var(--red-dim)'):'var(--surface2)',cursor:'pointer',textAlign:'center',fontWeight:600,fontSize:13,color:tForm.type===v?col:'var(--text2)',transition:'all .12s'}}>
                    {lbl}
                  </div>
                ))}
              </div>
            </div>
          </div>
          <div className="frow">
            <div className="fg"><label className="flbl">Category *</label>
              <select className="fselect" value={tForm.category} onChange={e=>setTForm(f=>({...f,category:e.target.value}))}>
                <option value="">— Select Category —</option>
                {(tForm.type==='credit'?CATS_IN:CATS_OUT).map(c=><option key={c}>{c}</option>)}
              </select>
            </div>
            <div className="fg"><label className="flbl">Amount (₹) *</label>
              <input type="number" className="finput" value={tForm.amount} onChange={e=>setTForm(f=>({...f,amount:e.target.value}))} placeholder="0"/>
            </div>
          </div>
          <div className="frow">
            <div className="fg"><label className="flbl">Party (optional)</label>
              <select className="fselect" value={tForm.partyId} onChange={e=>setTForm(f=>({...f,partyId:e.target.value}))}>
                <option value="">— None —</option>
                {state.parties.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}
              </select>
            </div>
            <div className="fg"><label className="flbl">Reference / Cheque No</label>
              <input className="finput mono" value={tForm.ref} onChange={e=>setTForm(f=>({...f,ref:e.target.value}))} placeholder="CHQ-001 / UTR / —"/>
            </div>
          </div>
          <div className="fg"><label className="flbl">Note / Narration</label>
            <input className="finput" value={tForm.note} onChange={e=>setTForm(f=>({...f,note:e.target.value}))} placeholder="Details about this transaction..."/>

          {tForm.accountId&&+tForm.amount>0&&(()=>{
            const curBal=balanceOf(tForm.accountId);
            const newBal=tForm.type==='credit'?curBal+(+tForm.amount):curBal-(+tForm.amount);
            const acc=accounts.find(a=>a.id===tForm.accountId);
            return <div style={{background:'var(--surface3)',borderRadius:8,padding:12,marginTop:4,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <div>
                <div style={{fontSize:11,color:'var(--text3)',fontWeight:600,textTransform:'uppercase'}}>Balance Preview — {acc?.name}</div>
                <div style={{fontSize:13,marginTop:3}}>{fmt(curBal)} → <span className={`bold ${newBal>=0?'c-green':'c-red'}`}>{fmt(newBal)}</span></div>
              </div>
              <div style={{fontSize:22,color:tForm.type==='credit'?'var(--green)':'var(--red)'}}>{tForm.type==='credit'?'▲':'▼'}</div>
            </div>;
          })()}
        </div>
        <div className="mfoot">
          <button className="btn btn-ghost" onClick={()=>setModal(null)}>Cancel</button>
          <button className="btn btn-primary" onClick={doSaveTxn}>💾 Save Transaction</button>
        </div>
      </div></div>}

      {/* ── Transfer Between Accounts Modal ── */}
      {modal==='transfer'&&<div className="overlay"><div className="modal">
        <div className="mhead">
          <h3>⇄ Transfer Between Accounts</h3>
          <button className="xbtn" onClick={()=>setModal(null)}>✕</button>
        </div>
        <div className="mbody">
          {err&&<div className="alert alert-err">{err}</div>}
          <div className="frow">
            <div className="fg"><label className="flbl">Date</label>
              <input type="date" className="finput" value={trfForm.date} onChange={e=>setTrfForm(f=>({...f,date:e.target.value}))}/>
            </div>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr auto 1fr',gap:10,alignItems:'center',marginBottom:12}}>
            <div className="fg" style={{margin:0}}>
              <label className="flbl">From Account</label>
              <select className="fselect" value={trfForm.fromAccountId} onChange={e=>setTrfForm(f=>({...f,fromAccountId:e.target.value}))}>
                <option value="">— Select —</option>
                {accounts.map(a=><option key={a.id} value={a.id}>{a.type==='cash'?'💵':'🏦'} {a.name} ({fmt(balanceOf(a.id))})</option>)}
              </select>
            </div>
            <div style={{textAlign:'center',fontSize:22,color:'var(--primary)',paddingTop:18}}>→</div>
            <div className="fg" style={{margin:0}}>
              <label className="flbl">To Account</label>
              <select className="fselect" value={trfForm.toAccountId} onChange={e=>setTrfForm(f=>({...f,toAccountId:e.target.value}))}>
                <option value="">— Select —</option>
                {accounts.filter(a=>a.id!==trfForm.fromAccountId).map(a=><option key={a.id} value={a.id}>{a.type==='cash'?'💵':'🏦'} {a.name} ({fmt(balanceOf(a.id))})</option>)}
              </select>
            </div>
          </div>
          <div className="frow">
            <div className="fg"><label className="flbl">Amount (₹) *</label>
              <input type="number" className="finput" value={trfForm.amount} onChange={e=>setTrfForm(f=>({...f,amount:e.target.value}))} placeholder="0"/>
            </div>
            <div className="fg"><label className="flbl">Note</label>
              <input className="finput" value={trfForm.note} onChange={e=>setTrfForm(f=>({...f,note:e.target.value}))} placeholder="Purpose of transfer..."/>
            </div>
          </div>
          {trfForm.fromAccountId&&trfForm.toAccountId&&+trfForm.amount>0&&(()=>{
            const fromBal=balanceOf(trfForm.fromAccountId);
            const toBal  =balanceOf(trfForm.toAccountId);
            const fromAcc=accounts.find(a=>a.id===trfForm.fromAccountId);
            const toAcc  =accounts.find(a=>a.id===trfForm.toAccountId);
            return <div style={{background:'var(--surface3)',borderRadius:8,padding:12,marginTop:4}}>
              <div style={{fontSize:11,fontWeight:700,color:'var(--text3)',textTransform:'uppercase',marginBottom:8}}>Balance Preview After Transfer</div>
              <div style={{display:'flex',gap:24}}>
                <div><div style={{fontSize:11,color:'var(--text3)'}}>{fromAcc?.name}</div><div style={{fontSize:14,fontWeight:700,color:'var(--red)'}}>{fmt(fromBal)} → {fmt(fromBal-(+trfForm.amount))}</div></div>
                <div style={{fontSize:20,color:'var(--primary)',alignSelf:'center'}}>→</div>
                <div><div style={{fontSize:11,color:'var(--text3)'}}>{toAcc?.name}</div><div style={{fontSize:14,fontWeight:700,color:'var(--green)'}}>{fmt(toBal)} → {fmt(toBal+(+trfForm.amount))}</div></div>
              </div>
            </div>;
          })()}
        </div>
        <div className="mfoot">
          <button className="btn btn-ghost" onClick={()=>setModal(null)}>Cancel</button>
          <button className="btn btn-primary" onClick={doSaveTransfer}>⇄ Execute Transfer</button>
        </div>
      </div></div>}
    </>
  );
}
