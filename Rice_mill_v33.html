  --accent:#e07c2f; --accent-dim:rgba(224,124,47,0.10);
  --green:#2d6a4f; --green-dim:rgba(45,106,79,0.10);
  --red:#c0392b; --red-dim:rgba(192,57,43,0.09);
  --blue:#1a6ea8; --blue-dim:rgba(26,110,168,0.09);
  --purple:#7b2d8b; --purple-dim:rgba(123,45,139,0.09);
  --teal:#1b7a6e; --teal-dim:rgba(27,122,110,0.10);
  --amber:#d4840a; --amber-dim:rgba(212,132,10,0.10);
  --text:#1a2e1a; --text2:#4a6741; --text3:#8aaa82;
  --radius:12px; --radius-sm:8px; --radius-xs:5px;
  --shadow-sm:0 1px 3px rgba(45,106,79,.08),0 1px 2px rgba(0,0,0,.04);
  --shadow-md:0 4px 16px rgba(45,106,79,.10),0 2px 6px rgba(0,0,0,.05);

*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
h1,h2,h3,h4,h5{font-family:'Plus Jakarta Sans',sans-serif}
::-webkit-scrollbar{width:5px;height:5px}

::-webkit-scrollbar-thumb{background:var(--primary-lt);border-radius:3px}

/* ── Layout ── */
.app{display:flex;height:100vh}
.sidebar{width:234px;min-width:234px;background:var(--primary);display:flex;flex-direction:column;overflow-y:auto}
.logo-wrap{padding:20px 18px 16px;border-bottom:1px solid rgba(255,255,255,.12)}
.logo-wrap h1{font-size:16px;color:#fff;letter-spacing:-.2px;font-weight:800}
.logo-wrap p{font-size:11px;color:rgba(255,255,255,.5);margin-top:3px}
.nav-sec{padding:16px 10px 3px}
.nav-lbl{font-size:9px;font-weight:700;color:rgba(255,255,255,.4);letter-spacing:1.6px;text-transform:uppercase;padding:0 10px;margin-bottom:4px}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:var(--radius-sm);cursor:pointer;transition:all .13s;font-size:13px;color:rgba(255,255,255,.72);font-weight:500;margin-bottom:1px;user-select:none}
.nav-item:hover{background:rgba(255,255,255,.10);color:#fff}
.nav-item.active{background:rgba(255,255,255,.18);color:#fff;font-weight:600}
.nav-icon{font-size:15px;width:18px;text-align:center;flex-shrink:0}
.main{flex:1;overflow-y:auto;display:flex;flex-direction:column;min-width:0}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:5;box-shadow:var(--shadow-sm)}
.topbar h2{font-size:18px;font-weight:700;color:var(--primary)}
.topbar-right{display:flex;gap:8px;align-items:center}
.content{padding:22px 28px;flex:1}

/* ── Cards ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;box-shadow:var(--shadow-sm)}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;display:flex;flex-direction:column;gap:5px;box-shadow:var(--shadow-sm)}
.stat-lbl{font-size:10.5px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.9px}
.stat-val{font-family:'Plus Jakarta Sans',sans-serif;font-size:24px;font-weight:800;line-height:1.1}
.stat-sub{font-size:11.5px;color:var(--text3)}
.bl-accent{border-left:3px solid var(--accent)}
.bl-green{border-left:3px solid var(--green)}
.bl-red{border-left:3px solid var(--red)}
.bl-blue{border-left:3px solid var(--blue)}
.bl-purple{border-left:3px solid var(--purple)}
.bl-teal{border-left:3px solid var(--teal)}

const normSubtype = (s)=>String(s||'').trim();
const qDisplay = (q)=>{
  const st=normSubtype(q?.subtype);
  return st?`${st} — ${q?.name||''}`:(q?.name||'');
};
function renderQualityOptions(state, type){
  const qs=(state?.qualities||[])
    .filter(q=>q.type===type)
    .slice()
    .sort((a,b)=>
      normSubtype(a.subtype).localeCompare(normSubtype(b.subtype))
      || String(a.name||'').localeCompare(String(b.name||''))
    );
  const groups=new Map();
  qs.forEach(q=>{
    const k=normSubtype(q.subtype)||'Other';
    if(!groups.has(k)) groups.set(k,[]);
    groups.get(k).push(q);
  });
  const keys=[...groups.keys()].sort((a,b)=>{
    if(a==='Other'&&b!=='Other') return 1;
    if(b==='Other'&&a!=='Other') return -1;
    return a.localeCompare(b);
  });
  // If there is only "Other", return a flat list (cleaner UX)
  if(keys.length===1 && keys[0]==='Other'){
    return groups.get('Other').map(q=><option key={q.id} value={q.id}>{qDisplay(q)||'—'}</option>);
  }
  return keys.map(k=>(
    <optgroup key={k} label={k}>
      {groups.get(k).map(q=><option key={q.id} value={q.id}>{qDisplay(q)||'—'}</option>)}

  ));

function buildBillHTML(bill, state, billType='paddy'){
  const party=state.parties.find(p=>p.id===bill.partyId);
  const warehouse=state.warehouses.find(w=>w.id===bill.warehouseId);
  const totalWt=bill.items.reduce((s,i)=>s+i.totalWeight,0);
  const itemsTotal=bill.items.reduce((s,i)=>s+i.amount,0);
  const qualities=billType==='paddy'?state.qualities.filter(q=>q.type==='paddy'):state.qualities.filter(q=>q.type==='rice');
  const rows=bill.items.map(item=>{
    const q=state.qualities.find(qq=>qq.id===item.qualityId);
    return `<tr>
      <td>${q?.name||'—'}</td>
      <td style="text-align:center">${item.bags}</td>
      <td style="text-align:center">${item.weightPerBag} KG</td>
      <td style="text-align:right">${item.totalWeight.toLocaleString('en-IN')} KG</td>
      <td style="text-align:right">${(item.totalWeight/100).toFixed(2)} Q</td>
      <td style="text-align:right">₹${item.rate.toLocaleString('en-IN')}</td>
      <td style="text-align:right;font-weight:700">₹${item.amount.toLocaleString('en-IN',{maximumFractionDigits:0})}</td>
    </tr>`;
  }).join('');
  const expRows=(bill.partyExpenses||[]).map(e=>{
    const typeName=billType==='paddy'
      ?(()=>{const all=[...Object.values(state.itemExpenseTypes||{}).flatMap(g=>g.purchase||[]),...(state.customPaddyExpenseTypes||[])];return all.find(t=>t.id===e.typeId)?.name||e.note||'Expense';})()
      :(()=>{const all=Object.values(state.itemExpenseTypes||{}).flatMap(g=>g.sale||[]);return all.find(t=>t.id===e.typeId)?.name||e.note||'Expense';})();
    return `<tr><td>${typeName}${e.note?' ('+e.note+')':''}</td><td></td><td></td><td></td><td></td><td></td><td style="text-align:right">₹${(+e.amt||0).toLocaleString('en-IN',{maximumFractionDigits:0})}</td></tr>`;
  }).join('');
  const billTypeLabel=billType==='paddy'?'PADDY PURCHASE BILL':'RICE SALE BILL';
  return `
  <style>
    body{font-family:Arial,sans-serif;font-size:13px;color:#111}
    table{width:100%;border-collapse:collapse;margin-bottom:12px}
    th{background:#f0f0f0;padding:7px 10px;text-align:left;font-size:11px;text-transform:uppercase;border:1px solid #ddd}
    td{padding:6px 10px;border:1px solid #eee}
    .hdr{display:flex;justify-content:space-between;margin-bottom:20px;padding-bottom:12px;border-bottom:2px solid #111}
    .brand{font-family:'Plus Jakarta Sans','Arial Black',sans-serif;font-size:22px;color:#2d6a4f;font-weight:800}
    .sub{font-size:11px;color:#555;margin-top:3px}
    .bill-ttl{font-size:14px;font-weight:700;text-align:right}
    .bill-no{font-size:22px;font-weight:900;color:#c47a00;text-align:right}
    .footer{margin-top:24px;display:flex;justify-content:space-between;font-size:12px;color:#555}
    .sig{border-top:1px solid #aaa;margin-top:40px;padding-top:8px;width:160px;text-align:center;font-size:11px}
    .summary-box{float:right;min-width:260px;border:1px solid #ddd;border-radius:6px;padding:12px 14px;margin-bottom:8px}
    .sum-row{display:flex;justify-content:space-between;padding:3px 0;font-size:13px}
    .sum-total{border-top:2px solid #111;padding-top:7px;font-weight:900;font-size:16px;display:flex;justify-content:space-between}
    .clearfix::after{content:'';display:table;clear:both}
  </style>
  <div class="hdr">
    <div>
      <div class="brand">🌾 Shubham Industries</div>
      <div class="sub">${warehouse?warehouse.name+' · ':''} ${party?.address||''}</div>
    </div>
    <div>
      <div class="bill-ttl">${billTypeLabel}</div>
      <div class="bill-no">${bill.billNo}</div>
      <div style="font-size:12px;text-align:right;margin-top:4px">Date: ${bill.date}</div>
    </div>
  </div>
  <table style="margin-bottom:16px;border:none">
    <tr>
      <td style="border:none;padding:3px 0;width:50%"><b>Party:</b> ${party?.name||'—'}</td>
      <td style="border:none;padding:3px 0"><b>GST:</b> ${party?.gst||'N/A'}</td>
    </tr>
    <tr>

    <thead><tr><th>Quality / Item</th><th style="text-align:center">Bags</th><th style="text-align:center">Wt/Bag</th><th style="text-align:right">Total KG</th><th style="text-align:right">Quintals</th><th style="text-align:right">Rate/Q</th><th style="text-align:right">Amount</th></tr></thead>
    <tbody>${rows}${expRows}</tbody>
    <tfoot>
      <tr style="background:#f9f9f9;font-weight:700">
        <td>TOTAL</td><td></td><td></td>
        <td style="text-align:right">${totalWt.toLocaleString('en-IN')} KG</td>
        <td style="text-align:right">${(totalWt/100).toFixed(2)} Q</td>
        <td></td>
        <td style="text-align:right">₹${itemsTotal.toLocaleString('en-IN',{maximumFractionDigits:0})}</td>
      </tr>
    </tfoot>
  </table>
  <div class="clearfix">
    <div class="summary-box">
      <div class="sum-row"><span>Items Total</span><span>₹${itemsTotal.toLocaleString('en-IN',{maximumFractionDigits:0})}</span></div>
      ${(bill.partyExpenses||[]).length>0?`<div class="sum-row"><span>Party Expenses</span><span>₹${(bill.partyExpenses.reduce((s,e)=>s+(+e.amt||0),0)).toLocaleString('en-IN',{maximumFractionDigits:0})}</span></div>`:''}
      ${bill.freight?.type==='pay'?`<div class="sum-row"><span>Freight</span><span>₹${(+bill.freight.amount||0).toLocaleString('en-IN')}</span></div>`:''}
      ${(+bill.advance||0)>0?`<div class="sum-row" style="color:green"><span>(-) Advance</span><span>(₹${(+bill.advance).toLocaleString('en-IN')})</span></div>`:''}
      ${(+bill.tds||0)>0?`<div class="sum-row" style="color:#b45309"><span>(-) TDS @${bill.tdsRate||1}%</span><span>(₹${(+bill.tds).toLocaleString('en-IN',{maximumFractionDigits:0})})</span></div>`:''}
      <div class="sum-total"><span>NET PAYABLE</span><span>₹${(+bill.totalAmount||0).toLocaleString('en-IN',{maximumFractionDigits:0})}</span></div>
    </div>
  </div>
  <div class="footer">
    <div>
      <div class="sig">Receiver's Signature</div>
    </div>
    <div>
      <div class="sig">Authorised Signatory</div>
    </div>
  </div>`;
}

// Build a fake email from username for Firebase Auth
const usernameToEmail = u => `${u.toLowerCase().replace(/[^a-z0-9]/g,'_')}@shubham.mill`;

/* ─── LOGIN SCREEN ──────────────────────────────────────── */
function LoginScreen({onLogin}){
  const [username,setUsername]=useState('');
  const [password,setPassword]=useState('');
  const [err,setErr]=useState('');
  const [loading,setLoading]=useState(false);

  const doLogin=async()=>{
    if(!username.trim()||!password) return setErr('Please enter username and password.');
    setLoading(true); setErr('');
    const uname=username.trim().toLowerCase();
    const email=usernameToEmail(uname);
    try {
      await auth.signInWithEmailAndPassword(email, password);
    } catch(signInErr){
      // Bootstrap: if ANY login error and credentials match default admin, try creating the account
      if(uname===ADMIN_DEFAULT_USERNAME && password===ADMIN_DEFAULT_PASSWORD){
        try {
          const cred=await auth.createUserWithEmailAndPassword(email, password);
          await db.collection(USERS_COL).doc(cred.user.uid).set({
            uid:cred.user.uid, username:'admin', displayName:'Administrator',
            role:'admin', active:true,
            modules: ALL_MODULES.map(m=>m.id),
            createdAt:new Date().toISOString(), email
          });
          setLoading(false);
          return; // onAuthStateChanged fires automatically
        } catch(createErr){
          if(createErr.code==='auth/email-already-in-use'){
            setErr('Incorrect password for admin. Try: Admin@1234');
          } else {
            setErr(createErr.message||'First-time setup failed.');
          }
          setLoading(false);
          return;
        }
      }
      const code=signInErr.code||'';
      if(code==='auth/wrong-password'||code==='auth/invalid-credential'||code==='auth/invalid-login-credentials'){
        setErr('Incorrect password. Please try again.');
      } else if(code==='auth/user-not-found'||code==='auth/user-disabled'){
        setErr('Account not found or disabled. Contact your admin.');
      } else if(code==='auth/too-many-requests'){
        setErr('Too many attempts. Please wait a few minutes.');
      } else {
        setErr(signInErr.message||'Login failed. Check your credentials.');
      }
    }
    setLoading(false);
  };

  return(
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column'}}>
      <div style={{position:'fixed',inset:0,background:'linear-gradient(135deg,#e8f5e9 0%,#f4f7f2 50%,#e0f2e9 100%)',zIndex:0}}/>
      <div style={{position:'relative',zIndex:1,textAlign:'center',maxWidth:400,width:'100%',padding:'0 24px'}}>
        <div style={{marginBottom:28}}>
          <div style={{fontSize:52,marginBottom:10}}>🌾</div>
          <h1 style={{fontFamily:'Plus Jakarta Sans',fontSize:26,fontWeight:800,color:'var(--primary)',marginBottom:4}}>Shubham Industries</h1>
          <p style={{color:'var(--text3)',fontSize:13}}>Rice Mill Management System</p>
        </div>
        <div style={{background:'#fff',borderRadius:16,border:'1px solid var(--border)',boxShadow:'0 8px 32px rgba(45,106,79,.12)',padding:'32px 28px'}}>
          <h2 style={{fontFamily:'Plus Jakarta Sans',fontSize:17,fontWeight:700,color:'var(--primary)',marginBottom:4}}>Welcome back</h2>
          <p style={{fontSize:12,color:'var(--text3)',marginBottom:22}}>Sign in with your account credentials</p>
          {err&&<div style={{background:'#fef2f2',border:'1px solid #fca5a5',color:'var(--red)',borderRadius:8,padding:'9px 13px',fontSize:13,marginBottom:14,textAlign:'left'}}>{err}</div>}
          <div style={{marginBottom:13,textAlign:'left'}}>
            <label style={{fontSize:10,fontWeight:700,color:'var(--text2)',textTransform:'uppercase',letterSpacing:.8,display:'block',marginBottom:5}}>Username</label>
            <input className="finput" placeholder="Enter username…" value={username} onChange={e=>setUsername(e.target.value)} onKeyDown={e=>e.key==='Enter'&&doLogin()} autoFocus/>
          </div>
          <div style={{marginBottom:20,textAlign:'left'}}>
            <label style={{fontSize:10,fontWeight:700,color:'var(--text2)',textTransform:'uppercase',letterSpacing:.8,display:'block',marginBottom:5}}>Password</label>
            <input type="password" className="finput" placeholder="Enter password…" value={password} onChange={e=>setPassword(e.target.value)} onKeyDown={e=>e.key==='Enter'&&doLogin()}/>
          </div>
          <button className="btn btn-primary" style={{width:'100%',justifyContent:'center',padding:'10px',fontSize:14}} onClick={doLogin} disabled={loading}>
            {loading?'⏳ Signing in…':'🔓 Sign In'}
          </button>
        </div>
        <p style={{marginTop:16,fontSize:11,color:'var(--text3)'}}>Multi-user · Role-based access · Cloud synced</p>
      </div>
    </div>
  );
}

function AdminPanel({currentUser, onClose}){
  const [users,setUsers]=useState([]);
  const [loading,setLoading]=useState(true);
  const [modal,setModal]=useState(null); // null | 'add' | 'edit' | 'perms'
  const [selUser,setSelUser]=useState(null);
  const [form,setForm]=useState({username:'',displayName:'',password:'',role:'user',active:true});
  const [perms,setPerms]=useState([]);
  const [err,setErr]=useState('');
  const [saving,setSaving]=useState(false);
  const [toast,setToast]=useState(null);
  const showToast=(msg,t='ok')=>{setToast({msg,t});setTimeout(()=>setToast(null),3000);};

  const loadUsers=()=>{
    setLoading(true);
    db.collection(USERS_COL).get().then(snap=>{
      setUsers(snap.docs.map(d=>d.data()));
      setLoading(false);
    }).catch(()=>setLoading(false));
  };
  React.useEffect(loadUsers,[]);

  const doAddUser=async()=>{
    if(!form.username.trim()||!form.displayName.trim()||!form.password) return setErr('Username, display name and password are required.');
    if(form.password.length<6) return setErr('Password must be at least 6 characters.');
    const dup=users.find(u=>u.username.toLowerCase()===form.username.toLowerCase());
    if(dup) return setErr('Username already exists.');
    setSaving(true); setErr('');
    try {
      const email=usernameToEmail(form.username.trim());
      // Create Firebase Auth user via admin workaround (sign in as new user, then re-sign in as admin)
      const adminEmail=usernameToEmail(currentUser.username);
      const adminPw=prompt('Re-enter YOUR password to confirm (required to create new user):');
      if(!adminPw){setSaving(false);return;}
      const cred=await auth.createUserWithEmailAndPassword(email, form.password);
      const newUid=cred.user.uid;
      await db.collection(USERS_COL).doc(newUid).set({
        uid:newUid, username:form.username.trim(), displayName:form.displayName.trim(),
        role:form.role, active:form.active,
        modules: form.role==='admin'?ALL_MODULES.map(m=>m.id):[],
        createdAt:new Date().toISOString(), email
      });
      // Sign back in as admin
      await auth.signInWithEmailAndPassword(adminEmail, adminPw);
      showToast('✅ User created successfully');
      setModal(null); loadUsers();
    } catch(e){ setErr(e.message||'Failed to create user.'); }
    setSaving(false);
  };

  const doToggleActive=async(u)=>{
    if(u.uid===currentUser.uid) return showToast('Cannot deactivate yourself.','err');
    await db.collection(USERS_COL).doc(u.uid).update({active:!u.active});
    showToast((!u.active?'✅ User activated':'⛔ User deactivated'));
    loadUsers();
  };

  const openPerms=(u)=>{
    setSelUser(u);
    setPerms(u.modules||[]);
    setModal('perms');
  };

  const savePerms=async()=>{
    setSaving(true);
    await db.collection(USERS_COL).doc(selUser.uid).update({modules:perms});
    showToast('✅ Permissions saved');
    setSaving(false); setModal(null); loadUsers();
  };

  const togglePerm=(id)=>setPerms(p=>p.includes(id)?p.filter(x=>x!==id):[...p,id]);
  const toggleSection=(sec)=>{
    const ids=ALL_MODULES.filter(m=>m.section===sec).map(m=>m.id);
    const allOn=ids.every(id=>perms.includes(id));
    if(allOn) setPerms(p=>p.filter(x=>!ids.includes(x)));
    else setPerms(p=>[...new Set([...p,...ids])]);
  };

  const sections=[...new Set(ALL_MODULES.map(m=>m.section))];

  return(
    <div className="overlay" style={{zIndex:200}}>
      <div className="modal modal-xl" style={{maxHeight:'95vh'}}>
        <div className="mhead">
          <h3>🛡️ Admin Panel — User Management</h3>
          <div style={{display:'flex',gap:8,alignItems:'center'}}>
            <button className="btn btn-primary btn-sm" onClick={()=>{setForm({username:'',displayName:'',password:'',role:'user',active:true});setErr('');setModal('add');}}>+ Add User</button>
            <button className="xbtn" onClick={onClose}>✕</button>
          </div>
        </div>

        {/* Modal: Add User */}
        {modal==='add'&&<div className="overlay" style={{zIndex:300}}><div className="modal">
          <div className="mhead"><h3>➕ Create New User</h3><button className="xbtn" onClick={()=>setModal(null)}>✕</button></div>
          <div className="mbody">
            {err&&<div className="alert alert-err">{err}</div>}
            <div className="frow">
              <div className="fg"><label className="flbl">Username *</label><input className="finput" value={form.username} onChange={e=>setForm(f=>({...f,username:e.target.value}))} placeholder="e.g. rajesh_op"/></div>
              <div className="fg"><label className="flbl">Display Name *</label><input className="finput" value={form.displayName} onChange={e=>setForm(f=>({...f,displayName:e.target.value}))} placeholder="Full name"/></div>
            </div>
            <div className="frow">
              <div className="fg"><label className="flbl">Password *</label><input type="password" className="finput" value={form.password} onChange={e=>setForm(f=>({...f,password:e.target.value}))} placeholder="Min 6 characters"/></div>
              <div className="fg"><label className="flbl">Role</label>
                <select className="fselect" value={form.role} onChange={e=>setForm(f=>({...f,role:e.target.value}))}>
                  <option value="user">User</option>
                  <option value="manager">Manager</option>
                  <option value="admin">Admin</option>
                </select>
              </div>
            </div>
            <label className="fcheck"><input type="checkbox" checked={form.active} onChange={e=>setForm(f=>({...f,active:e.target.checked}))}/> Account active (user can log in)</label>
            <div style={{marginTop:12,padding:10,background:'var(--surface2)',borderRadius:8,fontSize:12,color:'var(--text2)'}}>
              ℹ️ After creation, go to <b>Edit Permissions</b> to control which modules this user can see.
              <br/>Admin role gets access to all modules automatically.
            </div>
          </div>
          <div className="mfoot">
            <button className="btn btn-ghost" onClick={()=>setModal(null)}>Cancel</button>
            <button className="btn btn-primary" onClick={doAddUser} disabled={saving}>{saving?'Creating…':'💾 Create User'}</button>
          </div>
        </div></div>}

        {/* Modal: Edit Permissions */}
        {modal==='perms'&&selUser&&<div className="overlay" style={{zIndex:300}}><div className="modal modal-xl">
          <div className="mhead">
            <h3>🔐 Permissions — {selUser.displayName} <span style={{fontSize:12,fontWeight:400,color:'var(--text3)'}}>(@{selUser.username})</span></h3>
            <button className="xbtn" onClick={()=>setModal(null)}>✕</button>
          </div>
          <div className="mbody">
            <div style={{marginBottom:14,padding:10,background:'var(--surface2)',borderRadius:8,fontSize:12,color:'var(--text2)'}}>
              Toggle which pages/modules this user can see and access. Changes take effect on their next page refresh.
            </div>
            {sections.map(sec=>{
              const mods=ALL_MODULES.filter(m=>m.section===sec);
              const allOn=mods.every(m=>perms.includes(m.id));
              const someOn=mods.some(m=>perms.includes(m.id));
              return <div key={sec} style={{marginBottom:16}}>
                <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:8}}>
                  <span style={{fontSize:10,fontWeight:700,color:'var(--text3)',textTransform:'uppercase',letterSpacing:1.2}}>{sec}</span>
                  <button className={`btn btn-xs ${allOn?'btn-danger':'btn-success'}`} onClick={()=>toggleSection(sec)}>{allOn?'Remove All':'Grant All'}</button>
                </div>
                <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(200px,1fr))',gap:8}}>
                  {mods.map(m=>(
                    <label key={m.id} style={{display:'flex',alignItems:'center',gap:10,padding:'10px 14px',borderRadius:8,border:`1.5px solid ${perms.includes(m.id)?'var(--primary-mid)':'var(--border)'}`,background:perms.includes(m.id)?'var(--primary-dim)':'var(--surface)',cursor:'pointer',transition:'all .12s'}}>

                      <span style={{fontSize:18,lineHeight:1}}>{m.icon}</span>

                </div>

            })}

          <div className="mfoot">
            <div style={{fontSize:12,color:'var(--text3)',flex:1}}>{perms.length} of {ALL_MODULES.length} modules granted</div>
            <button className="btn btn-ghost" onClick={()=>setModal(null)}>Cancel</button>
            <button className="btn btn-primary" onClick={savePerms} disabled={saving}>{saving?'Saving…':'💾 Save Permissions'}</button>
          </div>
        </div></div>}

        {/* Users Table */}
        <div className="mbody">
          {loading?<div className="empty">⏳ Loading users…</div>:<div className="twrap">
            <table>
              <thead><tr>
                <th>#</th><th>User</th><th>Username</th><th>Role</th><th>Modules</th><th>Status</th><th>Created</th><th>Actions</th>

                    </td>
                    <td className="mono" style={{fontSize:12,color:'var(--text3)'}}>@{u.username}</td>
                    <td><span className={`pill ${u.role==='admin'?'p-purple':u.role==='manager'?'p-blue':'p-gray'}`}>{u.role==='admin'?'👑 Admin':u.role==='manager'?'🔷 Manager':'👤 User'}</span></td>

                    <td className="c-muted" style={{fontSize:11}}>{u.createdAt?u.createdAt.slice(0,10):'—'}</td>
                    <td><div className="tda">
                      {u.role!=='admin'&&<button className="btn btn-blue btn-xs" onClick={()=>openPerms(u)}>🔐 Perms</button>}
                      {u.uid!==currentUser.uid&&<button className={`btn btn-xs ${u.active?'btn-danger':'btn-success'}`} onClick={()=>doToggleActive(u)}>{u.active?'Disable':'Enable'}</button>}
                    </div></td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>}
        </div>
        {toast&&<div style={{position:'fixed',bottom:22,right:22,zIndex:9999,background:toast.t==='err'?'#fef2f2':'#f0fdf4',border:`1px solid ${toast.t==='err'?'#fca5a5':'#86efac'}`,color:toast.t==='err'?'var(--red)':'var(--green)',padding:'10px 18px',borderRadius:8,fontSize:13,fontWeight:600}}>{toast.msg}</div>}
      </div>
    </div>
  );
}

/* ─── CHANGE PASSWORD MODAL ─────────────────────────────── */
function ChangePasswordModal({onClose}){
  const [cur,setCur]=useState('');
  const [nw,setNw]=useState('');
  const [conf,setConf]=useState('');
  const [err,setErr]=useState('');
  const [ok,setOk]=useState(false);
  const doChange=async()=>{
    if(!cur||!nw||!conf) return setErr('All fields required.');
    if(nw.length<6) return setErr('New password must be at least 6 chars.');
    if(nw!==conf) return setErr('Passwords do not match.');
    try {
      const u=auth.currentUser;
      const cred=firebase.auth.EmailAuthProvider.credential(u.email,cur);
      await u.reauthenticateWithCredential(cred);
      await u.updatePassword(nw);
      setOk(true);
    } catch(e){ setErr(e.code==='auth/wrong-password'?'Current password incorrect.':e.message); }
  };
  return(
    <div className="overlay" style={{zIndex:300}}><div className="modal" style={{maxWidth:440}}>
      <div className="mhead"><h3>🔑 Change Password</h3><button className="xbtn" onClick={onClose}>✕</button></div>
      <div className="mbody">
        {ok?<div className="alert alert-ok">✅ Password changed successfully!</div>:<>
          {err&&<div className="alert alert-err">{err}</div>}
          <div className="fg"><label className="flbl">Current Password</label><input type="password" className="finput" value={cur} onChange={e=>setCur(e.target.value)}/></div>
          <div className="fg"><label className="flbl">New Password</label><input type="password" className="finput" value={nw} onChange={e=>setNw(e.target.value)}/></div>
          <div className="fg"><label className="flbl">Confirm New Password</label><input type="password" className="finput" value={conf} onChange={e=>setConf(e.target.value)}/></div>
        </>}
      </div>
      <div className="mfoot">
        <button className="btn btn-ghost" onClick={onClose}>{ok?'Close':'Cancel'}</button>
        {!ok&&<button className="btn btn-primary" onClick={doChange}>💾 Update Password</button>}
      </div>
    </div></div>
  );
}

/* ─── COMPANY PICKER SCREEN ─────────────────────────────── */
function CompanyPickerScreen({currentUser, onSelect, onSignOut}){
  const [companies,setCompanies]=useState([]);
  const [loading,setLoading]=useState(true);
  const [showCreate,setShowCreate]=useState(false);
  const [form,setForm]=useState({name:'',type:'Rice Mill',gstin:'',city:'',phone:''});
  const [creating,setCreating]=useState(false);
  const [err,setErr]=useState('');

  React.useEffect(()=>{
    loadCompanies();
  },[]);

  const loadCompanies=()=>{
    setLoading(true);
    db.collection(COMPANIES_COL)
      .where('members','array-contains',currentUser.uid)
      .get()
      .then(snap=>{
        const list=snap.docs.map(d=>({id:d.id,...d.data()}));
        list.sort((a,b)=>(a.name||'').localeCompare(b.name||''));
        setCompanies(list);
        setLoading(false);
      })
      .catch(e=>{
        console.error(e);
        // Firestore rules not set yet — show empty
        setCompanies([]);
        setLoading(false);
      });
  };

  const doCreate=async()=>{
    if(!form.name.trim()){setErr('Company name is required');return;}
    setCreating(true); setErr('');
    try{
      const id=uid();
      const company={
        id,
        name:form.name.trim(),
        type:form.type||'Rice Mill',
        gstin:form.gstin.trim(),
        city:form.city.trim(),
        phone:form.phone.trim(),
        members:[currentUser.uid],
        admins:[currentUser.uid],
        createdAt:new Date().toISOString(),
        createdBy:currentUser.uid,
      };
      await db.collection(COMPANIES_COL).doc(id).set(company);
      setShowCreate(false);
      setForm({name:'',type:'Rice Mill',gstin:'',city:'',phone:''});
      // Auto-select the new company
      onSelect(company);
    }catch(e){
      setErr(e.message||'Failed to create company');
    }
    setCreating(false);
  };

  const COMPANY_TYPES=['Rice Mill','Dal Mill','Flour Mill','Trading Company','Other'];

  return(
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column'}}>
      <div style={{position:'fixed',inset:0,background:'linear-gradient(135deg,#e8f5e9 0%,#f4f7f2 50%,#e0f2e9 100%)',zIndex:0}}/>
      <div style={{position:'relative',zIndex:1,width:'100%',maxWidth:520,padding:'0 20px'}}>
        {/* Header */}
        <div style={{textAlign:'center',marginBottom:28}}>
          <div style={{fontSize:48,marginBottom:8}}>🏭</div>
          <h1 style={{fontFamily:'Plus Jakarta Sans',fontSize:22,fontWeight:800,color:'var(--primary)',marginBottom:4}}>Select Company</h1>
          <p style={{fontSize:13,color:'var(--text3)'}}>Logged in as <b>{currentUser.displayName}</b> · <span style={{cursor:'pointer',color:'var(--primary)',textDecoration:'underline'}} onClick={onSignOut}>Sign out</span></p>
        </div>

        {/* Company list */}
        <div style={{background:'#fff',borderRadius:16,border:'1px solid var(--border)',boxShadow:'0 8px 32px rgba(45,106,79,.12)',overflow:'hidden',marginBottom:12}}>
          {loading&&<div style={{padding:32,textAlign:'center',color:'var(--text3)',fontSize:13}}>⏳ Loading companies…</div>}
          {!loading&&companies.length===0&&!showCreate&&(
            <div style={{padding:40,textAlign:'center'}}>
              <div style={{fontSize:40,marginBottom:12}}>🏗️</div>
              <div style={{fontFamily:'Plus Jakarta Sans',fontWeight:700,fontSize:16,color:'var(--primary)',marginBottom:6}}>No companies yet</div>
              <div style={{fontSize:13,color:'var(--text3)',marginBottom:20}}>Create your first company to get started</div>
              <button className="btn btn-primary" onClick={()=>setShowCreate(true)}>+ Create Company</button>
            </div>

          {!loading&&companies.map((c,i)=>(
            <div key={c.id}
              onClick={()=>onSelect(c)}
              style={{display:'flex',alignItems:'center',gap:14,padding:'16px 20px',borderBottom:i<companies.length-1?'1px solid var(--border2)':'none',cursor:'pointer',transition:'background .13s'}}

                {c.type==='Rice Mill'?'🌾':c.type==='Dal Mill'?'🫘':c.type==='Flour Mill'?'🌾':'🏭'}
              </div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontWeight:700,fontSize:15,color:'var(--text)',marginBottom:2}}>{c.name}</div>
                <div style={{fontSize:12,color:'var(--text3)'}}>{c.type}{c.city?' · '+c.city:''}{c.gstin?' · '+c.gstin:''}</div>

                <button className="btn btn-ghost" onClick={()=>{setShowCreate(false);setErr('');}}>Cancel</button>

            </div>
          )}
        </div>

        {/* Add another company button */}
        {!loading&&companies.length>0&&!showCreate&&(
          <button className="btn btn-ghost" style={{width:'100%',justifyContent:'center',padding:'10px'}} onClick={()=>setShowCreate(true)}>

/* ─── APP ──────────────────────────────────────────────── */
function App(){
  const [state,setState]=useState(loadState);
  const [page,setPage]=useState('dashboard');
  const [toast,setToast]=useState(null);
  const [loaded,setLoaded]=useState(false);
  const [syncStatus,setSyncStatus]=useState('idle');
  const [authState,setAuthState]=useState('checking'); // checking | login | company | app
  const [currentUser,setCurrentUser]=useState(null);
  const [currentCompany,setCurrentCompany]=useState(null);
  const [showAdmin,setShowAdmin]=useState(false);
  const [showChangePw,setShowChangePw]=useState(false);
  const [showMore,setShowMore]=useState(false);
  const [showCompanySwitch,setShowCompanySwitch]=useState(false);
  const saveTimer=React.useRef(null);
  const currentCompanyRef=React.useRef(null);

  const showToast=(msg,type='ok')=>{
    setToast({msg,type});
    setTimeout(()=>setToast(null),3500);
  };

  // ── Firebase Auth state listener ──
  React.useEffect(()=>{
    const unsub=auth.onAuthStateChanged(async fireUser=>{
      if(fireUser){
        try{
          const snap=await db.collection(USERS_COL).doc(fireUser.uid).get();
          let profile;
          if(snap.exists){
            profile=snap.data();
            if(!profile.active){ auth.signOut(); setAuthState('login'); return; }
          } else {
            profile={uid:fireUser.uid,username:'admin',displayName:'Administrator',role:'admin',active:true,modules:ALL_MODULES.map(m=>m.id),email:fireUser.email};
          }
          setCurrentUser(profile);
          // Check if there's a remembered company for this session
          const rememberedId=sessionStorage.getItem('si_company_'+fireUser.uid);
          if(rememberedId){
            // Try to load that company directly
            try{
              const cSnap=await db.collection(COMPANIES_COL).doc(rememberedId).get();
              if(cSnap.exists){
                const co={id:cSnap.id,...cSnap.data()};
                setCurrentCompany(co);
                currentCompanyRef.current=co;
                setAuthState('app');
                bootLoad(rememberedId);
                return;
              }
            }catch(e){ /* fall through to company picker */ }
          }
          setAuthState('company');
        }catch(e){
          const profile={uid:fireUser.uid,username:'admin',displayName:'Administrator',role:'admin',active:true,modules:ALL_MODULES.map(m=>m.id),email:fireUser.email};
          setCurrentUser(profile);
          setAuthState('company');
        }
      } else {
        setCurrentUser(null);
        setCurrentCompany(null);
        currentCompanyRef.current=null;
        setAuthState('login');
      }
    });
    return unsub;
  },[]);

  // ── Select a company (from picker) ──
  const selectCompany=(company)=>{
    setCurrentCompany(company);
    currentCompanyRef.current=company;
    sessionStorage.setItem('si_company_'+auth.currentUser?.uid, company.id);
    setLoaded(false);
    setState(loadState);
    setPage('dashboard');
    setAuthState('app');
    bootLoad(company.id);
  };

  // ── Switch company ──
  const switchCompany=()=>{
    setCurrentCompany(null);
    currentCompanyRef.current=null;
    sessionStorage.removeItem('si_company_'+auth.currentUser?.uid);
    setLoaded(false);
    setState(loadState);
    setShowCompanySwitch(false);
    setAuthState('company');
  };

  // ── Load mill data from Firestore ──
  const bootLoad=(companyId)=>{
    setSyncStatus('saving');
    const path=companyDataPath(companyId);
    const parts=path.split('/');
    // Path is: si_companies/{id}/data/main → collection/doc/collection/doc
    db.collection(parts[0]).doc(parts[1]).collection(parts[2]).doc(parts[3]).get()
      .then(snap=>{
        if(snap.exists){
          const d=snap.data();
          if(d.payload){
            try{ setState(JSON.parse(d.payload)); }catch(e){ console.error('Parse error',e); }
          }
        }
        setLoaded(true);
        setSyncStatus('saved');
      })
      .catch(e=>{
        console.error('Load error:',e.code,e.message);
        setLoaded(true);
        setSyncStatus('error');
        if(e.code==='permission-denied') showToast('⚠️ Firestore rules not set. See setup guide.','err');
        else showToast('⚠️ Could not load data. Using local data.','err');
      });
  };

  // ── Debounced save ──
  const pushToCloud=(data)=>{
    const co=currentCompanyRef.current;
    if(!co) return;
    setSyncStatus('saving');
    if(saveTimer.current)clearTimeout(saveTimer.current);
    saveTimer.current=setTimeout(()=>{
      const path=companyDataPath(co.id);
      const parts=path.split('/');
      db.collection(parts[0]).doc(parts[1]).collection(parts[2]).doc(parts[3])
        .set({payload:JSON.stringify(data),updatedAt:new Date().toISOString()})
        .then(()=>setSyncStatus('saved'))
        .catch(()=>{ setSyncStatus('error'); showToast('⚠️ Cloud save failed','err'); });
    },800);
  };

  const save=useCallback(upd=>{
    setState(prev=>{
      const next=typeof upd==='function'?upd(prev):upd;
      pushToCloud(next);
      return next;
    });
  },[]);

  const doSignOut=()=>{
    sessionStorage.removeItem('si_company_'+auth.currentUser?.uid);
    auth.signOut();
    setLoaded(false);
    setState(loadState);
    setCurrentCompany(null);
    currentCompanyRef.current=null;
  };

  // ── Allowed modules ──
  const isAdmin=currentUser?.role==='admin';
  const allowedModules=isAdmin?ALL_MODULES.map(m=>m.id):(currentUser?.modules||[]);

  // ── Redirect to first allowed page ──
  React.useEffect(()=>{
    if(authState==='app'&&loaded&&!allowedModules.includes(page)){
      setPage(allowedModules[0]||'dashboard');
    }
  },[authState,loaded,allowedModules,page]);

  // ── Auto-expand More Options when on those pages ──
  const MORE_PAGE_IDS=['parties','brokers','qualities','warehouses','fundings','firmsettings'];
  React.useEffect(()=>{ if(MORE_PAGE_IDS.includes(page)) setShowMore(true); },[page]);

  // ── Sync status pill ──
  const syncPill=()=>{
    if(syncStatus==='saving') return <span style={{fontSize:10,color:'rgba(255,255,255,.5)',display:'flex',alignItems:'center',gap:4}}>⏳ Saving…</span>;
    if(syncStatus==='saved')  return <span style={{fontSize:10,color:'rgba(255,255,255,.6)',display:'flex',alignItems:'center',gap:4}}>☁️ Saved</span>;
    if(syncStatus==='error')  return <span style={{fontSize:10,color:'#fca5a5',display:'flex',alignItems:'center',gap:4}}>⚠️ Sync error</span>;
    return null;
  };

  // ── Screens ──
  if(authState==='checking') return (
    <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',flexDirection:'column',gap:14,color:'var(--text2)'}}>
      <div style={{fontSize:40}}>🌾</div><div style={{fontSize:16,fontWeight:600}}>Initialising…</div>
    </div>
  );

  if(authState==='login') return <LoginScreen onLogin={()=>{}}/>;

  if(authState==='company') return (
    <CompanyPickerScreen
      currentUser={currentUser}
      onSelect={selectCompany}
      onSignOut={doSignOut}
    />
  );

  if(!loaded) return (
    <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',flexDirection:'column',gap:14,color:'var(--text2)'}}>
      <div style={{fontSize:40}}>{currentCompany?.type==='Rice Mill'?'🌾':'🏭'}</div>
      <div style={{fontSize:16,fontWeight:600}}>Loading {currentCompany?.name||'company data'}…</div>
      <div style={{fontSize:12,color:'var(--text3)'}}>Fetching from cloud</div>
    </div>
  );

  // ── Build nav ──
  const NAV_SECTIONS=[
    {sec:null,  items:[{id:'dashboard',icon:'🏠',label:'Dashboard'}]},
    {sec:'ACCOUNTS', items:[
      {id:'cashregister',icon:'💰',label:'Cash & Bank Register'},
      {id:'partnership',icon:'🤝',label:'Partnership'},
      {id:'payments',icon:'💳',label:'Payments'},
      {id:'ledger',icon:'📒',label:'Ledger'},
    ]},
    {sec:'OPERATIONS', items:[
      {id:'orders',icon:'📋',label:'Orders'},
      {id:'paddybills',icon:'📦',label:'Purchase'},
      {id:'ricebills',icon:'🍚',label:'Sales'},
      {id:'einvoices',icon:'🧾',label:'E-Invoices'},
      {id:'stock',icon:'📊',label:'Stock Manager'},
      {id:'freight',icon:'🚛',label:'Freight & Transport'},
    ]},
  ];

  const MORE_ITEMS=[
    {sec:'ACCOUNTS',items:[
      {id:'expenses',icon:'💸',label:'Expenses'},
      {id:'settlement',icon:'💵',label:'Settlement'},
    ]},
    {sec:'MASTERS',items:[
      {id:'parties',     icon:'👥',label:'Parties'},
      {id:'brokers',     icon:'🤵',label:'Brokers'},
      {id:'qualities',   icon:'📦',label:'Items'},
      {id:'warehouses',  icon:'🏭',label:'Warehouses'},
      {id:'fundings',    icon:'🏦',label:'Fundings'},
    ]},
    {sec:'SETTINGS',items:[
      {id:'firmsettings',icon:'⚙️',label:'Firm Settings'},
    ]},
  ];

  const allPages={
    einvoices:<EInvoices state={state} save={save}/>,
    firmsettings:<FirmSettings state={state} save={save}/>,
    cashregister:<CashRegister state={state} save={save}/>,
    dashboard:<Dashboard state={state} setPage={setPage}/>,
    parties:<Parties state={state} save={save}/>,
    brokers:<Brokers state={state} save={save}/>,
    partnership:<Partnership state={state} save={save}/>,
    expenses:<Expenses state={state} save={save}/>,
    payments:<Payments state={state} save={save}/>,
    ledger:<Ledger state={state}/>,
    qualities:<Items state={state} save={save}/>,
    warehouses:<Warehouses state={state} save={save}/>,
    fundings:<Fundings state={state} save={save}/>,
    stock:<StockManager state={state}/>,
    paddybills:<PaddyBills state={state} save={save}/>,
    ricebills:<RiceSaleBills state={state} save={save}/>,
    freight:<FreightTransport state={state} save={save}/>,
    orders:<Orders state={state} save={save}/>,
    settlement:<Settlement state={state} save={save}/>,
  };

  const currentPageContent=allowedModules.includes(page)
    ? (allPages[page]||<div className="content"><p>Coming soon</p></div>)
    : <div className="content"><div className="empty"><div className="empty-ico">🔒</div><p>You don't have access to this section.</p></div></div>;

  return(
    <div className="app">
      {showAdmin&&isAdmin&&<AdminPanel currentUser={currentUser} onClose={()=>setShowAdmin(false)}/>}
      {showChangePw&&<ChangePasswordModal onClose={()=>setShowChangePw(false)}/>}

      {/* ── Company Switch Overlay ── */}
      {showCompanySwitch&&(
        <div className="overlay" style={{zIndex:200}}>
          <div className="modal" style={{maxWidth:460}}>
            <div className="mhead">
              <h3>🏭 Switch Company</h3>
              <button className="xbtn" onClick={()=>setShowCompanySwitch(false)}>✕</button>
            </div>
            <div className="mbody">
              <div style={{marginBottom:14,padding:'10px 14px',background:'var(--surface2)',borderRadius:8,fontSize:13,color:'var(--text2)'}}>
                Currently working in: <b style={{color:'var(--primary)'}}>{currentCompany?.name}</b>
              </div>
              <p style={{fontSize:13,color:'var(--text3)',marginBottom:16}}>Click below to go to the company selector and switch to a different company or create a new one.</p>
              <button className="btn btn-primary" style={{width:'100%',justifyContent:'center',padding:10}} onClick={switchCompany}>
                🔄 Go to Company Selector

            </div>
            {showMore&&<div style={{borderLeft:'2px solid rgba(255,255,255,.12)',marginLeft:14,paddingLeft:4}}>

                return <div key={si}>

                    </div>
                  ))}

          </div>;
        })()}

        <div style={{flex:1}}/>

        {/* Bottom bar */}
        <div style={{padding:'10px 12px',borderTop:'1px solid rgba(255,255,255,.12)'}}>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:8}}>
            {syncPill()}
          </div>
          {isAdmin&&<div className="nav-item" style={{padding:'6px 8px',fontSize:12,background:'rgba(255,255,255,.08)',marginBottom:3}} onClick={()=>setShowAdmin(true)}>
            <span className="nav-icon">🛡️</span>Admin Panel

            Shubham Industries v5.0<br/>🏭 Multi-company · ☁️ Cloud Sync
          </div>
        </div>
      </div>

      <div className="main">
        {currentPageContent}
        {toast&&<div style={{position:'fixed',bottom:22,right:22,zIndex:9999,
          background:toast.type==='err'?'#fef2f2':'#f0fdf4',
          border:`1px solid ${toast.type==='err'?'#fca5a5':'#86efac'}`,
          color:toast.type==='err'?'var(--red)':'var(--green)',

          boxShadow:'0 4px 20px rgba(45,106,79,.18)',fontWeight:600}}>
          {toast.msg}
        </div>}
      </div>
    </div>
  );
}
/* ─── DASHBOARD ────────────────────────────────────────── */
function Dashboard({state,setPage}){
  const totalPaddyWt=state.paddyBills.reduce((s,b)=>s+b.items.reduce((ss,i)=>ss+i.totalWeight,0),0)/100;
  const totalPaddyVal=state.paddyBills.reduce((s,b)=>s+b.totalAmount,0);
  const totalSaleVal=state.riceSaleBills.reduce((s,b)=>s+b.totalAmount,0);
  const totalRiceSold=state.riceSaleBills.reduce((s,b)=>s+b.items.reduce((ss,i)=>ss+i.totalWeight,0),0)/100;
  const totalExp=state.expenses.reduce((s,e)=>s+e.amount,0);

  const stockByQ=state.qualities.filter(q=>q.type==='paddy').map(q=>{
    const bought=state.paddyBills.reduce((s,b)=>{
      const it=b.items.find(i=>i.qualityId===q.id);
      return s+(it?it.totalWeight/100:0);
    },0);
    return {name:q.name,qty:bought,val:bought*(q.baseRate||0)};
  }).filter(x=>x.qty>0);

  const riceStock=state.qualities.filter(q=>q.type==='rice').map(q=>{
    const sold=state.riceSaleBills.reduce((s,b)=>{
      const it=b.items.find(i=>i.qualityId===q.id);
      return s+(it?it.totalWeight/100:0);
    },0);
    return {name:q.name,sold,val:sold*(q.baseRate||0)};
  }).filter(x=>x.sold>0);

  return(
    <>
      <div className="topbar">
        <h2>Dashboard</h2>
        <span className="c-muted" style={{fontSize:12}}>{new Date().toLocaleDateString('en-IN',{weekday:'long',year:'numeric',month:'long',day:'numeric'})}</span>
      </div>
      <div className="content">
        <div className="g4 mb16">
          <div className="stat-card bl-accent">
            <div className="stat-lbl">Paddy Purchased</div>
            <div className="stat-val c-accent">{fmtQ(totalPaddyWt)}</div>
            <div className="stat-sub">{state.paddyBills.length} bills · {fmt(totalPaddyVal)}</div>
          </div>
          <div className="stat-card bl-teal">
            <div className="stat-lbl">Rice Sold</div>
            <div className="stat-val c-teal">{fmtQ(totalRiceSold)}</div>
            <div className="stat-sub">{state.riceSaleBills.length} bills · {fmt(totalSaleVal)}</div>
          </div>
          <div className="stat-card bl-green">
            <div className="stat-lbl">Net Revenue</div>
            <div className="stat-val c-green">{fmt(totalSaleVal-totalPaddyVal-totalExp)}</div>
            <div className="stat-sub">Sale − Purchase − Exp</div>
          </div>
          <div className="stat-card bl-red">
            <div className="stat-lbl">Total Expenses</div>
            <div className="stat-val c-red">{fmt(totalExp)}</div>
            <div className="stat-sub">{state.expenses.length} entries</div>
          </div>
        </div>

        <div className="g2 mb16">
          <div className="card">
            <div className="sec-hdr"><div className="sec-ttl">🌾 Paddy Stock (Purchased)</div><button className="btn btn-ghost btn-sm" onClick={()=>setPage('paddybills')}>View Bills →</button></div>
            {stockByQ.length===0
              ?<div className="empty"><div className="empty-ico">📦</div><p>No paddy purchased yet</p></div>
              :<div className="twrap"><table>
                <thead><tr><th>Quality</th><th>Qty (Q)</th><th>Est. Value</th></tr></thead>
                <tbody>{stockByQ.map(s=><tr key={s.name}>
                  <td><span className="pill p-orange">{s.name}</span></td>
                  <td className="bold c-accent">{s.qty.toFixed(2)}</td>
                  <td className="c-green">{fmt(s.val)}</td>
                </tr>)}</tbody>
              </table></div>
            }
          </div>
          <div className="card">
            <div className="sec-hdr"><div className="sec-ttl">🍚 Rice Sold (Summary)</div><button className="btn btn-ghost btn-sm" onClick={()=>setPage('ricebills')}>View Bills →</button></div>
            {riceStock.length===0
              ?<div className="empty"><div className="empty-ico">🍚</div><p>No rice sold yet</p></div>
              :<div className="twrap"><table>
                <thead><tr><th>Quality</th><th>Sold (Q)</th><th>Revenue</th></tr></thead>
                <tbody>{riceStock.map(s=><tr key={s.name}>
                  <td><span className="pill p-teal">{s.name}</span></td>
                  <td className="bold c-teal">{s.sold.toFixed(2)}</td>
                  <td className="c-green">{fmt(s.val)}</td>
                </tr>)}</tbody>
              </table></div>
            }
          </div>
        </div>

        <div className="card">
          <div className="sec-hdr"><div className="sec-ttl">Recent Activity</div></div>
          <div className="twrap"><table>
            <thead><tr><th>Type</th><th>Bill No</th><th>Date</th><th>Party</th><th>Amount</th><th>Status</th></tr></thead>
            <tbody>
              {[
                ...state.paddyBills.map(b=>({...b,_t:'Purchase'})),
                ...state.riceSaleBills.map(b=>({...b,_t:'Sale'})),
              ].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,8).map(b=>{
                const party=state.parties.find(p=>p.id===b.partyId);
                return <tr key={b.id}>
                  <td><span className={`pill ${b._t==='Purchase'?'p-orange':'p-teal'}`}>{b._t}</span></td>
                  <td className="bold c-accent">{b.billNo}</td>
                  <td className="c-muted">{b.date}</td>

                  <td className={`bold ${b._t==='Sale'?'c-teal':'c-red'}`}>{fmt(b.totalAmount)}</td>
                  <td><span className={`pill ${b.status==='paid'?'p-green':b.status==='partial'?'p-orange':'p-gray'}`}>{b.status}</span></td>
                </tr>;
              })}
            </tbody>
          </table></div>
        </div>
      </div>
    </>
  );
}

/* ─── PARTIES ──────────────────────────────────────────── */
function Parties({state,save}){
  const [srch,setSrch]=useState('');
  const [modal,setModal]=useState(null);
  const [form,setForm]=useState({name:'',nick:'',gst:'',type:'supplier',phone:'',address:''});
  const [err,setErr]=useState('');

  const list=state.parties.filter(p=>
    p.name.toLowerCase().includes(srch.toLowerCase())||
    (p.nick||'').toLowerCase().includes(srch.toLowerCase())||
    (p.gst||'').toLowerCase().includes(srch.toLowerCase())
  );

  const validate=()=>{
    if(!form.name.trim()) return 'Party name is required';
    if(form.gst){
      const dup=state.parties.find(p=>p.gst===form.gst&&p.id!==form.id);
      if(dup) return `GST already used by "${dup.name}"`;
    }
    return '';
  };
  const doSave=()=>{
    const e=validate(); if(e){setErr(e);return;}
    if(modal==='add') save(s=>({...s,parties:[...s.parties,{...form,id:uid()}]}));
    else save(s=>({...s,parties:s.parties.map(p=>p.id===form.id?form:p)}));
    setModal(null);
  };
  const del=id=>{if(confirm('Delete party?'))save(s=>({...s,parties:s.parties.filter(p=>p.id!==id)}));};

  return(
    <>
      <div className="topbar">
        <h2>Party Management</h2>
        <div className="topbar-right">
          <div className="swrap"><span className="sico">🔍</span>
            <input className="finput" style={{width:220}} placeholder="Search name, nick, GST..." value={srch} onChange={e=>setSrch(e.target.value)}/>
          </div>
          <button className="btn btn-primary" onClick={()=>{setForm({name:'',nick:'',gst:'',type:'supplier',phone:'',address:''});setErr('');setModal('add');}}>+ Add Party</button>
        </div>
      </div>
      <div className="content">
        <div className="twrap">
          <table>
            <thead><tr><th>#</th><th>Name</th><th>Nick</th><th>GST</th><th>Type</th><th>Phone</th><th>Address</th><th>Actions</th></tr></thead>
            <tbody>
              {list.length===0&&<tr><td colSpan={8}><div className="empty"><div className="empty-ico">👥</div><p>No parties found</p></div></td></tr>}
              {list.map((p,i)=>(
                <tr key={p.id}>
                  <td className="c-muted">{i+1}</td>
                  <td className="bold">{p.name}</td>
                  <td><span className="pill p-blue">{p.nick||'—'}</span></td>
                  <td className="mono c-muted" style={{fontSize:12}}>{p.gst||'—'}</td>
                  <td><span className={`pill ${p.type==='supplier'?'p-orange':p.type==='buyer'?'p-green':'p-blue'}`}>{p.type}</span></td>
                  <td>{p.phone||'—'}</td>
                  <td>{p.address||'—'}</td>
                  <td><div className="tda">
                    <button className="btn btn-ghost btn-sm" onClick={()=>{setForm({...p});setErr('');setModal('edit');}}>✏️</button>
                    <button className="btn btn-danger btn-sm" onClick={()=>del(p.id)}>🗑</button>
                  </div></td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
        {modal&&(
          <div className="overlay"><div className="modal">
            <div className="mhead"><h3>{modal==='add'?'Add Party':'Edit Party'}</h3><button className="xbtn" onClick={()=>setModal(null)}>✕</button></div>
            <div className="mbody">
              {err&&<div className="alert alert-err">{err}</div>}
              <div className="frow">
                <div className="fg"><label className="flbl">Party Name *</label><input className="finput" value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))} placeholder="Full name"/></div>
                <div className="fg"><label className="flbl">Nick Name</label><input className="finput" value={form.nick} onChange={e=>setForm(f=>({...f,nick:e.target.value}))} placeholder="Short name"/></div>
              </div>
              <div className="frow">
                <div className="fg"><label className="flbl">GST Number</label><input className="finput mono" value={form.gst} onChange={e=>setForm(f=>({...f,gst:e.target.value.toUpperCase()}))} placeholder="06AAACR5055K1Z5" maxLength={15}/></div>
                <div className="fg"><label className="flbl">Type</label>
                  <select className="fselect" value={form.type} onChange={e=>setForm(f=>({...f,type:e.target.value}))}>
                    <option value="supplier">Supplier</option><option value="buyer">Buyer</option>
                    <option value="both">Both</option><option value="transporter">Transporter</option><option value="labour">Labour</option>
                  </select>
                </div>
              </div>
              <div className="frow">
                <div className="fg"><label className="flbl">Phone</label><input className="finput" value={form.phone} onChange={e=>setForm(f=>({...f,phone:e.target.value}))} placeholder="Mobile"/></div>
                <div className="fg"><label className="flbl">Address</label><input className="finput" value={form.address} onChange={e=>setForm(f=>({...f,address:e.target.value}))} placeholder="City, State"/></div>
              </div>
            </div>
            <div className="mfoot">
              <button className="btn btn-ghost" onClick={()=>setModal(null)}>Cancel</button>
              <button className="btn btn-primary" onClick={doSave}>💾 Save</button>
            </div>
          </div></div>
        )}
      </div>
    </>
  );
}

/* ─── PARTNERSHIP ──────────────────────────────────────── */
function Partnership({state,save}){
  const [modal,setModal]=useState(null);
  const [selPartner,setSelPartner]=useState(null);
  const [form,setForm]=useState({partnerId:'',date:tod(),type:'bring',amount:'',note:'',mode:'cash',accountId:''});
  const [pform,setPform]=useState({name:'',share:50,phone:'',note:''});
  const [editPform,setEditPform]=useState({id:'',name:'',share:50,phone:'',note:''});
  const [err,setErr]=useState('');

  const partners=state.partners||[];
  const partnerEntries=state.partnerEntries||[];
  const cashAccounts=state.cashAccounts||[];

  // compute capital balance for a partner
  const bal=pid=>partnerEntries.filter(e=>e.partnerId===pid).reduce((s,e)=>s+(e.type==='bring'?+e.amount:-+e.amount),0);

  // save entry + also add to cash/bank register
  const saveEntry=()=>{
    if(!form.partnerId||!form.amount){setErr('Partner and amount are required');return;}
    if((form.mode==='cash'||form.mode==='bank')&&!form.accountId){setErr('Please select which cash/bank account');return;}
    setErr('');
    const entryId=uid();
    const amt=+form.amount;
    const partner=partners.find(p=>p.id===form.partnerId);
    const entry={id:entryId,partnerId:form.partnerId,date:form.date,type:form.type,amount:amt,note:form.note,mode:form.mode,accountId:form.accountId};

    save(s=>{
      let ns={...s,partnerEntries:[...s.partnerEntries,entry]};
      // Also record in cash/bank register as Capital entry
      if(form.accountId){
        const txnType=form.type==='bring'?'credit':'debit'; // partner brings in → credit our account
        const txn={
          id:uid(),date:form.date,accountId:form.accountId,
          type:txnType,
          category:'Capital',
          amount:amt,
          note:`${partner?.name||'Partner'} — ${form.type==='bring'?'Capital Brought In':'Capital Withdrawn'}${form.note?' ('+form.note+')':''}`,
          ref:`PRTNR-${entryId.slice(0,6).toUpperCase()}`,
          partyId:'',
          partnerEntryId:entryId,
        };
        ns={...ns,cashTransactions:[...(s.cashTransactions||[]),txn]};
      }
      return ns;
    });
    setModal(null);
    setForm({partnerId:'',date:tod(),type:'bring',amount:'',note:'',mode:'cash',accountId:''});
  };

  const addPartner=()=>{
    if(!pform.name){setErr('Name is required');return;}
    setErr('');
    save(s=>({...s,partners:[...s.partners,{...pform,id:uid()}]}));
    setModal(null);
  };

  const saveEditPartner=()=>{
    if(!editPform.name){setErr('Name is required');return;}
    setErr('');
    save(s=>({...s,partners:s.partners.map(p=>p.id===editPform.id?{...editPform}:p)}));
    setModal(null);
  };

  const delPartner=(id)=>{
    const hasEntries=(state.partnerEntries||[]).some(e=>e.partnerId===id);
    if(hasEntries&&!confirm('This partner has entries. Deleting will remove the partner but keep all ledger entries. Continue?'))return;
    if(!hasEntries&&!confirm('Delete this partner?'))return;
    save(s=>({...s,partners:s.partners.filter(p=>p.id!==id)}));
    if(selPartner===id) setSelPartner(null);
  };

  const delEntry=id=>{
    if(!confirm('Delete this entry? The linked cash/bank transaction will also be removed.'))return;
    // find linked entry to get accountId
    const entry=partnerEntries.find(e=>e.id===id);
    save(s=>{
      let ns={...s,partnerEntries:s.partnerEntries.filter(e=>e.id!==id)};
      // remove linked cash txn if any
      if(entry?.accountId){
        ns={...ns,cashTransactions:(s.cashTransactions||[]).filter(t=>t.partnerEntryId!==id)};
      }
      return ns;
    });
  };

  const selP=selPartner?partners.find(p=>p.id===selPartner):null;
  const selEntries=selPartner?partnerEntries.filter(e=>e.partnerId===selPartner).sort((a,b)=>b.date.localeCompare(a.date)):[];
  const selBal=selPartner?bal(selPartner):0;
  const selBrought=selEntries.filter(e=>e.type==='bring').reduce((s,e)=>s+(+e.amount),0);
  const selWithdrawn=selEntries.filter(e=>e.type==='take').reduce((s,e)=>s+(+e.amount),0);

  const PARTNER_COLORS=['#2d6a4f','#1a6ea8','#7b2d8b','#e07c2f','#c0392b','#1b7a6e','#d4840a'];

  return(
    <>
      <div className="topbar">
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          {selPartner&&<button className="btn btn-ghost btn-sm" onClick={()=>setSelPartner(null)}>← Back</button>}
          <h2>{selP?`🤝 ${selP.name} — Ledger`:'Partnership Accounts'}</h2>
        </div>
        <div className="topbar-right">
          {!selPartner&&<button className="btn btn-ghost" onClick={()=>{setPform({name:'',share:50,phone:'',note:''});setErr('');setModal('partner');}}>+ Add Partner</button>}
          <button className="btn btn-primary" onClick={()=>{setForm({partnerId:selPartner||'',date:tod(),type:'bring',amount:'',note:'',mode:'cash',accountId:''});setErr('');setModal('entry');}}>+ New Entry</button>
        </div>
      </div>
      <div className="content">

        {/* ── Overview: Partner Cards ── */}
        {!selPartner&&<>
          {partners.length===0&&<div className="empty"><div className="empty-ico">🤝</div><p>No partners yet. Click "+ Add Partner" to get started.</p></div>}
          <div className="g3 mb16">
            {partners.map((p,i)=>{
              const b=bal(p.id);
              const brought=partnerEntries.filter(e=>e.partnerId===p.id&&e.type==='bring').reduce((s,e)=>s+(+e.amount),0);
              const taken=partnerEntries.filter(e=>e.partnerId===p.id&&e.type==='take').reduce((s,e)=>s+(+e.amount),0);
              const col=PARTNER_COLORS[i%PARTNER_COLORS.length];
              return(
                <div key={p.id} onClick={()=>setSelPartner(p.id)}
                  className="card"
                  style={{cursor:'pointer',borderLeft:`4px solid ${col}`,transition:'box-shadow .15s,transform .15s',userSelect:'none'}}
                  onMouseEnter={e=>{e.currentTarget.style.boxShadow='0 4px 20px rgba(0,0,0,.12)';e.currentTarget.style.transform='translateY(-2px)';}}
                  onMouseLeave={e=>{e.currentTarget.style.boxShadow='';e.currentTarget.style.transform='';}}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:12}}>
                    <div>
                      <div style={{fontSize:18,fontWeight:800,fontFamily:'Plus Jakarta Sans',color:col}}>{p.name}</div>
                      <div style={{fontSize:11,color:'var(--text3)',marginTop:2}}>{p.share}% profit share{p.phone?' · '+p.phone:''}</div>
                    </div>
                    <span style={{fontSize:22}}>🤝</span>
                  </div>
                  <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:10}}>
                    <div style={{background:'var(--green-dim)',borderRadius:8,padding:'8px 10px'}}>
                      <div style={{fontSize:10,fontWeight:700,color:'var(--green)',textTransform:'uppercase',letterSpacing:.7}}>Brought In</div>
                      <div style={{fontSize:15,fontWeight:700,color:'var(--green)'}}>{fmt(brought)}</div>
                    </div>
                    <div style={{background:'var(--red-dim)',borderRadius:8,padding:'8px 10px'}}>
                      <div style={{fontSize:10,fontWeight:700,color:'var(--red)',textTransform:'uppercase',letterSpacing:.7}}>Withdrawn</div>
                      <div style={{fontSize:15,fontWeight:700,color:'var(--red)'}}>{fmt(taken)}</div>
                    </div>
                  </div>

/* ─── EXPENSES ─────────────────────────────────────────── */
function Expenses({state,save}){
  const [srch,setSrch]=useState('');
  const [modal,setModal]=useState(false);
  const [form,setForm]=useState({date:tod(),category:'Rejected Gaadi',amount:'',note:'',partyId:'',mode:'cash'});
  const list=state.expenses.filter(e=>e.category.toLowerCase().includes(srch.toLowerCase())||e.note?.toLowerCase().includes(srch.toLowerCase()));
  const total=state.expenses.reduce((s,e)=>s+e.amount,0);
  const byCat=state.expenses.reduce((a,e)=>({...a,[e.category]:(a[e.category]||0)+e.amount}),{});
  const doSave=()=>{if(!form.amount)return;save(s=>({...s,expenses:[...s.expenses,{...form,amount:+form.amount,id:uid()}]}));setModal(false);};
  const del=id=>{if(confirm('Delete?'))save(s=>({...s,expenses:s.expenses.filter(e=>e.id!==id)}));};
  return(
    <>
      <div className="topbar"><h2>Expenses / Rejected Gaadi</h2>
        <div className="topbar-right">
          <div className="swrap"><span className="sico">🔍</span><input className="finput" style={{width:200}} placeholder="Search..." value={srch} onChange={e=>setSrch(e.target.value)}/></div>
          <button className="btn btn-primary" onClick={()=>{setForm({date:tod(),category:'Rejected Gaadi',amount:'',note:'',partyId:'',mode:'cash'});setModal(true);}}>+ Add Expense</button>
        </div>
      </div>
      <div className="content">
        <div className="g4 mb16">
          <div className="stat-card bl-red"><div className="stat-lbl">Total Expenses</div><div className="stat-val c-red">{fmt(total)}</div><div className="stat-sub">{state.expenses.length} entries</div></div>
          {Object.entries(byCat).slice(0,3).map(([c,a])=><div key={c} className="stat-card"><div className="stat-lbl">{c}</div><div className="stat-val">{fmt(a)}</div><div className="stat-sub">{total>0?((a/total)*100).toFixed(1):0}%</div></div>)}
        </div>
        <div className="card">
          <div className="twrap"><table>
            <thead><tr><th>Date</th><th>Category</th><th>Party</th><th>Amount</th><th>Mode</th><th>Note</th><th></th></tr></thead>
            <tbody>
              {list.length===0&&<tr><td colSpan={7}><div className="empty"><div className="empty-ico">💸</div><p>No expenses</p></div></td></tr>}
              {list.map(e=>{const p=state.parties.find(pp=>pp.id===e.partyId);return(
                <tr key={e.id}>
                  <td className="c-muted">{e.date}</td>
                  <td><span className="pill p-red">{e.category}</span></td>
                  <td>{p?.name||'—'}</td>
                  <td className="c-red bold">{fmt(e.amount)}</td>
                  <td>{e.mode||'—'}</td><td>{e.note}</td>
                  <td><button className="btn btn-danger btn-xs" onClick={()=>del(e.id)}>🗑</button></td>
                </tr>
              );})}
            </tbody>
          </table></div>
        </div>
        {modal&&<div className="overlay"><div className="modal">
          <div className="mhead"><h3>Add Expense</h3><button className="xbtn" onClick={()=>setModal(false)}>✕</button></div>
          <div className="mbody">
            <div className="frow">
              <div className="fg"><label className="flbl">Date</label><input type="date" className="finput" value={form.date} onChange={e=>setForm(f=>({...f,date:e.target.value}))}/></div>
              <div className="fg"><label className="flbl">Category</label><select className="fselect" value={form.category} onChange={e=>setForm(f=>({...f,category:e.target.value}))}>{state.expenseCategories.map(c=><option key={c}>{c}</option>)}</select></div>
            </div>
            <div className="frow">
              <div className="fg"><label className="flbl">Amount (₹) *</label><input type="number" className="finput" value={form.amount} onChange={e=>setForm(f=>({...f,amount:e.target.value}))} placeholder="0"/></div>
              <div className="fg"><label className="flbl">Mode</label><select className="fselect" value={form.mode} onChange={e=>setForm(f=>({...f,mode:e.target.value}))}><option value="cash">Cash</option><option value="bank">Bank</option><option value="upi">UPI</option></select></div>
            </div>
            <div className="frow">
              <div className="fg"><label className="flbl">Party</label><select className="fselect" value={form.partyId} onChange={e=>setForm(f=>({...f,partyId:e.target.value}))}><option value="">None</option>{state.parties.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}</select></div>
              <div className="fg"><label className="flbl">Note</label><input className="finput" value={form.note} onChange={e=>setForm(f=>({...f,note:e.target.value}))} placeholder="Details..."/></div>
            </div>
          </div>
          <div className="mfoot"><button className="btn btn-ghost" onClick={()=>setModal(false)}>Cancel</button><button className="btn btn-primary" onClick={doSave}>💾 Save</button></div>
        </div></div>}
      </div>
    </>
  );
}

/* ─── PAYMENTS ─────────────────────────────────────────── */
function Payments({state,save}){
  const [date,setDate]=useState(tod());
  const [rows,setRows]=useState([blankRow()]);
  const [err,setErr]=useState('');

  function blankRow(mode='cash'){
    return {type:'received',forType:'party',forTypeText:'Party',forId:'',forIdText:'',category:'',amount:'',mode,note:''};
  }

  const forTypeOptions=[
    {value:'party',label:'Party'},
    {value:'bill',label:'Bills (Parties)'},
    {value:'funding',label:'Funding'},
    {value:'partner',label:'Partner'},
    {value:'freight',label:'Freight / Vehicle'},
  ];

  const list=(state.payments||[]).filter(p=>p.date===date);
  const received=list.filter(p=>p.type==='received').reduce((s,p)=>s+(+p.amount||0),0);
  const paid=list.filter(p=>p.type==='paid').reduce((s,p)=>s+(+p.amount||0),0);

  const billPartyIds=useMemo(()=>{
    const ids=new Set();
    (state.paddyBills||[]).forEach(b=>b.partyId&&ids.add(b.partyId));
    (state.riceSaleBills||[]).forEach(b=>b.partyId&&ids.add(b.partyId));
    return [...ids];
  },[state.paddyBills,state.riceSaleBills]);

  const billParties=useMemo(()=>{
    const map=new Map((state.parties||[]).map(p=>[p.id,p]));
    return billPartyIds.map(id=>map.get(id)).filter(Boolean);
  },[state.parties,billPartyIds]);

  const optionsForRow=(r)=>{
    const ft=r.forType||'party';
    if(ft==='funding') return (state.fundings||[]).map(a=>({id:a.id,label:a.name}));
    if(ft==='partner') return (state.partners||[]).map(p=>({id:p.id,label:p.name}));
    if(ft==='bill') return billParties.map(p=>({id:p.id,label:`${p.name} (${p.nick||p.name})`}));
    if(ft==='freight') return (state.vehicles||[]).map(v=>({id:v.id,label:`${v.vehicleNo} — ${v.ownerName}`}));
    return (state.parties||[]).map(p=>({id:p.id,label:`${p.name} (${p.nick||p.name})`}));
  };

  const forTypeLabel=(ft)=>{
    if(ft==='bill') return 'Bills (Parties)';
    if(ft==='funding') return 'Funding';
    if(ft==='partner') return 'Partner';
    if(ft==='freight') return 'Freight';
    return 'Party';
  };

  const displayNameForPayment=(p)=>{
    const ft=p.forType||'party';
    if(ft==='funding'){
      const a=(state.fundings||[]).find(x=>x.id===p.forId);
      return a?.name||'—';
    }
    if(ft==='partner'){
      const pr=(state.partners||[]).find(x=>x.id===p.forId);
      return pr?.name||'—';
    }
    if(ft==='freight'){
      const v=(state.vehicles||[]).find(x=>x.id===p.forId);
      return v?`${v.vehicleNo} (${v.ownerName})`:'—';
    }
    const party=(state.parties||[]).find(x=>x.id===p.partyId);
    return party?.name||'—';
  };

  const addCashRow=()=>setRows(r=>[...r,blankRow('cash')]);
  const addBankRow=()=>setRows(r=>[...r,blankRow('bank')]);
  const remRow=i=>setRows(r=>r.filter((_,idx)=>idx!==i));
  const upd=(i,k,v)=>setRows(r=>r.map((x,idx)=>idx===i?({...x,[k]:v}):x));

  const saveAll=()=>{
    setErr('');
    const clean=rows
      .map(r=>({
        ...r,
        type:r.type==='paid'?'paid':'received',
        forType:r.forType||'party',
        forId:r.forId||'',
        category:String(r.category||'').trim(),
        mode:r.mode||'cash',
        note:String(r.note||'').trim(),
        amount:+r.amount||0,
      }))
      .filter(r=>r.amount>0 || r.forId || r.category || r.note);

    if(clean.length===0){
      setErr('Add at least one payment entry.');
      return;
    }
    if(clean.some(r=>r.amount<=0)){
      setErr('Amount must be greater than 0 for all entries.');
      return;
    }
    if(clean.some(r=>!r.forId && !r.category)){
      setErr('Select a name (party/bill party/funding/partner) or enter a category for each entry.');
      return;
    }

    const toAdd=clean.map(r=>({
      id:uid(),
      date,
      type:r.type,
      forType:r.forType,
      forId:r.forId||null,
      partyId:(r.forType==='party'||r.forType==='bill') ? (r.forId||null) : null,
      vehicleId:(r.forType==='freight') ? (r.forId||null) : null,
      category:r.category||'',
      amount:r.amount,
      mode:r.mode,
      note:r.note||'',
    }));

    save(s=>({...s,payments:[...(s.payments||[]),...toAdd]}));
    setRows([blankRow()]);
  };

  const del=id=>{
    if(confirm('Delete?')) save(s=>({...s,payments:(s.payments||[]).filter(p=>p.id!==id)}));
  };

  return(
    <>
      <div className="topbar">
        <h2>Payments</h2>
        <div className="topbar-right">
          <div className="fg" style={{margin:0}}>
            <label className="flbl">Date</label>
            <input type="date" className="finput" value={date} onChange={e=>setDate(e.target.value)} style={{width:170}}/>
          </div>
          <button className="btn btn-ghost" onClick={()=>setRows([blankRow()])}>Reset rows</button>
          <button className="btn btn-primary" onClick={saveAll}>💾 Save all</button>
        </div>
      </div>
      <div className="content">
        {err&&<div className="alert alert-err mb16">{err}</div>}

        <div className="g4 mb16">
          <div className="stat-card bl-green"><div className="stat-lbl">Received ({date})</div><div className="stat-val c-green">{fmt(received)}</div><div className="stat-sub">{list.filter(x=>x.type==='received').length} entries</div></div>
          <div className="stat-card bl-red"><div className="stat-lbl">Paid ({date})</div><div className="stat-val c-red">{fmt(paid)}</div><div className="stat-sub">{list.filter(x=>x.type==='paid').length} entries</div></div>
          <div className="stat-card bl-accent"><div className="stat-lbl">Net</div><div className={`stat-val ${(received-paid)>=0?'c-green':'c-red'}`}>{fmt(Math.abs(received-paid))}</div><div className="stat-sub">{(received-paid)>=0?'Net received':'Net paid'}</div></div>
          <div className="stat-card"><div className="stat-lbl">Total entries</div><div className="stat-val">{list.length}</div><div className="stat-sub">For selected date</div></div>
        </div>

        <div className="card mb16">
          <div className="sec-hdr">
            <div className="sec-ttl">➕ Add multiple entries</div>
            <div className="flex gap8">
              <button className="btn btn-success btn-sm" onClick={addCashRow}>💵 Add Cash Entry</button>
              <button className="btn btn-blue btn-sm" onClick={addBankRow}>🏦 Add Bank Entry</button>
            </div>
          </div>
          <div className="twrap"><table>
            <thead>
              <tr>
                <th style={{width:90}}>Mode</th>
                <th style={{width:110}}>Type</th>
                <th style={{width:160}}>Payment For</th>
                <th>Name</th>
                <th>Category (if no party)</th>
                <th style={{width:140,textAlign:'right'}}>Amount (₹)</th>
                <th>Note</th>
                <th style={{width:60}}></th>
              </tr>
            </thead>
            <tbody>
              {rows.map((r,i)=>(
                <tr key={i}>
                  <td>
                    <span className={`pill ${r.mode==='bank'?'p-blue':'p-green'}`}>
                      {r.mode==='bank'?'🏦 Bank':'💵 Cash'}
                    </span>
                  </td>
                  <td>
                    <select className="fselect" value={r.type} onChange={e=>upd(i,'type',e.target.value)}>
                      <option value="received">Received</option>
                      <option value="paid">Paid</option>
                    </select>
                  </td>
                  <td>
                    <input
                      className="finput"
                      list={`ft-list-${i}`}
                      value={r.forTypeText!==undefined?r.forTypeText:forTypeLabel(r.forType||'party')}
                      placeholder="Party, Funding…"
                      onChange={e=>{
                        const txt=e.target.value;
                        const match=forTypeOptions.find(o=>o.label.toLowerCase()===txt.toLowerCase());
                        setRows(rs=>rs.map((x,idx)=>idx===i?{...x,forTypeText:txt,forType:match?match.value:x.forType,forId:'',forIdText:''}:x));
                      }}
                      onBlur={e=>{
                        const txt=e.target.value;
                        const match=forTypeOptions.find(o=>o.label.toLowerCase()===txt.toLowerCase());
                        if(match) setRows(rs=>rs.map((x,idx)=>idx===i?{...x,forTypeText:match.label,forType:match.value}:x));
                        else setRows(rs=>rs.map((x,idx)=>idx===i?{...x,forTypeText:forTypeLabel(x.forType)}:x));
                      }}
                    />
                    <datalist id={`ft-list-${i}`}>
                      {forTypeOptions.map(o=><option key={o.value} value={o.label}/>)}
                    </datalist>
                  </td>
                  <td>
                    {(()=>{
                      const opts=optionsForRow(r);
                      return(<>
                        <input
                          className="finput"
                          list={`name-list-${i}`}
                          value={r.forIdText!==undefined?r.forIdText:''}
                          placeholder="Type to search…"
                          onChange={e=>{
                            const txt=e.target.value;
                            const match=opts.find(o=>o.label.toLowerCase()===txt.toLowerCase());
                            setRows(rs=>rs.map((x,idx)=>idx===i?{...x,forIdText:txt,forId:match?match.id:''}:x));
                          }}
                          onBlur={e=>{
                            const txt=e.target.value;
                            const match=opts.find(o=>o.label.toLowerCase()===txt.toLowerCase());
                            if(match) setRows(rs=>rs.map((x,idx)=>idx===i?{...x,forIdText:match.label,forId:match.id}:x));
                          }}
                        />
                        <datalist id={`name-list-${i}`}>
                          {opts.map(o=><option key={o.id} value={o.label}/>)}
                        </datalist>
                      </>);
                    })()}
                  </td>
                  <td><input className="finput" value={r.category} onChange={e=>upd(i,'category',e.target.value)} placeholder="e.g. Labour, Diesel, Commission"/></td>
                  <td style={{textAlign:'right'}}><input type="number" className="finput" value={r.amount} onChange={e=>upd(i,'amount',e.target.value)} placeholder="0"/></td>
                  <td><input className="finput" value={r.note} onChange={e=>upd(i,'note',e.target.value)} placeholder="Remarks"/></td>
                  <td>
                    {rows.length>1&&<button className="btn btn-danger btn-xs btn-icon" onClick={()=>remRow(i)}>✕</button>}
                  </td>
                </tr>
              ))}
            </tbody>
          </table></div>
          <div className="c-muted mt8" style={{fontSize:12}}>
            Tip: You can enter many rows and click <b>Save all</b> once.
          </div>
        </div>

        <div className="card">
          <div className="sec-hdr"><div className="sec-ttl">📅 Payments on {date}</div></div>
          <div className="twrap"><table>
