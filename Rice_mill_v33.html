      const newItem={id:uid(),name,defaultPct:+expForm.defaultPct||0,fixedAmt:+expForm.fixedAmt||0};
      save(s=>{
        const all={...(s.itemExpenseTypes||{})};
        const grpObj={...(all[k]||{})};
        grpObj[expType]=[...(grpObj[expType]||[]),newItem];
        all[k]=grpObj;
        return {...s,itemExpenseTypes:all};
      });
    } else {
      save(s=>{
        const all={...(s.itemExpenseTypes||{})};
        const grpObj={...(all[k]||{})};
        grpObj[expType]=(grpObj[expType]||[]).map(e=>e.id===item.id?{...e,name,defaultPct:+expForm.defaultPct||0,fixedAmt:+expForm.fixedAmt||0}:e);
        all[k]=grpObj;
        return {...s,itemExpenseTypes:all};
      });
    }
    setExpModal(null);
  };

  const deleteExp=(expType,id)=>{
    if(!confirm('Delete this expense type? It will no longer appear in new bills.'))return;
    const k=itemExpKey(selItem);
    save(s=>{
      const all={...(s.itemExpenseTypes||{})};
      const grpObj={...(all[k]||{})};
      grpObj[expType]=(grpObj[expType]||[]).filter(e=>e.id!==id);
      all[k]=grpObj;
      return {...s,itemExpenseTypes:all};
    });
  };

  /* ── Merge itemCategories + groups from qualities ── */
  const allGroups = useMemo(()=>{
    const fromQualities = itemGroups;
    const fromCats = (state.itemCategories||[]).filter(ic=>
      !fromQualities.some(g=>g.subtype===ic.name&&g.category===ic.category)
    ).map(ic=>({subtype:ic.name,category:ic.category,count:0}));
    return [...fromQualities,...fromCats].sort((a,b)=>a.subtype.localeCompare(b.subtype));
  },[itemGroups,state.itemCategories]);

  const selGrp = selItem ? allGroups.find(g=>g.subtype===selItem.subtype&&g.category===selItem.category) : null;

  /* ── Expense type table renderer ── */
  const ExpTable=({expType,types})=>(
    <div className="card">
      <div className="sec-hdr mb12">
        <div>
          <div className="sec-ttl">{expType==='purchase'?'🌾 Purchase Expense Types':'🍚 Sale Expense Types'}</div>
          <div style={{fontSize:12,color:'var(--text3)',marginTop:3}}>
            {expType==='purchase'
              ?'These appear as deduction/charge options inside Paddy Purchase bills.'
              :'These appear as deduction options inside Rice Sale bills.'}
          </div>
        </div>
        <button className="btn btn-primary btn-sm" onClick={()=>openAddExp(expType)}>+ Add Type</button>
      </div>
      {types.length===0
        ?<div className="empty"><div className="empty-ico">{expType==='purchase'?'🌾':'🍚'}</div><p>No expense types yet. Click <b>+ Add Type</b> to create one.</p></div>
        :<div className="twrap"><table>
          <thead><tr><th>#</th><th>Name</th><th style={{textAlign:'right'}}>Default %</th><th style={{textAlign:'right'}}>Fixed Amt (₹)</th><th>Actions</th></tr></thead>
          <tbody>
            {types.map((e,i)=>(
              <tr key={e.id}>
                <td className="c-muted" style={{fontSize:12}}>{i+1}</td>
                <td className="bold">{e.name}</td>
                <td className="c-muted" style={{textAlign:'right'}}>{e.defaultPct>0?e.defaultPct+'%':'—'}</td>
                <td className="c-muted" style={{textAlign:'right'}}>{e.fixedAmt>0?fmt(e.fixedAmt):'—'}</td>
                <td><div className="tda">
                  <button className="btn btn-ghost btn-xs" onClick={()=>openEditExp(expType,e)}>✏️</button>
                  <button className="btn btn-danger btn-xs" onClick={()=>deleteExp(expType,e.id)}>🗑</button>
                </div></td>
              </tr>
            ))}
          </tbody>
          <tfoot><tr>
            <td colSpan={5} style={{fontSize:11,color:'var(--text3)',padding:'8px 13px'}}>
              {types.length} type{types.length!==1?'s':''} · These are used in the {expType==='purchase'?'Paddy Purchase':'Rice Sale'} bill form.
            </td>
          </tr></tfoot>
        </table></div>
      }
    </div>
  );

  /* ── determine which tabs show in detail ── */
  const detailTabs = selItem ? [

function Warehouses({state,save}){
  const [modal,setModal]=useState(false);       // 'godown' | 'transfer'
  const [gwForm,setGwForm]=useState({name:'',location:'',capacity:''});
  const [selW,setSelW]=useState('');
  const [detailTab,setDetailTab]=useState('all'); // 'all'|'bills'|'transfers'

  // ── shared filters (apply to bills tabs) ──
  const [fParty,setFParty]=useState('');
  const [fQuality,setFQuality]=useState('');
  const [fDateFrom,setFDateFrom]=useState('');
  const [fDateTo,setFDateTo]=useState('');

  // ── transfer form state ──
  const blankTr=(fromId)=>({date:tod(),fromWarehouseId:fromId||'',toWarehouseId:'',qualityId:'',bags:'',weightPerBag:50,vehicleId:'',freightAmt:'',advancePaid:'',note:''});
  const [trForm,setTrForm]=useState(blankTr());
  const [trErr,setTrErr]=useState('');
  const updTr=(k,v)=>setTrForm(f=>({...f,[k]:v}));

  // ── godown CRUD ──
  const delGodown=id=>{if(confirm('Delete warehouse?'))save(s=>({...s,warehouses:s.warehouses.filter(w=>w.id!==id)}));};
  const doSaveGodown=()=>{
    if(!gwForm.name)return;
    save(s=>({...s,warehouses:[...s.warehouses,{...gwForm,capacity:+gwForm.capacity,id:uid()}]}));
    setModal(false);
  };

  // ── transfer save ──
  const doSaveTransfer=()=>{
    if(!trForm.fromWarehouseId){setTrErr('Select source godown');return;}
    if(!trForm.toWarehouseId){setTrErr('Select destination godown');return;}
    if(trForm.fromWarehouseId===trForm.toWarehouseId){setTrErr('Source and destination cannot be the same');return;}
    if(!trForm.qualityId){setTrErr('Select paddy quality');return;}
    if(!(+trForm.bags>0)){setTrErr('Enter number of bags');return;}
    if(trForm.vehicleId&&!(+trForm.freightAmt>0)){setTrErr('Enter freight amount for selected vehicle');return;}
    setTrErr('');
    const transferId=uid();
    const ref='TR-'+Date.now().toString().slice(-6);
    const totalWeight=(+trForm.bags)*(+trForm.weightPerBag);
    const transfer={id:transferId,ref,date:trForm.date,fromWarehouseId:trForm.fromWarehouseId,toWarehouseId:trForm.toWarehouseId,qualityId:trForm.qualityId,bags:+trForm.bags,weightPerBag:+trForm.weightPerBag,totalWeight,vehicleId:trForm.vehicleId||null,freightAmt:+trForm.freightAmt||0,advancePaid:+trForm.advancePaid||0,note:trForm.note};
    save(s=>{
      let ns={...s,paddyTransfers:[...(s.paddyTransfers||[]),transfer]};
      if(trForm.vehicleId&&+trForm.freightAmt>0){
        const fromName=(s.warehouses||[]).find(w=>w.id===trForm.fromWarehouseId)?.name||'';
        const toName=(s.warehouses||[]).find(w=>w.id===trForm.toWarehouseId)?.name||'';
        ns={...ns,freightEntries:[...(ns.freightEntries||[]),{id:uid(),date:trForm.date,vehicleId:trForm.vehicleId,billRef:ref,billType:'transfer',tripType:'transfer',freightAmt:+trForm.freightAmt,advancePaid:+trForm.advancePaid||0,dihadiAmt:0,shortageAmt:0,shortageQty:0,note:`Transfer: ${fromName} → ${toName}${trForm.note?' · '+trForm.note:''}`,status:'unpaid',linkedTransferId:transferId}]};
      }
      return ns;
    });
    setTrForm(blankTr(trForm.fromWarehouseId));
    setModal(false);
  };
  const delTransfer=id=>{
    if(!confirm('Delete this transfer?'))return;
    save(s=>({...s,paddyTransfers:(s.paddyTransfers||[]).filter(t=>t.id!==id),freightEntries:(s.freightEntries||[]).filter(e=>e.linkedTransferId!==id)}));
  };

  // ── bill rows for selected godown ──
  const billRows=useMemo(()=>{
    if(!selW)return[];
    const result=[];
    (state.paddyBills||[]).forEach(bill=>{
      if(bill.warehouseId!==selW)return;
      const party=state.parties.find(p=>p.id===bill.partyId);
      const fe=(state.freightEntries||[]).find(e=>e.linkedBillId===bill.id);
      const veh=(fe?(state.vehicles||[]).find(v=>v.id===fe.vehicleId):null)||(bill.freight?.vehicleId?(state.vehicles||[]).find(v=>v.id===bill.freight.vehicleId):null);
      bill.items.forEach(item=>{
        const quality=state.qualities.find(q=>q.id===item.qualityId);
        result.push({type:'bill',billNo:bill.billNo,date:bill.date,party,quality,bags:item.bags,weightPerBag:item.weightPerBag,totalWeight:item.totalWeight,quintals:item.totalWeight/100,rate:item.rate,amount:item.amount,vehicle:veh,status:bill.status});
      });
    });
    return result;
  },[selW,state.paddyBills,state.parties,state.qualities,state.freightEntries,state.vehicles]);

  // ── transfer rows for selected godown (inbound + outbound) ──
  const transferRows=useMemo(()=>{
    if(!selW)return[];
    return (state.paddyTransfers||[])
      .filter(t=>t.fromWarehouseId===selW||t.toWarehouseId===selW)
      .map(t=>{
        const fromW=state.warehouses.find(w=>w.id===t.fromWarehouseId);
        const toW=state.warehouses.find(w=>w.id===t.toWarehouseId);
        const quality=state.qualities.find(q=>q.id===t.qualityId);
        const vehicle=(state.vehicles||[]).find(v=>v.id===t.vehicleId);
        const dir=t.fromWarehouseId===selW?'out':'in';
        const quintals=(+t.totalWeight||0)/100;
        return{...t,fromW,toW,quality,vehicle,dir,quintals};
      })
      .sort((a,b)=>b.date.localeCompare(a.date));
  },[selW,state.paddyTransfers,state.warehouses,state.qualities,state.vehicles]);

  // ── apply filters to bill rows ──
  const applyFilters=rows=>{
    let r=[...rows];
    if(fParty) r=r.filter(x=>x.party?.id===fParty);
    if(fQuality) r=r.filter(x=>x.quality?.id===fQuality);
    if(fDateFrom) r=r.filter(x=>x.date>=fDateFrom);
    if(fDateTo) r=r.filter(x=>x.date<=fDateTo);
    return r;
  };
  const filteredBills=useMemo(()=>applyFilters(billRows),[billRows,fParty,fQuality,fDateFrom,fDateTo]);

  // ── combined "all" rows (bills + transfers) ──
  const allRows=useMemo(()=>{
    const tRows=transferRows.map(t=>({
      type:'transfer',ref:t.ref,date:t.date,dir:t.dir,
      fromW:t.fromW,toW:t.toW,quality:t.quality,
      bags:t.bags,weightPerBag:t.weightPerBag,totalWeight:t.totalWeight,
      quintals:t.totalWeight/100,vehicle:t.vehicle,freightAmt:t.freightAmt,id:t.id,
    }));
    return [...filteredBills.map(r=>({...r,type:'bill'})),...tRows]
      .sort((a,b)=>b.date.localeCompare(a.date));
  },[filteredBills,transferRows]);

  const selectedWarehouse=state.warehouses.find(w=>w.id===selW);
  const billsQ=billRows.reduce((s,r)=>s+r.quintals,0);
  const trIn=transferRows.filter(t=>t.dir==='in').reduce((s,t)=>s+t.quintals,0);
  const trOut=transferRows.filter(t=>t.dir==='out').reduce((s,t)=>s+t.quintals,0);
  const netQ=billsQ+trIn-trOut;
  const capacityPct=selectedWarehouse?.capacity>0?(netQ/selectedWarehouse.capacity*100):0;

  const partiesInW=[...new Map(billRows.map(r=>[r.party?.id,r.party])).values()].filter(Boolean);
  const qualitiesInW=[...new Map(billRows.map(r=>[r.quality?.id,r.quality])).values()].filter(Boolean);
  const hasFilters=fParty||fQuality||fDateFrom||fDateTo;
  const clearFilters=()=>{setFParty('');setFQuality('');setFDateFrom('');setFDateTo('');};

  // ── when selecting a new godown, reset tabs & form ──
  const selectGodown=id=>{
    setSelW(id===selW?'':id);
    setDetailTab('all');
    setTrForm(f=>({...blankTr(id===selW?'':id),toWarehouseId:''}));
    setTrErr('');
  };

  // ── summary stats for selected bills tab ──
  const sumBags=filteredBills.reduce((s,r)=>s+r.bags,0);
  const sumWt=filteredBills.reduce((s,r)=>s+r.totalWeight,0);
  const sumQ=sumWt/100;
  const sumAmt=filteredBills.reduce((s,r)=>s+r.amount,0);

  const trKgPreview=(+trForm.bags||0)*(+trForm.weightPerBag||0);

  // ── Bill table renderer (shared between 'all' bills section and 'bills' tab) ──
  const BillRow=({r})=>(
    <tr>
      <td className="bold c-accent">{r.billNo}</td>
      <td className="c-muted" style={{fontSize:12}}>{r.date}</td>
      <td><div className="bold" style={{fontSize:13}}>{r.party?.name||'—'}</div>{r.party?.nick&&<div className="c-muted" style={{fontSize:11}}>{r.party.nick}</div>}</td>
      <td><span className="pill p-orange">{r.quality?.name||'—'}</span></td>
      <td className="bold" style={{textAlign:'right'}}>{r.bags}</td>
      <td className="c-muted" style={{textAlign:'right'}}>{r.weightPerBag} kg</td>
      <td className="bold" style={{textAlign:'right'}}>{r.totalWeight.toLocaleString()}</td>
      <td className="c-accent bold" style={{textAlign:'right'}}>{r.quintals.toFixed(2)}</td>
      <td className="c-muted" style={{textAlign:'right'}}>{fmt(r.rate)}</td>
      <td className="c-green bold" style={{textAlign:'right'}}>{fmt(r.amount)}</td>
      <td>{r.vehicle?<div><div className="bold" style={{fontSize:12}}>{r.vehicle.vehicleNo}</div><div className="c-muted" style={{fontSize:11}}>{r.vehicle.ownerName}</div></div>:<span className="c-muted" style={{fontSize:12}}>—</span>}</td>
      <td><span className={`pill ${r.status==='paid'?'p-green':r.status==='partial'?'p-orange':'p-gray'}`}>{r.status}</span></td>
    </tr>
  );

  return(
    <>
      <div className="topbar">
        <h2>🏭 Godown / Warehouses</h2>
        <div className="topbar-right">
          {selW&&<button className="btn btn-teal" onClick={()=>{setTrForm(blankTr(selW));setTrErr('');setModal('transfer');}}>🔄 New Transfer</button>}
          <button className="btn btn-primary" onClick={()=>{setGwForm({name:'',location:'',capacity:''});setModal('godown');}}>+ Add Godown</button>
        </div>
      </div>
      <div className="content">

        {/* ── Godown Cards ── */}
        <div className="g3 mb16">
          {state.warehouses.map(w=>{
            const wBills=(state.paddyBills||[]).filter(b=>b.warehouseId===w.id);
            const wQ=wBills.reduce((s,b)=>s+b.items.reduce((ss,i)=>ss+i.totalWeight,0),0)/100;
            const wTrIn=(state.paddyTransfers||[]).filter(t=>t.toWarehouseId===w.id).reduce((s,t)=>s+t.totalWeight/100,0);
            const wTrOut=(state.paddyTransfers||[]).filter(t=>t.fromWarehouseId===w.id).reduce((s,t)=>s+t.totalWeight/100,0);
            const wNetQ=wQ+wTrIn-wTrOut;
            const pct=w.capacity>0?(wNetQ/w.capacity*100):0;
            const isSelected=selW===w.id;
            return(
              <div key={w.id} className={`stat-card ${isSelected?'bl-accent':'bl-blue'}`}
                style={{cursor:'pointer',outline:isSelected?'2px solid var(--accent)':'none',transition:'outline .12s'}}
                onClick={()=>selectGodown(w.id)}>
                <div className="fxb">
                  <div className="stat-lbl">🏭 {w.name}</div>
                  {isSelected&&<span className="pill p-orange" style={{fontSize:10}}>VIEWING</span>}
                </div>
                <div className={`stat-val ${isSelected?'c-accent':'c-blue'}`}>{wNetQ.toFixed(1)} Q</div>
                <div className="stat-sub">Capacity: {w.capacity.toLocaleString()} Q · 📍{w.location}</div>
                <div className="sr-bar mt8"><div className="sr-fill" style={{background:isSelected?'var(--accent)':'var(--blue)',width:`${Math.min(pct,100)}%`}}/></div>
                <div className="fxb mt8">
                  <span className="c-muted" style={{fontSize:11}}>{pct.toFixed(1)}% full · {wBills.length} bills</span>
                  <button className="btn btn-danger btn-xs" onClick={e=>{e.stopPropagation();delGodown(w.id);}}>🗑</button>
                </div>
              </div>
            );
          })}
          {state.warehouses.length===0&&<div className="empty" style={{gridColumn:'1/-1'}}><div className="empty-ico">🏭</div><p>No godowns added yet.</p></div>}
        </div>

        {/* ── Detail Panel ── */}
        {selW&&<>
          {/* Godown header + capacity bar */}
          <div className="card mb16">
            <div className="fxb mb10">
              <div>
                <div className="sec-ttl">📋 {selectedWarehouse?.name}</div>
                <div className="c-muted" style={{fontSize:12,marginTop:3}}>
                  📍 {selectedWarehouse?.location} · Capacity {selectedWarehouse?.capacity?.toLocaleString()} Q ·
                  <span className="c-accent bold"> {netQ.toFixed(2)} Q net</span>
                  <span className="c-muted"> (Bills: {billsQ.toFixed(1)} Q + In: {trIn.toFixed(1)} Q − Out: {trOut.toFixed(1)} Q)</span>
                </div>
              </div>
            </div>
            <div className="sr-bar mb12" style={{height:8,borderRadius:4}}>
              <div className="sr-fill" style={{background:capacityPct>90?'var(--red)':capacityPct>70?'var(--accent)':'var(--green)',width:`${Math.min(capacityPct,100)}%`,height:8,borderRadius:4}}/>
            </div>
            {/* Filters — shown only on bill-related tabs */}
            {detailTab!=='transfers'&&<div className="frow" style={{alignItems:'flex-end'}}>
              <div className="fg" style={{margin:0}}>
                <label className="flbl">Party</label>
                <select className="fselect" value={fParty} onChange={e=>setFParty(e.target.value)}>
                  <option value="">All Parties</option>
                  {partiesInW.map(p=><option key={p.id} value={p.id}>{p.name}{p.nick?` (${p.nick})`:''}</option>)}
                </select>
              </div>
              <div className="fg" style={{margin:0}}>
                <label className="flbl">Quality</label>
                <select className="fselect" value={fQuality} onChange={e=>setFQuality(e.target.value)}>
                  <option value="">All Qualities</option>
                  {qualitiesInW.map(q=><option key={q.id} value={q.id}>{q.name}</option>)}
                </select>
              </div>
              <div className="fg" style={{margin:0}}>
                <label className="flbl">Date From</label>
                <input type="date" className="finput" value={fDateFrom} onChange={e=>setFDateFrom(e.target.value)}/>
              </div>
              <div className="fg" style={{margin:0}}>
                <label className="flbl">Date To</label>
                <input type="date" className="finput" value={fDateTo} onChange={e=>setFDateTo(e.target.value)}/>
              </div>
              {hasFilters&&<button className="btn btn-ghost btn-sm" style={{height:36,marginBottom:0}} onClick={clearFilters}>✕ Clear</button>}
            </div>}
          </div>

          {/* 3 Tabs */}
          <div className="tabs">
            <div className={`tab ${detailTab==='all'?'on':''}`} onClick={()=>setDetailTab('all')}>📋 All Entries</div>
            <div className={`tab ${detailTab==='bills'?'on':''}`} onClick={()=>setDetailTab('bills')}>📦 Paddy Bills {filteredBills.length>0&&`(${filteredBills.length})`}</div>
            <div className={`tab ${detailTab==='transfers'?'on':''}`} onClick={()=>setDetailTab('transfers')}>🔄 Transfers {transferRows.length>0&&`(${transferRows.length})`}</div>
          </div>

          {/* ── TAB: All Entries ── */}
          {detailTab==='all'&&(()=>{
            const allBags=allRows.reduce((s,r)=>s+r.bags,0);
            const allWt=allRows.reduce((s,r)=>s+(+r.totalWeight||0),0);
            const allQ=allWt/100;
            return <div className="card">
            <div className="twrap"><table>
              <thead><tr>
                <th>Ref / Bill</th><th>Date</th><th>Party / Route</th><th>Type</th><th>Quality</th>
                <th style={{textAlign:'right'}}>Bags</th><th style={{textAlign:'right'}}>KG</th>
                <th style={{textAlign:'right'}}>Quintals</th><th style={{textAlign:'right'}}>Amount / Freight</th>
                <th>Vehicle</th><th>Status</th>
              </tr></thead>
              <tbody>
                {allRows.length===0&&<tr><td colSpan={11}><div className="empty"><div className="empty-ico">📦</div><p>No entries for this godown.</p></div></td></tr>}
                {allRows.map((r,i)=>r.type==='bill'?(
                  <tr key={i}>
                    <td className="bold c-accent">{r.billNo}</td>
                    <td className="c-muted" style={{fontSize:12}}>{r.date}</td>
                    <td><div className="bold" style={{fontSize:13}}>{r.party?.name||'—'}</div>{r.party?.nick&&<div className="c-muted" style={{fontSize:11}}>{r.party.nick}</div>}</td>
                    <td><span className="pill p-orange">📦 Bill</span></td>
                    <td><span className="pill p-orange">{r.quality?.name||'—'}</span></td>
                    <td className="bold" style={{textAlign:'right'}}>{r.bags}</td>
                    <td style={{textAlign:'right'}}>{r.totalWeight.toLocaleString()}</td>
                    <td className="c-accent bold" style={{textAlign:'right'}}>{r.quintals.toFixed(2)}</td>
                    <td className="c-green bold" style={{textAlign:'right'}}>{fmt(r.amount)}</td>
                    <td>{r.vehicle?<div><div className="bold" style={{fontSize:12}}>{r.vehicle.vehicleNo}</div><div className="c-muted" style={{fontSize:11}}>{r.vehicle.ownerName}</div></div>:<span className="c-muted" style={{fontSize:12}}>—</span>}</td>
                    <td><span className={`pill ${r.status==='paid'?'p-green':r.status==='partial'?'p-orange':'p-gray'}`}>{r.status}</span></td>
                  </tr>
                ):(
                  <tr key={i} style={{background:r.dir==='in'?'rgba(45,106,79,0.03)':'rgba(192,57,43,0.03)'}}>
                    <td><span className="pill p-purple">{r.ref}</span></td>
                    <td className="c-muted" style={{fontSize:12}}>{r.date}</td>
                    <td><span className="c-muted" style={{fontSize:12}}>{r.fromW?.name||'—'} → {r.toW?.name||'—'}</span></td>
                    <td><span className={`pill ${r.dir==='in'?'p-green':'p-red'}`}>{r.dir==='in'?'⬇ In (+)':'⬆ Out (−)'}</span></td>
                    <td><span className="pill p-orange">{r.quality?.name||'—'}</span></td>
                    <td className={`bold ${r.dir==='in'?'c-green':'c-red'}`} style={{textAlign:'right'}}>{r.dir==='in'?'+':'-'}{r.bags}</td>
                    <td className={r.dir==='in'?'c-green':'c-red'} style={{textAlign:'right'}}>{r.dir==='in'?'+':'-'}{(+r.totalWeight||0).toLocaleString()}</td>
                    <td className={`bold ${r.dir==='in'?'c-green':'c-red'}`} style={{textAlign:'right'}}>{r.dir==='in'?'+':'-'}{r.quintals.toFixed(2)}</td>
                    <td className="c-teal" style={{textAlign:'right'}}>{r.freightAmt>0?fmt(r.freightAmt):'—'}</td>
                    <td>{r.vehicle?<div><div className="bold" style={{fontSize:12}}>{r.vehicle.vehicleNo}</div><div className="c-muted" style={{fontSize:11}}>{r.vehicle.ownerName}</div></div>:<span className="c-muted" style={{fontSize:12}}>—</span>}</td>
                    <td>—</td>
                  </tr>
                ))}
              </tbody>
              {allRows.length>0&&(()=>{
                const netBags=allRows.reduce((s,r)=>r.type==='bill'?s+r.bags:(r.dir==='in'?s+r.bags:s-r.bags),0);
                const netWt=allRows.reduce((s,r)=>r.type==='bill'?s+(+r.totalWeight||0):(r.dir==='in'?s+(+r.totalWeight||0):s-(+r.totalWeight||0)),0);
                const netQ=netWt/100;
                return <tfoot><tr style={{background:'var(--surface3)',fontWeight:700}}>
                  <td colSpan={5} className="bold">NET TOTAL</td>
                  <td className={`bold ${netBags>=0?'c-green':'c-red'}`} style={{textAlign:'right'}}>{netBags>=0?'+':''}{netBags.toLocaleString()}</td>
                  <td className={`bold ${netWt>=0?'c-green':'c-red'}`} style={{textAlign:'right'}}>{netWt>=0?'+':''}{netWt.toLocaleString()}</td>
                  <td className={`bold ${netQ>=0?'c-accent':'c-red'}`} style={{textAlign:'right'}}>{netQ>=0?'+':''}{netQ.toFixed(2)}</td>
                  <td colSpan={3}></td>
                </tr></tfoot>;
              })()}
            </table></div>
          </div>;
          })()}

          {/* ── TAB: Paddy Bills ── */}
          {detailTab==='bills'&&<div className="card">
            <div className="twrap"><table>
              <thead><tr>
                <th>Bill No</th><th>Date</th><th>Party</th><th>Quality</th>
                <th style={{textAlign:'right'}}>Bags</th><th style={{textAlign:'right'}}>Wt/Bag</th>
                <th style={{textAlign:'right'}}>Total KG</th><th style={{textAlign:'right'}}>Quintals</th>
                <th style={{textAlign:'right'}}>Rate/Q</th><th style={{textAlign:'right'}}>Amount</th>
                <th>Vehicle</th><th>Status</th>
              </tr></thead>
              <tbody>
                {filteredBills.length===0&&<tr><td colSpan={12}><div className="empty"><div className="empty-ico">📦</div><p>{billRows.length===0?'No paddy bills for this godown.':'No bills match the filters.'}</p></div></td></tr>}
                {filteredBills.map((r,i)=><BillRow key={i} r={r}/>)}
              </tbody>
              {filteredBills.length>0&&<tfoot><tr style={{background:'var(--surface3)',fontWeight:700}}>
                <td colSpan={4} className="bold">TOTAL{hasFilters&&<span className="c-muted" style={{fontWeight:400,fontSize:11,marginLeft:6}}>(filtered)</span>}</td>
                <td className="bold" style={{textAlign:'right'}}>{sumBags}</td><td></td>
                <td className="bold" style={{textAlign:'right'}}>{sumWt.toLocaleString()}</td>
                <td className="c-accent bold" style={{textAlign:'right'}}>{sumQ.toFixed(2)}</td><td></td>
                <td className="c-green bold" style={{textAlign:'right'}}>{fmt(sumAmt)}</td>
                <td colSpan={2}></td>
              </tr></tfoot>}
            </table></div>
          </div>}

          {/* ── TAB: Transfers ── */}
          {detailTab==='transfers'&&<div className="card">
            <div className="twrap"><table>
              <thead><tr>
                <th>Ref</th><th>Date</th><th>Direction</th><th>From → To</th><th>Quality</th>
                <th style={{textAlign:'right'}}>Bags</th><th style={{textAlign:'right'}}>Quintals</th>
                <th>Vehicle</th><th style={{textAlign:'right'}}>Freight ₹</th><th>Note</th><th></th>
              </tr></thead>
              <tbody>
                {transferRows.length===0&&<tr><td colSpan={11}><div className="empty"><div className="empty-ico">🔄</div><p>No transfers for this godown yet. Click "🔄 New Transfer" in the top bar.</p></div></td></tr>}
                {transferRows.map((r,i)=>(
                  <tr key={i}>
                    <td><span className="pill p-purple">{r.ref}</span></td>
                    <td className="c-muted" style={{fontSize:12}}>{r.date}</td>
                    <td><span className={`pill ${r.dir==='in'?'p-green':'p-red'}`}>{r.dir==='in'?'⬇ IN':'⬆ OUT'}</span></td>
                    <td><div style={{fontSize:12}}><span className="c-muted">{r.fromW?.name||'—'}</span><span className="c-muted"> → </span><span className="bold" style={{color:'var(--teal)'}}>{r.toW?.name||'—'}</span></div></td>
                    <td><span className="pill p-orange">{r.quality?.name||'—'}</span></td>
                    <td className="bold" style={{textAlign:'right'}}>{r.bags}</td>
                    <td className="c-accent bold" style={{textAlign:'right'}}>{r.quintals.toFixed(2)}</td>
                    <td>{r.vehicle?<div><div className="bold" style={{fontSize:12}}>{r.vehicle.vehicleNo}</div><div className="c-muted" style={{fontSize:11}}>{r.vehicle.ownerName}</div></div>:<span className="c-muted" style={{fontSize:12}}>—</span>}</td>
                    <td className="c-teal" style={{textAlign:'right'}}>{r.freightAmt>0?fmt(r.freightAmt):'—'}</td>
                    <td className="c-muted" style={{fontSize:12,maxWidth:140,overflow:'hidden',textOverflow:'ellipsis'}}>{r.note||'—'}</td>
                    <td><button className="btn btn-danger btn-xs" onClick={()=>delTransfer(r.id)}>🗑</button></td>
                  </tr>
                ))}
              </tbody>
              {transferRows.length>0&&(()=>{
                const tBags=transferRows.reduce((s,t)=>s+t.bags,0);
                const tQ=transferRows.reduce((s,t)=>s+t.quintals,0);
                const tFr=transferRows.reduce((s,t)=>s+(+t.freightAmt||0),0);
                return <tfoot><tr style={{background:'var(--surface3)',fontWeight:700}}>
                  <td colSpan={5} className="bold">TOTAL</td>
                  <td className="bold" style={{textAlign:'right'}}>{tBags}</td>
                  <td className="c-accent bold" style={{textAlign:'right'}}>{tQ.toFixed(2)}</td>
                  <td></td>
                  <td className="c-teal bold" style={{textAlign:'right'}}>{fmt(tFr)}</td>
                  <td colSpan={2}></td>
                </tr></tfoot>;
              })()}
            </table></div>
          </div>}
        </>}

        {/* ── Add Godown Modal ── */}
        {modal==='godown'&&<div className="overlay"><div className="modal">
          <div className="mhead"><h3>Add Godown / Warehouse</h3><button className="xbtn" onClick={()=>setModal(false)}>✕</button></div>
          <div className="mbody">
            <div className="fg"><label className="flbl">Name</label><input className="finput" value={gwForm.name} onChange={e=>setGwForm(f=>({...f,name:e.target.value}))} placeholder="e.g. Godown A – Main"/></div>
            <div className="frow">
              <div className="fg"><label className="flbl">Location</label><input className="finput" value={gwForm.location} onChange={e=>setGwForm(f=>({...f,location:e.target.value}))} placeholder="e.g. Panipat"/></div>
              <div className="fg"><label className="flbl">Capacity (Q)</label><input type="number" className="finput" value={gwForm.capacity} onChange={e=>setGwForm(f=>({...f,capacity:e.target.value}))} placeholder="e.g. 5000"/></div>
            </div>
          </div>
          <div className="mfoot"><button className="btn btn-ghost" onClick={()=>setModal(false)}>Cancel</button><button className="btn btn-primary" onClick={doSaveGodown}>+ Add</button></div>
        </div></div>}

        {/* ── New Transfer Modal ── */}
        {modal==='transfer'&&<div className="overlay"><div className="modal modal-xl">
          <div className="mhead"><h3>🔄 New Paddy Transfer</h3><button className="xbtn" onClick={()=>setModal(false)}>✕</button></div>
          <div className="mbody">
            {trErr&&<div className="alert alert-err mb12">{trErr}</div>}
            <div className="frow">
              <div className="fg"><label className="flbl">Date</label><input type="date" className="finput" value={trForm.date} onChange={e=>updTr('date',e.target.value)}/></div>
              <div className="fg"><label className="flbl">From Godown *</label>
                <select className="fselect" value={trForm.fromWarehouseId} onChange={e=>updTr('fromWarehouseId',e.target.value)}>
                  <option value="">— Select Source —</option>
                  {state.warehouses.map(w=><option key={w.id} value={w.id}>{w.name}</option>)}
                </select>
              </div>
              <div className="fg" style={{display:'flex',alignItems:'center',justifyContent:'center',paddingTop:22}}>
                <span style={{fontSize:22,color:'var(--accent)'}}>→</span>
              </div>
              <div className="fg"><label className="flbl">To Godown *</label>
                <select className="fselect" value={trForm.toWarehouseId} onChange={e=>updTr('toWarehouseId',e.target.value)}>
                  <option value="">— Select Destination —</option>
                  {state.warehouses.filter(w=>w.id!==trForm.fromWarehouseId).map(w=><option key={w.id} value={w.id}>{w.name}</option>)}
                </select>
              </div>
            </div>
            <div className="frow">
              <div className="fg"><label className="flbl">Paddy Quality *</label>
                <select className="fselect" value={trForm.qualityId} onChange={e=>updTr('qualityId',e.target.value)}>
                  <option value="">— Select Quality —</option>
                  {renderQualityOptions(state,'paddy')}
                </select>
              </div>
              <div className="fg"><label className="flbl">Bags *</label><input type="number" className="finput" value={trForm.bags} onChange={e=>updTr('bags',e.target.value)} placeholder="e.g. 200"/></div>
              <div className="fg"><label className="flbl">Wt / Bag (KG)</label><input type="number" className="finput" value={trForm.weightPerBag} onChange={e=>updTr('weightPerBag',e.target.value)}/></div>
              <div className="fg" style={{paddingTop:22}}>
                {trKgPreview>0&&<div style={{background:'var(--accent-dim)',border:'1px solid rgba(245,166,35,.2)',borderRadius:8,padding:'8px 12px'}}>
                  <div className="c-accent bold" style={{fontSize:15}}>{(trKgPreview/100).toFixed(2)} Q</div>
                  <div className="c-muted" style={{fontSize:11}}>{trKgPreview.toLocaleString()} KG</div>
                </div>}
              </div>
            </div>
            <div className="divider"/>
            <div className="sec-ttl mb12" style={{fontSize:13}}>🚛 Vehicle & Freight</div>
            <div className="frow">
              <div className="fg"><label className="flbl">Vehicle (optional)</label>
                <select className="fselect" value={trForm.vehicleId} onChange={e=>updTr('vehicleId',e.target.value)}>
                  <option value="">— No Vehicle —</option>
                  {(state.vehicles||[]).map(v=><option key={v.id} value={v.id}>{v.vehicleNo} — {v.ownerName}</option>)}
                </select>
              </div>
              {trForm.vehicleId&&<>
                <div className="fg"><label className="flbl">Freight Amount (₹) *</label><input type="number" className="finput" value={trForm.freightAmt} onChange={e=>updTr('freightAmt',e.target.value)} placeholder="0"/></div>
                <div className="fg"><label className="flbl">Advance Paid (₹)</label><input type="number" className="finput" value={trForm.advancePaid} onChange={e=>updTr('advancePaid',e.target.value)} placeholder="0"/></div>
              </>}
              <div className="fg"><label className="flbl">Note</label><input className="finput" value={trForm.note} onChange={e=>updTr('note',e.target.value)} placeholder="Optional..."/></div>
            </div>
            {trForm.vehicleId&&+trForm.freightAmt>0&&<div className="alert" style={{background:'var(--blue-dim)',border:'1px solid rgba(96,165,250,.2)',color:'var(--blue)',fontSize:12}}>
              ℹ️ A freight entry (Trip: Transfer) will be auto-created in Freight &amp; Transport for this vehicle.
            </div>}
          </div>
          <div className="mfoot">
            <button className="btn btn-ghost" onClick={()=>setModal(false)}>Cancel</button>
            <button className="btn btn-teal" onClick={doSaveTransfer}>🔄 Save Transfer</button>
          </div>
        </div></div>}

      </div>
    </>
  );
}

/* ─── FUNDINGS (full-featured) ─────────────────────────── */
function Fundings({state,save}){
  const [addModal,setAddModal]=useState(false);
  const [form,setForm]=useState({name:'',type:'bank',limit:'',roiPct:'',gstPct:'18'});
  const [detailId,setDetailId]=useState(null); // which funding account is open in detail view

  /* ── helpers ── */
  const allFundings = state.fundings||[];
  const fundingBills = (fid)=>[...(state.paddyBills||[]),...(state.riceSaleBills||[])].filter(b=>b.fundingId===fid);

  /* Total gross disbursed from bank payments */
  const totalGrossDisbursed=(fid)=>{
    const f=allFundings.find(ff=>ff.id===fid);
    return (f?.bankDisbursements||[]).reduce((s,d)=>s+(+d.grossAmount||0),0);
  };

  /* Total bill amount funded to this account */
  const totalFunded=(fid)=>fundingBills(fid).reduce((s,b)=>s+(+b.totalAmount||0),0);

  /* ── Add account ── */
  const doAdd=()=>{
    if(!form.name) return;
    const newF={
      id:uid(), name:form.name, type:form.type,
      limit:+form.limit||0, used:0,
      roiPct:+form.roiPct||0, gstPct:+form.gstPct||18,
      /* per-account: funded entries, bank disbursements, interest ledger, repayments */
      fundedBills:[],       // {billId, billNo, date, amount, bankPaid}
      bankDisbursements:[], // {id, date, amount, gstDeducted, netReceived, note, billIds[]}
      interestLedger:[],    // {id, month:'2024-03', interestAmt, gstAmt, totalCharge, paid, balance, note}
      repayments:[],        // {id, date, amount, note, mode}
    };
    save(s=>({...s,fundings:[...s.fundings,newF]}));
    setAddModal(false);
    setForm({name:'',type:'bank',limit:'',roiPct:'',gstPct:'18'});
  };

  const del=id=>{if(confirm('Delete this funding account?'))save(s=>({...s,fundings:s.fundings.filter(f=>f.id!==id)}));};

  const updateFunding=(fid,updFn)=>{
    save(s=>({...s,fundings:s.fundings.map(f=>f.id===fid?updFn(f):f)}));
  };

  const detailF = allFundings.find(f=>f.id===detailId);

  if(detailId && detailF){
    return <FundingDetail
      funding={detailF}
      state={state}
      onBack={()=>setDetailId(null)}
      updateFunding={(upd)=>updateFunding(detailId,upd)}
      fundingBills={fundingBills(detailId)}
      totalFunded={totalFunded(detailId)}
    />;
  }

  return(
    <>
      <div className="topbar">
        <h2>🏦 Funding Accounts</h2>
        <button className="btn btn-primary" onClick={()=>setAddModal(true)}>+ Add Account</button>
      </div>
      <div className="content">
        {/* Summary cards */}
        <div className="g3 mb20">
          {allFundings.map(f=>{
            const tf=totalFunded(f.id);
            const gd=totalGrossDisbursed(f.id);
            const pct=f.limit>0?(gd/f.limit*100):0;
            const repaid=(f.repayments||[]).reduce((s,r)=>s+(+r.amount||0),0);
            const interestCharged=(f.interestLedger||[]).reduce((s,e)=>s+(+e.totalCharge||0),0);
            const interestPaid=(f.interestLedger||[]).reduce((s,e)=>s+(+e.paid||0),0);
            const principalRepaid=Math.max(0,repaid-Math.min(repaid,interestCharged));
            const outstanding=gd-principalRepaid;
            const interestBal=interestCharged-interestPaid;
            return(
              <div key={f.id} className="stat-card bl-purple" style={{cursor:'pointer',transition:'box-shadow .15s'}}
                onClick={()=>setDetailId(f.id)}
                onMouseEnter={e=>e.currentTarget.style.boxShadow='0 6px 24px rgba(123,45,139,.18)'}
                onMouseLeave={e=>e.currentTarget.style.boxShadow=''}>
                <div className="fxb">
                  <div className="stat-lbl">🏦 {f.name}</div>
                  <span className="pill p-purple" style={{fontSize:10}}>{f.type==='bank'?'Bank OD/CC':f.type==='cash'?'Cash':'Investor'}</span>
                </div>
                <div className="stat-val" style={{color:'var(--purple)',fontSize:20}}>{fmt(outstanding)}</div>
                <div className="stat-sub">Outstanding · Gross: {fmt(gd)} · Interest: {fmt(interestBal,2)}</div>
                {f.limit>0&&<>
                  <div className="sr-bar mt8"><div className="sr-fill" style={{background:'var(--purple)',width:`${Math.min(pct,100)}%`}}/></div>
                  <div className="c-muted" style={{fontSize:11}}>{pct.toFixed(1)}% of {fmt(f.limit)} limit used</div>
                </>}
                <div style={{display:'flex',gap:8,marginTop:8,alignItems:'center',flexWrap:'wrap'}}>
                  {f.roiPct>0&&<span className="pill p-blue" style={{fontSize:10}}>ROI {f.roiPct}% p.a.</span>}
                  {f.gstPct>0&&<span className="pill p-orange" style={{fontSize:10}}>GST {f.gstPct}%</span>}
                  <span className="pill p-green" style={{fontSize:10}}>{fundingBills(f.id).length} bills</span>
                </div>
                <div className="fxc gap6 mt8">
                  <button className="btn btn-primary btn-xs" onClick={e=>{e.stopPropagation();setDetailId(f.id);}}>📊 Details</button>
                  <button className="btn btn-danger btn-xs" onClick={e=>{e.stopPropagation();del(f.id);}}>🗑</button>
                </div>
              </div>
            );
          })}
          {allFundings.length===0&&<div className="empty" style={{gridColumn:'1/-1'}}><div className="empty-ico">🏦</div><p>No funding accounts yet. Add one to get started.</p></div>}
        </div>

        {/* Add modal */}
        {addModal&&<div className="overlay"><div className="modal">
          <div className="mhead"><h3>Add Funding Account</h3><button className="xbtn" onClick={()=>setAddModal(false)}>✕</button></div>
          <div className="mbody">
            <div className="frow">
              <div className="fg"><label className="flbl">Account Name</label><input className="finput" placeholder="e.g. SBI OD Account" value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))}/></div>
              <div className="fg"><label className="flbl">Type</label>
                <select className="fselect" value={form.type} onChange={e=>setForm(f=>({...f,type:e.target.value}))}>
                  <option value="bank">Bank OD/CC</option>
                  <option value="cash">Cash</option>
                  <option value="investor">Investor</option>
                </select>
              </div>
            </div>
            <div className="frow">
              <div className="fg"><label className="flbl">Credit Limit (₹)</label><input type="number" className="finput" placeholder="0" value={form.limit} onChange={e=>setForm(f=>({...f,limit:e.target.value}))}/></div>
              <div className="fg"><label className="flbl">ROI % (per annum)</label><input type="number" className="finput" placeholder="e.g. 12.5" value={form.roiPct} onChange={e=>setForm(f=>({...f,roiPct:e.target.value}))}/></div>
              <div className="fg"><label className="flbl">GST on Interest %</label><input type="number" className="finput" placeholder="18" value={form.gstPct} onChange={e=>setForm(f=>({...f,gstPct:e.target.value}))}/></div>
            </div>
          </div>
          <div className="mfoot">
            <button className="btn btn-ghost" onClick={()=>setAddModal(false)}>Cancel</button>
            <button className="btn btn-primary" onClick={doAdd}>+ Add Account</button>
          </div>
        </div></div>}
      </div>
    </>
  );
}

/* ─── FUNDING DETAIL VIEW ─────────────────────────────── */
function FundingDetail({funding,state,onBack,updateFunding,fundingBills,totalFunded}){
  const [tab,setTab]=useState('overview'); // overview | disbursements | interest | repayments
  const [editRoi,setEditRoi]=useState(false);
  const [roiForm,setRoiForm]=useState({roiPct:funding.roiPct||0,gstPct:funding.gstPct||18,limit:funding.limit||0});

  /* Bank Disbursement modal — money received FROM bank against stock */
  const [disbModal,setDisbModal]=useState(false);
  const [disbForm,setDisbForm]=useState({date:tod(),grossAmount:'',gstDeducted:'',note:'',linkedBillIds:[]});

  /* Bill bank-paid modal (legacy — kept for bills tab) */
  const [bpModal,setBpModal]=useState(null);
  const [bpAmt,setBpAmt]=useState('');

  /* Add interest month modal */
  const [intModal,setIntModal]=useState(false);
  const [intForm,setIntForm]=useState({month:'',principal:'',days:'',note:''});

  /* Repayment modal */
  const [repModal,setRepModal]=useState(false);
  const [repForm,setRepForm]=useState({date:tod(),amount:'',note:'',mode:'bank'});

  /* Computed values */
  const repayments = funding.repayments||[];
  const interestLedger = funding.interestLedger||[];
  const bankDisbursements = funding.bankDisbursements||[];

  /* ── Net principal = sum of gross amounts disbursed (bank includes GST in principal) ── */
  const totalGrossDisbursed = bankDisbursements.reduce((s,d)=>s+(+d.grossAmount||0),0);
  const totalGstDeducted = bankDisbursements.reduce((s,d)=>s+(+d.gstDeducted||0),0);
  const totalNetReceived = bankDisbursements.reduce((s,d)=>s+(+d.netReceived||0),0);

  /* Outstanding principal = gross disbursed - repayments applied to principal */
  const totalRepaid = repayments.reduce((s,r)=>s+(+r.amount||0),0);
  const totalInterestCharged = interestLedger.reduce((s,e)=>s+(+e.totalCharge||0),0);
  const totalInterestPaid = interestLedger.reduce((s,e)=>s+(+e.paid||0),0);
  const interestBalance = totalInterestCharged - totalInterestPaid;

  /* Principal outstanding = gross disbursed - principal portion of repayments */
  /* Repayments first go to interest balance, remainder to principal */
  const principalRepaid = Math.max(0, totalRepaid - Math.min(totalRepaid, totalInterestCharged));
  const outstandingPrincipal = totalGrossDisbursed - principalRepaid;

  /* Day-by-day accruing interest (not yet booked into ledger) */
  const today = tod();
  const lastBookedMonth = interestLedger.length>0
    ? interestLedger.slice().sort((a,b)=>b.month.localeCompare(a.month))[0].month
    : null;
  /* Figure out days since last booking till end of last month */
  const currentMonth = today.slice(0,7);
  const lastCompleteMonth = (()=>{
    const d=new Date(today);
    d.setDate(0); // last day of previous month
    return d.toISOString().slice(0,7);
  })();
  const pendingMonths = lastBookedMonth ? (lastCompleteMonth > lastBookedMonth ? 'Yes' : 'No') : (lastCompleteMonth ? 'Yes':'No');

  /* Inline calculator */
  const calcDailyInterest=(principal,roiPct)=>((+principal||0)*(+roiPct||0)/100/365);
  const calcInterest=(principal,days,roiPct)=>{
    const base=calcDailyInterest(principal,roiPct)*(+days||0);
    const gst=base*(+(funding.gstPct||0))/100;
    return {base,gst,total:base+gst};
  };

  /* Today's accruing daily interest on outstanding principal */
  const dailyInterestToday = calcDailyInterest(outstandingPrincipal, funding.roiPct||0);

  /* Bills with bank paid info */
  const billsData = fundingBills.map(b=>{
    const fb=(funding.fundedBills||[]).find(fb=>fb.billId===b.id)||{};
    return {...b, bankPaid:+fb.bankPaid||0};
  });
  const totalBankPaid = billsData.reduce((s,b)=>s+b.bankPaid,0);

  /* Save ROI settings */
  const saveRoi=()=>{
    updateFunding(f=>({...f,roiPct:+roiForm.roiPct,gstPct:+roiForm.gstPct,limit:+roiForm.limit}));
    setEditRoi(false);
  };

  /* Save bank paid for a bill (legacy) */
  const saveBankPaid=()=>{
    const bill=bpModal;
    updateFunding(f=>{
      const existing=(f.fundedBills||[]).filter(fb=>fb.billId!==bill.id);
      return {...f,fundedBills:[...existing,{billId:bill.id,billNo:bill.billNo,date:bill.date,amount:bill.totalAmount,bankPaid:+bpAmt||0}]};
    });
    setBpModal(null);setBpAmt('');
  };

  /* Add bank disbursement */
  const addDisb=()=>{
    if(!disbForm.grossAmount||!disbForm.date) return;
    const gross=+disbForm.grossAmount||0;
    const gstDed=+disbForm.gstDeducted||0;
    const net=gross-gstDed;
    const entry={
      id:uid(), date:disbForm.date,
      grossAmount:gross,        // principal bank charges (GST included in loan)
      gstDeducted:gstDed,       // GST already cut from disbursement
      netReceived:net,          // actual cash we received
      note:disbForm.note,
      linkedBillIds:disbForm.linkedBillIds,
    };
    updateFunding(f=>({...f,bankDisbursements:[...(f.bankDisbursements||[]),entry].sort((a,b)=>a.date.localeCompare(b.date))}));
    setDisbModal(false);
    setDisbForm({date:tod(),grossAmount:'',gstDeducted:'',note:'',linkedBillIds:[]});
  };

  /* Add interest entry */
  const addInterest=()=>{
    if(!intForm.month||!intForm.principal) return;
    const {base,gst,total}=calcInterest(intForm.principal,intForm.days,funding.roiPct||0);
    const entry={
      id:uid(), month:intForm.month,
      principal:+intForm.principal, days:+intForm.days||0,
      interestAmt:base, gstAmt:gst, totalCharge:total,
      paid:0, balance:total, note:intForm.note,
    };
    updateFunding(f=>({...f,interestLedger:[...(f.interestLedger||[]),entry].sort((a,b)=>a.month.localeCompare(b.month))}));
    setIntModal(false);setIntForm({month:'',principal:'',days:'',note:''});
  };

  /* Add repayment — applied to interest first then principal */
  const addRepayment=()=>{
    if(!repForm.amount) return;
    const entry={id:uid(),date:repForm.date,amount:+repForm.amount,note:repForm.note,mode:repForm.mode||'bank'};
    let remaining=+repForm.amount;
    updateFunding(f=>{
      let ledger=[...(f.interestLedger||[])];
      ledger=ledger.map(e=>{
        if(remaining<=0||e.balance<=0) return e;
        const apply=Math.min(remaining,e.balance);
        remaining-=apply;
        return {...e,paid:(+e.paid||0)+apply,balance:e.balance-apply};
      });
      return {...f,interestLedger:ledger,repayments:[...(f.repayments||[]),entry]};
    });
    setRepModal(false);setRepForm({date:tod(),amount:'',note:'',mode:'bank'});
  };

  /* Delete helpers */
  const delInterest=(id)=>{if(confirm('Delete this interest entry?'))updateFunding(f=>({...f,interestLedger:(f.interestLedger||[]).filter(e=>e.id!==id)}));};
  const delRepayment=(id)=>{if(confirm('Delete this repayment?'))updateFunding(f=>({...f,repayments:(f.repayments||[]).filter(r=>r.id!==id)}));};
  const delDisb=(id)=>{if(confirm('Delete this disbursement?'))updateFunding(f=>({...f,bankDisbursements:(f.bankDisbursements||[]).filter(d=>d.id!==id)}));};

  /* Inline interest calculator */
  const [calc,setCalc]=useState({principal:'',days:''});
  const calcResult=calc.principal&&calc.days&&funding.roiPct>0?calcInterest(calc.principal,calc.days,funding.roiPct):{base:0,gst:0,total:0};

  const typeLabel=funding.type==='bank'?'Bank OD/CC':funding.type==='cash'?'Cash':'Investor';

  return(
    <>
      <div className="topbar">
        <div className="fxc gap10">
          <button className="btn btn-ghost btn-sm" onClick={onBack}>← Back</button>
          <div>
            <h2 style={{fontSize:16}}>🏦 {funding.name}</h2>
            <div style={{fontSize:11,color:'rgba(255,255,255,.5)',marginTop:1}}>{typeLabel} · ROI {funding.roiPct||0}% p.a. · GST {funding.gstPct||0}%</div>
          </div>
        </div>
        <button className="btn btn-ghost btn-sm" onClick={()=>setEditRoi(true)}>⚙️ Settings</button>
      </div>
      <div className="content">
        {/* KPI row */}
        <div className="mb16" style={{display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:12}}>
          <div className="stat-card bl-purple">
            <div className="stat-lbl">Gross Disbursed</div>
            <div className="stat-val" style={{color:'var(--purple)',fontSize:18}}>{fmt(totalGrossDisbursed)}</div>
            <div className="stat-sub">{bankDisbursements.length} transactions</div>
          </div>
          <div className="stat-card bl-blue">
            <div className="stat-lbl">Net Received</div>
            <div className="stat-val" style={{color:'var(--blue)',fontSize:18}}>{fmt(totalNetReceived)}</div>
            <div className="stat-sub">After GST cut: {fmt(totalGstDeducted)}</div>
          </div>
          <div className="stat-card bl-red">
            <div className="stat-lbl">Outstanding Principal</div>
            <div className="stat-val" style={{color:'var(--red)',fontSize:18}}>{fmt(outstandingPrincipal)}</div>
            <div className="stat-sub">Daily interest: {fmt(dailyInterestToday,2)}/day</div>
          </div>
          <div className="stat-card bl-orange">
            <div className="stat-lbl">Interest Balance</div>
            <div className="stat-val" style={{color:'var(--accent)',fontSize:18}}>{fmt(interestBalance,2)}</div>
            <div className="stat-sub">Charged: {fmt(totalInterestCharged,2)}</div>
          </div>
          <div className="stat-card bl-green">
            <div className="stat-lbl">Total Repaid</div>
            <div className="stat-val" style={{color:'var(--green)',fontSize:18}}>{fmt(totalRepaid)}</div>
            <div className="stat-sub">Total liability: {fmt(outstandingPrincipal+interestBalance,2)}</div>
          </div>
        </div>

        {/* Accruing interest notice */}
        {outstandingPrincipal>0&&funding.roiPct>0&&<div style={{background:'var(--accent-dim)',border:'1px solid rgba(224,124,47,.25)',borderRadius:8,padding:'10px 14px',marginBottom:14,fontSize:13,display:'flex',alignItems:'center',gap:10,flexWrap:'wrap'}}>
          <span>📈</span>
          <span><b>Accruing today:</b> Interest on ₹{outstandingPrincipal.toLocaleString('en-IN',{maximumFractionDigits:0})} @ {funding.roiPct}% p.a. = <b style={{color:'var(--accent)'}}>{fmt(dailyInterestToday,2)}/day</b></span>
          <span style={{color:'var(--text3)',fontSize:12}}>·</span>
          <span style={{fontSize:12,color:'var(--text2)'}}>Monthly ≈ {fmt(dailyInterestToday*30,2)} | Book interest on day 1 of next month</span>
          {pendingMonths==='Yes'&&<span className="pill p-orange" style={{fontSize:11}}>⚠️ Unbooked months pending</span>}
        </div>}

        {/* Tabs */}
        <div className="tabs mb16">
          {['overview','disbursements','interest','repayments'].map(t=>(
            <div key={t} className={`tab${tab===t?' on':''}`} onClick={()=>setTab(t)}>
              {t==='overview'?'📊 Overview':t==='disbursements'?'🏦 Bank Payments':t==='interest'?'📅 Interest Ledger':'💸 Repayments'}
            </div>
          ))}
        </div>

        {/* ── OVERVIEW TAB ── */}
        {tab==='overview'&&<div className="g2">
          {/* Interest Calculator */}
          <div className="card">
            <div className="sec-hdr mb12"><div className="sec-ttl">🧮 Interest Calculator</div></div>
            <div className="frow">
              <div className="fg"><label className="flbl">Principal (₹)</label>
                <input type="number" className="finput" placeholder="Outstanding amount" value={calc.principal} onChange={e=>setCalc(c=>({...c,principal:e.target.value}))}/>
              </div>
              <div className="fg"><label className="flbl">Days</label>
                <input type="number" className="finput" placeholder="No. of days" value={calc.days} onChange={e=>setCalc(c=>({...c,days:e.target.value}))}/>
              </div>
            </div>
            <div style={{background:'var(--surface2)',borderRadius:8,padding:14,border:'1px solid var(--border)'}}>
              <div className="sum-row"><span className="c-muted">ROI</span><span className="bold">{funding.roiPct||0}% p.a.</span></div>

              <div className="sum-row sum-total"><span>Total Payable</span><span className="c-red">{fmt(calcResult.total,2)}</span></div>

              <button className="btn btn-ghost btn-xs" onClick={()=>setCalc({principal:Math.round(outstandingPrincipal),days:31})}>× 31d</button>
            </div>}
          </div>

          {/* Account Summary */}
          <div className="card">
            <div className="sec-hdr mb12"><div className="sec-ttl">📈 Account Summary</div></div>
            <div className="sum-row"><span>Credit Limit</span><span className="bold">{fmt(funding.limit||0)}</span></div>
            <div className="sum-row"><span>Gross Disbursed (Principal)</span><span className="c-purple bold">{fmt(totalGrossDisbursed)}</span></div>

            <div className="sum-row"><span>Net Cash Received</span><span className="c-blue bold">{fmt(totalNetReceived)}</span></div>
            <div className="divider"/>
            <div className="sum-row"><span>Principal Repaid</span><span className="c-green">{fmt(principalRepaid)}</span></div>

            <div className="divider"/>
            <div className="sum-row"><span>Total Interest Charged</span><span className="c-red">{fmt(totalInterestCharged,2)}</span></div>
            <div className="sum-row"><span>Interest Paid</span><span className="c-green">{fmt(totalInterestPaid,2)}</span></div>
            <div className="sum-row"><span>Interest Balance</span><span className="c-red bold">{fmt(interestBalance,2)}</span></div>

            <div className="sum-row sum-total"><span>Total Liability</span><span className="c-red">{fmt(outstandingPrincipal+interestBalance,2)}</span></div>
          </div>
        </div>}

            <div>
              <div className="sec-ttl">🏦 Bank Payments Received</div>
